  <link rel="stylesheet" href="nav.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #1a7a4a;
      --green2: #22a863;
      --red:    #c0392b;
      --gray:   #555;
      --lgray:  #999;
      --border: #e2e2e2;
      --bg:     #f0f0f0;
      --white:  #fff;
      --black:  #111;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }


    .page-wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }

    /* HEADER */
    .team-header { background: var(--white); border-radius: 10px; border: 1px solid var(--border); padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
    .team-logo-lg { width: 96px; height: 96px; border-radius: 50%; object-fit: contain; background: var(--bg); border: 2px solid var(--border); flex-shrink: 0; }
    .team-logo-fallback { width: 96px; height: 96px; border-radius: 50%; background: var(--green); color: var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 32px; flex-shrink: 0; }
    .team-header-info { flex: 1; min-width: 0; }
    .team-name-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
    .team-name-lg { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 34px; line-height: 1; }
    .rank-trio { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; vertical-align: middle; }
    .rank-trio span { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 14px; padding: 3px 10px; background: var(--white); color: var(--black); border-right: 1px solid var(--border); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .rank-trio span:last-child { border-right: none; }
    .rtag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; background: rgba(0,0,0,0.08); padding: 1px 4px; border-radius: 3px; text-transform: uppercase; color: var(--gray); }
    .team-meta { font-size: 14px; color: var(--gray); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .gender-current { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; }
    .gender-link { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: var(--green); text-decoration: none; padding: 1px 8px; border: 1px solid var(--green); border-radius: 20px; }
    .gender-link:hover { background: var(--green); color: var(--white); }

    .team-inline-stats {
      display: flex; gap: 0; margin-top: 10px;
    }

      display: flex; flex-direction: column; padding: 6px 16px 6px 0; margin-right: 16px;

    }
    .inline-stat:last-child { border-right: none; }
    .inline-lbl {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;

      color: var(--lgray); margin-bottom: 2px;
    }
    .inline-val {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800;

    }
    .inline-val.grn { color: var(--green); }
    .inline-val.red { color: var(--red); }
    .meta-sep { color: var(--border); }
    .team-record-big { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 24px; color: var(--green); }

    /* STAT CARDS */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; text-align: center; }
    .stat-card .lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--lgray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }

    .section-header { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }

    /* TOURNAMENT ODDS */
    .odds-section { margin-bottom: 16px; }
    .odds-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .odds-top { display: flex; border-bottom: 1px solid var(--border); }
    .odds-bucket { flex: 1; padding: 14px 18px; border-right: 1px solid var(--border); }
    .odds-bucket:last-child { border-right: none; }
    .odds-bucket .lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--lgray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .odds-bucket .val { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 30px; line-height: 1; }
    .odds-bucket .val.in  { color: var(--green); }
    .odds-bucket .val.out { color: var(--red); }
    .seed-grid { padding: 14px 18px; }
    .seed-grid-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--lgray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .seed-rows { display: flex; flex-direction: column; gap: 7px; }
    .seed-row { display: flex; align-items: center; gap: 10px; }
    .seed-lbl { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; width: 50px; color: var(--gray); flex-shrink: 0; }
    .seed-bar-wrap { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
    .seed-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .seed-bar.bye    { background: var(--green); }
    .seed-bar.playin { background: #f39c12; }
    .seed-bar.out    { background: var(--red); opacity: 0.6; }

    .status-badge { display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; border-radius: 5px; margin-right: 12px; vertical-align: middle; }
    .status-badge.bye    { background: var(--green); color: #fff; }
    .status-badge.playin { background: #1565c0; color: #fff; }
    .status-badge.bubble { background: #e67e22; color: #fff; }
    .status-badge.out    { background: var(--red); color: #fff; }
    .odds-bucket .val.bye-val { color: var(--green); }

    .odds-check-pct { display: flex; align-items: center; gap: 6px; }
    .odds-check { font-size: 28px; color: var(--green); font-weight: 700; }
    .odds-big-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 36px; }

    .games-section { margin-bottom: 16px; }

    table.gt { width: 100%; border-collapse: collapse; font-size: 13px; }

    table.gt th.r { text-align: right; }
    table.gt td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.gt tr:last-child td { border-bottom: none; }
    table.gt tr:hover td { background: #fafafa; }

    .rbadge { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 14px; display: inline-block; width: 14px; }
    .rbadge.W { color: var(--green); }
    .rbadge.L { color: var(--red); }

    .opp-cell { display: flex; align-items: center; gap: 7px; }
    .opp-logo { width: 22px; height: 22px; border-radius: 50%; object-fit: contain; background: var(--bg); border: 1px solid var(--border); flex-shrink: 0; }
    .opp-fb   { width: 22px; height: 22px; border-radius: 50%; background: var(--green); color: var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 9px; flex-shrink: 0; }
    .opp-info { display: flex; flex-direction: column; line-height: 1.2; }
    .opp-name { font-weight: 500; }
    .opp-ranks { display: flex; gap: 3px; margin-top: 2px; }
    .rpill { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; color: var(--gray); }
    .atsym { color: var(--lgray); font-size: 11px; flex-shrink: 0; }

    .sc { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; text-align: right; white-space: nowrap; }
    .sc.w { color: var(--black); } .sc.l { color: var(--gray); }
    .dc { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; text-align: right; }
    .dc.p { color: var(--green); } .dc.n { color: var(--red); }
    .hc { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; text-align: right; color: var(--green); }
    .hc.none { color: var(--lgray); }

    .wp-wrap { display: flex; align-items: center; gap: 6px; }
    .wp-bar-o { width: 68px; height: 6px; background: var(--red); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .wp-bar-i { height: 100%; background: var(--green2); border-radius: 3px; }
    .wp-txt { font-size: 11px; color: var(--gray); white-space: nowrap; }

    .tbadge { font-size: 10px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--white); background: #8b5cf6; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
    .dtxt { color: var(--lgray); font-size: 12px; white-space: nowrap; }

    .games-footer { display: flex; gap: 20px; flex-wrap: wrap; padding: 10px 14px; background: #f7f7f7; border-top: 2px solid var(--border); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--gray); }
    .games-footer strong { color: var(--black); font-size: 15px; }

    .loading-state, .error-state { text-align: center; padding: 60px 20px; color: var(--lgray); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; }
    .error-state { color: var(--red); }

    @media (max-width: 640px) {
      .team-header { flex-direction: column; align-items: center; text-align: center; padding: 20px 16px; }
      .team-header-info { align-items: center; display: flex; flex-direction: column; width: 100%; }
      .team-name-row { justify-content: center; flex-wrap: wrap; width: 100%; }
      .rank-trio { margin-top: 8px; justify-content: center; }
      .team-meta { justify-content: center; width: 100%; }
      .team-inline-stats { justify-content: center; width: 100%; }
      .inline-stat { flex: 1; text-align: center; padding: 6px 10px; }
    }
    @media (max-width: 640px) {
      .team-header { flex-direction: column; text-align: center; }
      .team-meta { justify-content: center; }
      .stat-cards { grid-template-columns: repeat(3, 1fr); }
      .hsm { display: none; }
    }
  </style>

<script>
const SB_URL  = 'https://vtwupenqieesoktonbzg.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0d3VwZW5xaWVlc29rdG9uYnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTA0MzgsImV4cCI6MjA4Nzk4NjQzOH0.OqkqF7NXr5LBQsQ0sl6S2o-kzQqbtBlRCLFszRnUoHA';
const SPORT_REG_END = {
  'basketball':    '2026-02-06',
  'baseball':      '2025-06-04',
  'softball':      '2025-06-04',
  'lacrosse':      '2025-06-06',
  'soccer':        '2025-10-22',
  'field-hockey':  '2025-10-22',
  'football':      '2025-11-01',
  'volleyball':    '2025-11-01',
};

const SPORT_IDS = {
  'basketball':    'b31ab283-b28e-4ba8-9684-b1cf30cea219',
  'baseball':      'c87a4d6c-a471-47e1-b6a0-d1643d942bf0',
  'softball':      '095c9841-7261-4cb1-824e-6304792b53d0',
  'lacrosse':      '9c34ec5c-81b4-4e2e-9f60-740bb30fee4d',
  'soccer':        'ff80a695-0e78-4432-98f2-141b2b571e0e',
  'field-hockey':  '1054869a-20d4-465f-8ca9-4bc4d2bafe1b',
  'football':      'fa905ca5-f416-409b-81ac-777179ee5576',
  'volleyball':    'e26b0fcc-e661-4945-8b2d-063c37ace44f',
};

const SPORT_NAME = {
  'basketball':    'Basketball',
  'baseball':      'Baseball',
  'softball':      'Softball',
  'lacrosse':      'Lacrosse',
  'soccer':        'Soccer',
  'field-hockey':  'Field Hockey',
  'football':      'Football',
  'volleyball':    'Volleyball',
};

const SPORT_SCORE_LABELS = {
  'basketball':   ['Avg PF',     'Avg PA'],
  'football':     ['Avg PF',     'Avg PA'],
  'soccer':       ['Avg GF',     'Avg GA'],
  'lacrosse':     ['Avg GF',     'Avg GA'],
  'field-hockey': ['Avg GF',     'Avg GA'],
  'baseball':     ['Avg RF',     'Avg RA'],
  'softball':     ['Avg RF',     'Avg RA'],
  'volleyball':   ['Avg Sets W', 'Avg Sets L'],
};

const WVALS = { A: 40, B: 38, C: 36, D: 34, S: 32 };

async function sb(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
  });
  if (!r.ok) { const b = await r.text(); throw new Error(`${r.status} — ${b}`); }
  return r.json();
}

const qp  = n => new URLSearchParams(location.search).get(n);
const f2  = n => n != null ? (+n).toFixed(2) : '—';
const fpc = n => n != null ? (+n * 100).toFixed(1) + '%' : '—';
const fdt = d => { if (!d) return ''; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };

function pyth(a, b) {
  if (!a || !b) return null;
  const d = a - b;
  if (d > 35) return 1; if (d < -35) return 0;
  const pa = Math.pow(a,11), pb = Math.pow(b,11);
  return pa / (pa + pb);
}

function logoEl(url, name, lg) {
  const sc = lg ? 'team-logo-lg' : 'opp-logo';
  const fb = lg ? 'team-logo-fallback' : 'opp-fb';
  const ch = (name||'?')[0];
  if (url) return `<img class="${sc}" src="${url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="${fb}" style="display:none">${ch}</div>`;
  return `<div class="${fb}">${ch}</div>`;
}

function healsCalc(games, tid, smap, regEnd) {
  const reg = games.filter(g => !g.is_tournament && g.game_date <= regEnd && g.status !== 'cancelled');
  const denom = Math.max(reg.length, 12);
  let piSum = 0, healSum = 0;
  const details = {};
  for (const g of reg) {
    if (g.status !== 'final') continue;
    const ih = g.home_team_id === tid;
    const oid = ih ? g.away_team_id : g.home_team_id;
    const ms = ih ? g.home_score : g.away_score;
    const os = ih ? g.away_score : g.home_score;
    const opp = smap[oid] || {};
    const cls = opp._class || 'A';
    const opi = opp.pi || 1.0;
    const wval = WVALS[cls] || 36;
    const tied = ms === os;
    const won  = ms > os;
    if (won)  piSum += wval;
    if (tied) piSum += wval * 0.5;
    const contrib = won ? opi / denom : tied ? (opi * 0.5) / denom : 0;
    healSum += contrib;
    details[`${g.game_date}_${oid}`] = { wp: pyth(ms, os), contrib, oppPI: opi };
  }
  const played = reg.filter(g => g.status === 'final').length;
  const pi = played === 0 ? 1.0 : piSum / denom;
  return { pi, heals: healSum * 10, played, denom, details };
}

async function load() {
  const tid = qp('team_id');
  const app = document.getElementById('app');
  if (!tid) { app.innerHTML = `<div class="error-state">No team_id specified.</div>`; return; }

  try {
    const [teams, snap] = await Promise.all([
      sb(`teams?id=eq.${tid}&select=id,school_name,logo_url,gender,sport_id`),
      sb(`rankings_snapshots?team_id=eq.${tid}&order=snapshot_date.desc&limit=1&select=*`)
    ]);
    if (!teams.length) { app.innerHTML = `<div class="error-state">Team not found.</div>`; return; }
    const team  = teams[0];
    const stats = snap[0] || null;

    // Derive sport slug and regEnd from team.sport_id
    const sport   = Object.keys(SPORT_IDS).find(k => SPORT_IDS[k] === team.sport_id) || 'basketball';
    const regEnd  = SPORT_REG_END[sport];
    const [pfLbl, paLbl] = SPORT_SCORE_LABELS[sport] || ['Avg PF', 'Avg PA'];

    const [games, classData, allSnaps, allSportGames] = await Promise.all([
      sb(`games?or=(home_team_id.eq.${tid},away_team_id.eq.${tid})&sport_id=eq.${team.sport_id}&order=game_date.asc&select=*`),
      sb(`team_classifications?team_id=eq.${tid}&select=class_id,region_id,classes(name),regions(name)`),
      sb(`rankings_snapshots?order=snapshot_date.desc&select=team_id,heal_points,rank_overall,rank_class&limit=2000`),
      sb(`games?sport_id=eq.${team.sport_id}&is_tournament=eq.false&game_date=lte.${regEnd}&select=home_team_id,away_team_id,home_score,away_score,game_date,status`)
    ]);

    const oppIds = [...new Set(games.map(g => g.home_team_id === tid ? g.away_team_id : g.home_team_id))];
    const idList = oppIds.join(',');

    // Collect all unique team IDs from sport games for class lookup
    const allSportTeamIds = [...new Set(allSportGames.flatMap(g => [g.home_team_id, g.away_team_id]))];
    const allSportIdList = allSportTeamIds.join(',');

    const [oppTeams, allSportTeams, siblings] = await Promise.all([
      oppIds.length ? sb(`teams?id=in.(${idList})&select=id,school_name,logo_url,gender,team_class`) : [],
      allSportTeamIds.length ? sb(`teams?id=in.(${allSportIdList})&select=id,team_class,team_classifications(classes(name))`) : [],
      sb(`teams?school_name=eq.${encodeURIComponent(team.school_name)}&gender=eq.${team.gender==='Boys'?'Girls':'Boys'}&sport_id=eq.${team.sport_id}&select=id,school_name,gender&limit=1`)
    ]);

    const tmap = {};
    for (const t of oppTeams) tmap[t.id] = t;

    // Build class map for ALL sport teams — prefer team_class, fall back to team_classifications
    const clsMap = {};
    for (const t of allSportTeams) {
      clsMap[t.id] = t.team_class || t.team_classifications?.[0]?.classes?.name || 'A';
    }

    // Calculate each opponent's PI from their full schedule
    // PI = sum of win values / max(scheduled non-cancelled games before cutoff, 12)
    const oppPIMap = {};
    for (const oid of oppIds) {
      const og = allSportGames.filter(g => g.home_team_id === oid || g.away_team_id === oid);
      let piSum = 0;
      const wval = WVALS[clsMap[oid]] || 36;
      for (const g of og) {
        if (g.status === 'cancelled') continue;
        const ih = g.home_team_id === oid;
        const ms = ih ? g.home_score : g.away_score;
        const os = ih ? g.away_score : g.home_score;
        if (ms == null || os == null) continue;
        if (ms > os)      piSum += wval;
        else if (ms === os) piSum += wval * 0.5;
      }
      const scheduled = og.filter(g => g.status !== 'cancelled').length;
      const denom12 = Math.max(scheduled, 12);
      oppPIMap[oid] = scheduled === 0 ? 1.0 : piSum / denom12;
    }

    // smap: logo/name/rank for display, PI from computed oppPIMap
    const smap = {};
    for (const t of oppTeams) {
      smap[t.id] = { _name: t.school_name, _logo: t.logo_url, _class: clsMap[t.id] || 'A', pi: oppPIMap[t.id] || 1.0 };
    }
    // Merge rank info from allSnaps
    for (const s of allSnaps) {
      if (smap[s.team_id]) { smap[s.team_id].rank_overall = s.rank_overall; smap[s.team_id].rank_class = s.rank_class; }
    }

    const sibling   = siblings[0] || null;
    const myClass   = classData[0];
    const className = myClass?.classes?.name || '';
    const regionName= myClass?.regions?.name || '';
    const classReg  = [className, regionName].filter(Boolean).join(' ');

    // Compute ranks client-side from all snapshots
    // Use existing rank_overall/rank_class from DB, compute rank_region here
    const mySnap = allSnaps.find(s => s.team_id === tid);
    const rState  = mySnap?.rank_overall || stats?.rank_overall || null;
    const rClass  = mySnap?.rank_class  || stats?.rank_class  || null;

    // Region rank: filter to same class+region, sort by heal_points desc, find position
    // We need team classifications for all teams to filter by region — approximate using
    // rank_class position within class, comparing to opponents we already have.
    // Best approach: use rank_overall within the region subset we build from opponent data.
    // For now use rank_class as proxy until rank_region is added to snapshot push.
    const rRegion = stats?.rank_region || null;

    const { pi, heals, played, denom, details } = healsCalc(games, tid, smap, regEnd);

    let wins = 0, losses = 0, pointDiff = 0;
    for (const g of games) {
      if (g.status !== 'final') continue;
      const ih = g.home_team_id === tid;
      const ms = ih ? g.home_score : g.away_score;
      const os = ih ? g.away_score : g.home_score;
      if (ms != null && os != null) pointDiff += (ms - os);
      ms > os ? wins++ : losses++;
    }
    const diffStr = pointDiff >= 0 ? `+${pointDiff}` : `${pointDiff}`;

    // ── RENDER ──────────────────────────────────

    const gLbl = team.gender === 'Boys' ? 'Boys' : 'Girls';
    const sLbl = team.gender === 'Boys' ? 'Girls' : 'Boys';
    const genderHtml = sibling
      ? `<span class="gender-current">${gLbl}</span><a class="gender-link" href="team.html?team_id=${sibling.id}">${sLbl} ↗</a>`
      : `<span class="gender-current">${gLbl}</span>`;

    const rankHtml = (rState || rClass) ? `
      <span class="rank-trio">
        ${rState  ? `<span><span class="rtag">STATE</span>#${rState}</span>`  : ''}
        ${rClass  ? `<span><span class="rtag">${className}</span>#${rClass}</span>` : ''}
        ${rRegion ? `<span><span class="rtag">${classReg.toUpperCase()}</span>#${rRegion}</span>` : ''}
      </span>` : '';

    // Stat cards
    const cards = `
      <div class="stat-cards">
        <div class="stat-card"><div class="lbl">DIRIGO</div><div class="val grn">${stats ? f2(stats.heal_points) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">SOS</div><div class="val">${stats ? f2(stats.sos) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">${pfLbl}</div><div class="val">${stats ? f2(stats.avg_pf) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">${paLbl}</div><div class="val">${stats ? f2(stats.avg_pa) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">%Perfect</div><div class="val">${stats ? fpc(stats.pct_perfect) : '—'}</div></div>
      </div>`;

    // Tournament odds
    const REGION_CUTOFFS = {
  "A North|Boys": { bye: 8, inCutoff: 8 },
  "A South|Boys": { bye: 5, inCutoff: 11 },
  "B North|Boys": { bye: 7, inCutoff: 9 },
  "B South|Boys": { bye: 6, inCutoff: 10 },
  "C North|Boys": { bye: 6, inCutoff: 10 },
  "C South|Boys": { bye: 6, inCutoff: 10 },
  "D North|Boys": { bye: 5, inCutoff: 11 },
  "D South|Boys": { bye: 8, inCutoff: 8 },
  "S North|Boys": { bye: 8, inCutoff: 8 },
  "S South|Boys": { bye: 8, inCutoff: 8 },
  "A North|Girls": { bye: 8, inCutoff: 8 },
  "A South|Girls": { bye: 5, inCutoff: 11 },
  "B North|Girls": { bye: 7, inCutoff: 9 },
  "B South|Girls": { bye: 6, inCutoff: 10 },
  "C North|Girls": { bye: 6, inCutoff: 10 },
  "C South|Girls": { bye: 6, inCutoff: 10 },
  "D North|Girls": { bye: 6, inCutoff: 10 },
  "D South|Girls": { bye: 8, inCutoff: 8 },
  "S North|Girls": { bye: 8, inCutoff: 8 },
  "S South|Girls": { bye: 8, inCutoff: 8 }
};

    let oddsHtml = '';
    const odds = stats?.tournament_odds || null;
    if (odds) {
      const isTourney  = new Date() > new Date('2026-02-20');
      const oddsTitle  = isTourney ? 'Gold Ball Odds' : 'Tournament Odds';

      // Get cutoffs for this team's region
      // Normalize gender to Title case for key lookup
      const genderNorm = team.gender ? team.gender.charAt(0).toUpperCase() + team.gender.slice(1).toLowerCase() : 'Boys';
      const cutoffKey = `${classReg}|${genderNorm}`;
      const cutoff    = REGION_CUTOFFS[cutoffKey] || { bye: 6, inCutoff: 10 };
      console.log('Cutoff lookup:', cutoffKey, '->', cutoff);
      const byeCutoff = cutoff.bye;
      const inCutoff  = cutoff.inCutoff;

      // Compute overall IN% = sum of all seed probabilities within inCutoff
      const seedRows = [];
      for (let i = 1; i <= 20; i++) {
        const v = odds[`S${i}`] ?? odds[`s${i}`] ?? null;
        if (v != null && v !== '' && +v > 0) seedRows.push({ i, v: +v });
      }

      const inTotal  = seedRows.filter(s => s.i <= inCutoff).reduce((a,s) => a+s.v, 0);
      const outTotal = seedRows.filter(s => s.i >  inCutoff).reduce((a,s) => a+s.v, 0);
      const byeTotal = seedRows.filter(s => s.i <= byeCutoff).reduce((a,s) => a+s.v, 0);

      const inPct  = inTotal  > 0 ? (inTotal  * 100).toFixed(1) : null;
      const outPct = outTotal > 0 ? (outTotal * 100).toFixed(1) : null;
      const byePct = byeTotal > 0 ? (byeTotal * 100).toFixed(1) : null;

      const maxV = seedRows.length ? Math.max(...seedRows.map(s => s.v)) : 1;

      // Badge logic:
      // BYE=1 → BYE | BYE<1 & IN=1 & BYE>0 → IN | BYE=0 & IN=1 → PLAY-IN
      // OUT=1 → OUT | everything else → BUBBLE
      let statusBadge2 = '';
      if      (byeTotal >= 0.999)                          statusBadge2 = '<span class="status-badge bye">BYE</span>';
      else if (inTotal  >= 0.999 && byeTotal === 0)        statusBadge2 = '<span class="status-badge playin">PLAY-IN</span>';
      else if (inTotal  >= 0.999 && byeTotal > 0)         statusBadge2 = '<span class="status-badge playin">IN</span>';
      else if (outTotal >= 0.999)                          statusBadge2 = '<span class="status-badge out">OUT</span>';
      else                                                  statusBadge2 = '<span class="status-badge bubble">BUBBLE</span>';

      // If BYE is 100%, just show BYE badge + pct. Otherwise show relevant buckets.
      const playInTotal = inTotal - byeTotal;
      const playInPct   = playInTotal > 0 ? (playInTotal * 100).toFixed(1) : null;

      const is100     = byeTotal >= 0.999 || inTotal >= 0.999 || outTotal >= 0.999;
      const pct100    = byeTotal >= 0.999 ? byePct : inTotal >= 0.999 ? inPct : outTotal >= 0.999 ? outPct : null;
      const pct100col = outTotal >= 0.999 ? 'out-col' : 'green-col';

      // Sub-buckets: shown when IN=100% but seed still uncertain
      const showByeSub    = inTotal >= 0.999 && byeTotal > 0.001 && byeTotal < 0.999;
      const showPlayInSub = inTotal >= 0.999 && playInTotal > 0.001;

      // Normal buckets: shown when nothing is 100%
      const showBye = !is100 && byeTotal > 0;
      const showIn  = !is100 && inTotal  > 0 && byeTotal < 0.999;
      const showOut = !is100 && outTotal > 0;


      const topHtml = `
        <div class="odds-top">
          <div class="odds-hero">
            ${statusBadge2}
            ${is100 ? `<span class="odds-check-pct">${outTotal<0.999?'<span class="odds-check">✓</span>':''}<span class="odds-big-num ${pct100col}">${pct100}%</span></span>` : ''}
          </div>
          ${showBye ? `<div class="odds-bucket"><div class="lbl">BYE</div><div class="val bye-val">${byePct}%</div></div>` : ''}
          ${showIn  ? `<div class="odds-bucket"><div class="lbl">In Tournament</div><div class="val in">${inPct}%</div></div>` : ''}
          ${showOut ? `<div class="odds-bucket"><div class="lbl">Out</div><div class="val out">${outPct}%</div></div>` : ''}
          ${showByeSub    ? `<div class="odds-bucket"><div class="lbl">BYE</div><div class="val bye-val">${byePct}%</div></div>` : ''}
          ${showPlayInSub ? `<div class="odds-bucket"><div class="lbl">Play-In</div><div class="val in">${playInPct}%</div></div>` : ''}
        </div>`;

      const seedHtml = seedRows.map(({ i, v }) => {
        const pct  = (v * 100).toFixed(1);
        const barW = maxV > 0 ? (v / maxV * 100).toFixed(1) : 0;
        let cls, note;
        if (i <= byeCutoff)       { cls = 'bye';    note = '(Bye)'; }
        else if (i <= inCutoff)   { cls = 'playin'; note = '(Play-in)'; }
        else                      { cls = 'out';    note = '(Out)'; }
        return `<div class="seed-row">
          <span class="seed-lbl">Seed ${i} <small style="color:var(--lgray);font-size:10px">${note}</small></span>
          <div class="seed-bar-wrap"><div class="seed-bar ${cls}" style="width:${barW}%"></div></div>
          <span class="seed-pct">${pct}%</span>
        </div>`;
      }).join('');

      oddsHtml = `
        <div class="odds-section">
          <div class="section-header">${oddsTitle}</div>
          <div class="odds-card">
            ${topHtml}
            ${seedHtml ? `<div class="seed-grid"><div class="seed-grid-lbl">Seed Distribution</div><div class="seed-rows">${seedHtml}</div></div>` : ''}
          </div>
        </div>`;
    }

    // Combined games table
    const rows = games.map(g => {
      if (g.status === 'cancelled') return '';
      const ih  = g.home_team_id === tid;
      const oid = ih ? g.away_team_id : g.home_team_id;
      const ot  = tmap[oid] || {};
      const os  = smap[oid] || {};
      const ms  = ih ? g.home_score : g.away_score;
      const ops = ih ? g.away_score : g.home_score;
      const fin = g.status === 'final';
      const won = fin && ms > ops;
      const lost= fin && ms < ops;
      const df  = fin ? ms - ops : null;
      const at  = g.is_neutral ? `<span class="atsym">N</span>` : !ih ? `<span class="atsym">@</span>` : '';
      const res = fin ? (won ? 'W' : 'L') : (g.status === 'scheduled' ? '–' : '●');
      const tb  = g.is_tournament ? `<span class="tbadge">T</span>` : '';

      // Rank pill: state rank only
      const pills = [];
      if (os.rank_overall) pills.push(`<span class="rpill">#${os.rank_overall}</span>`);
      const pillsHtml = pills.length ? `<div class="opp-ranks">${pills.join('')}</div>` : '';

      // Heal data
      const hkey = `${g.game_date}_${oid}`;
      const hd   = (!g.is_tournament && g.game_date <= regEnd) ? details[hkey] : null;
      const wp   = hd?.wp ?? null;
      const wpPct= wp !== null ? (wp*100).toFixed(1)+'%' : '';
      const barW = wp !== null ? (wp*100).toFixed(1) : 0;

      const scoreTxt = fin ? `${ms}–${ops}` : (g.status==='scheduled' ? 'Sched.' : 'Live');

      return `<tr>
        <td class="dtxt">${fdt(g.game_date)}${tb}</td>
        <td>
          <div class="opp-cell">
            ${at}
            ${logoEl(ot.logo_url, ot.school_name, false)}
            <div class="opp-info">
              <span class="opp-name">${ot.school_name||'Unknown'}</span>
              ${pillsHtml}
            </div>
          </div>
        </td>
        <td class="sc ${won?'w':lost?'l':''}">
          <span class="rbadge ${res==='W'?'W':res==='L'?'L':''}">${res}</span> ${scoreTxt}
        </td>
        <td class="dc ${df>0?'p':df<0?'n':''} hsm">${df!==null?(df>0?'+':'')+df:''}</td>
        <td class="hsm">
          ${wp!==null?`<div class="wp-wrap">
            <div class="wp-bar-o"><div class="wp-bar-i" style="width:${barW}%"></div></div>
            <span class="wp-txt">${wpPct} · ${f2(hd?.oppPI)} PI</span>
          </div>`:''}
        </td>
        <td class="hc ${hd&&hd.contrib?'':'none'}">${hd?(hd.contrib?'+'+f2(hd.contrib*10):'—'):''}</td>
      </tr>`;
    }).join('');

    const gamesHtml = `
      <div class="games-section">
        <div class="section-header">${SPORT_NAME[sport] || 'Sport'} Schedule, Results &amp; Heal Points</div>
        <div class="games-wrap">
          <table class="gt">
            <thead><tr>
              <th>Date</th><th>Opponent</th><th class="r">Score</th>
              <th class="r hsm">Diff</th><th class="hsm">Win Prob · Opp PI</th>
              <th class="r">Heal +</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="games-footer">
            <span>Reg. games: <strong>${played}</strong></span>
            <span>Denominator: <strong>${denom}</strong></span>
            <span>PI: <strong>${f2(pi)}</strong></span>
            <span>Heal Points: <strong>${f2(heals)}</strong></span>
          </div>
        </div>
      </div>`;

    app.innerHTML = `
      <div class="team-header">
        ${logoEl(team.logo_url, team.school_name, true)}
        <div class="team-header-info">
          <div class="team-name-row">
            <span class="team-name-lg">${team.school_name}</span>
            ${rankHtml}
          </div>
          <div class="team-meta">${genderHtml}<span class="meta-sep">|</span><strong>${classReg}</strong><span class="meta-sep">|</span>${SPORT_NAME[sport] || ''}</div>
          <div class="team-inline-stats">
            <span class="inline-stat"><span class="inline-lbl">RECORD</span><span class="inline-val grn">${wins}–${losses}</span></span>
            <span class="inline-stat"><span class="inline-lbl">POINT DIFF</span><span class="inline-val ${pointDiff >= 0 ? 'grn' : 'red'}">${diffStr}</span></span>
            <span class="inline-stat"><span class="inline-lbl">HEAL POINTS</span><span class="inline-val">${f2(heals)}</span></span>
          </div>
        </div>
      </div>
      ${cards}
      ${oddsHtml}
      ${gamesHtml}`;

    document.title = `${team.school_name} ${SPORT_NAME[sport] || ''} — Maine Basketball Rankings`;

  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = `<div class="error-state">Failed to load team data.<br><small>${err.message}</small></div>`;
  }
}

load();
</script>

<script src="nav.js"></script>
<script>MBRNav.init({ active: 'team' });</script>
</body>
</html>

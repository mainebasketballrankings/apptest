<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MBR Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --home: #1a3a5c;
    --home-accent: #2d7dd2;
    --home-light: #4a9eff;
    --away: #3a1a1a;
    --away-accent: #c0392b;
    --away-light: #e05c52;
    --text: #f0f2ff;
    --text-dim: #8890b0;
    --green: #27ae60;
    --gold: #f39c12;
    --court: #c8a96e;
    --court-line: #8b6914;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    gap: 8px;
    flex-shrink: 0;
  }

  .team-score {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .team-score.home { align-items: flex-start; }
  .team-score.away { align-items: flex-end; }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .team-score.home .team-name { color: var(--home-light); }
  .team-score.away .team-name { color: var(--away-light); }

  .score-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .team-score.away .score-row { flex-direction: row-reverse; }

  .score-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 1;
  }
  .team-score.home .score-num { color: var(--home-light); }
  .team-score.away .score-num { color: var(--away-light); }

  .foul-to {
    display: flex;
    flex-direction: column;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    gap: 1px;
  }
  .foul-to span { display: flex; gap: 4px; align-items: center; }
  .foul-to strong { color: var(--text); font-size: 13px; }

  /* Clock center */
  #clock-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  #period-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #clock-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.02em;
    padding: 4px 16px;
    cursor: pointer;
    min-width: 110px;
    text-align: center;
    transition: all 0.1s;
  }
  #clock-btn.running {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 12px rgba(39,174,96,0.3);
  }
  #clock-btn:active { transform: scale(0.96); }

  .possession-arrow {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .possession-arrow .arrow {
    font-size: 16px;
    transition: all 0.2s;
  }
  .possession-arrow.home .arrow { color: var(--home-light); }
  .possession-arrow.away .arrow { color: var(--away-light); }

  /* period nav */
  .period-nav {
    display: flex; align-items: center; gap: 6px;
  }
  .period-nav button {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 4px;
    width: 22px; height: 22px; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .period-nav button:active { background: var(--surface2); }

  /* ── MAIN AREA ── */
  #main {
    display: grid;
    grid-template-columns: 130px 1fr 130px;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── PLAYER PANELS ── */
  .player-panel {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    overflow-y: auto;
    background: var(--surface);
  }
  .player-panel.home-panel { border-right: 1px solid var(--border); }
  .player-panel.away-panel { border-left: 1px solid var(--border); }

  .player-card {
    border-radius: var(--radius);
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    border: 2px solid transparent;
  }
  .home-panel .player-card {
    background: rgba(45,125,210,0.12);
    border-color: rgba(45,125,210,0.2);
  }
  .away-panel .player-card {
    background: rgba(192,57,43,0.12);
    border-color: rgba(192,57,43,0.2);
  }
  .player-card.selected {
    border-color: var(--gold) !important;
    background: rgba(243,156,18,0.15) !important;
    box-shadow: 0 0 12px rgba(243,156,18,0.3);
  }
  .player-card.on-bench {
    opacity: 0.4;
    filter: grayscale(0.5);
  }
  .player-card:active { transform: scale(0.97); }

  .player-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 26px;
    line-height: 1;
  }
  .home-panel .player-number { color: var(--home-light); }
  .away-panel .player-number { color: var(--away-light); }

  .player-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .player-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .foul-dots {
    display: flex; gap: 3px; margin-top: 3px;
  }
  .foul-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
  }
  .foul-dot.active { background: var(--gold); }

  .bench-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    padding: 4px 0 2px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  /* ── COURT ── */
  #court-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #court-svg {
    flex: 1;
    width: 100%;
    min-height: 0;
  }

  /* ── STAT BUTTONS ── */
  #stat-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6px 8px;
    flex-shrink: 0;
  }

  #selected-player-display {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 5px;
    min-height: 18px;
    letter-spacing: 0.05em;
  }
  #selected-player-display span {
    color: var(--gold);
    font-weight: 700;
    font-size: 15px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 5px;
  }

  .stat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.1s;
    line-height: 1.2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .stat-btn .stat-icon { font-size: 14px; line-height: 1; }
  .stat-btn:active { transform: scale(0.93); background: var(--border); }
  .stat-btn.scoring { border-color: var(--green); color: var(--green); }
  .stat-btn.miss { border-color: rgba(192,57,43,0.5); color: var(--away-light); }
  .stat-btn.foul { border-color: var(--gold); color: var(--gold); }
  .stat-btn.disabled {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
  }
  .stat-btn.team-stat {
    border-color: rgba(140,140,180,0.4);
    color: var(--text-dim);
  }

  /* ── EVENT LOG ── */
  #log-panel {
    position: absolute;
    right: 8px;
    top: 8px;
    width: 200px;
    max-height: 180px;
    background: rgba(15,17,23,0.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    font-size: 10px;
    backdrop-filter: blur(4px);
    z-index: 10;
  }
  #log-panel.hidden { display: none; }
  .log-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 6px 8px 4px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: rgba(15,17,23,0.95);
  }
  .log-header button {
    background: none; border: none;
    color: var(--text-dim); font-size: 14px; cursor: pointer;
    padding: 0 2px;
  }
  .log-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    border-bottom: 1px solid rgba(46,50,80,0.5);
    gap: 6px;
  }
  .log-entry:hover { background: var(--surface2); }
  .log-team-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .log-text { flex: 1; color: var(--text); line-height: 1.3; }
  .log-clock { color: var(--text-dim); flex-shrink: 0; }
  .log-delete {
    background: none; border: none; color: var(--away-light);
    font-size: 13px; cursor: pointer; padding: 0 2px; opacity: 0.6;
    flex-shrink: 0;
  }
  .log-delete:hover { opacity: 1; }

  /* ── LOG TOGGLE ── */
  #log-toggle {
    position: absolute;
    right: 8px;
    top: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    letter-spacing: 0.08em;
    z-index: 9;
  }

  /* ── SUB MODAL ── */
  #sub-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #sub-modal.show { display: flex; }
  .sub-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    width: 280px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
  }
  .sub-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .sub-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .sub-player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .sub-player-row:hover { background: var(--surface2); border-color: var(--border); }
  .sub-player-row:active { background: var(--border); }
  .sub-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    width: 32px;
    text-align: center;
  }
  .sub-name { font-weight: 600; font-size: 14px; }
  .sub-stats { font-size: 11px; color: var(--text-dim); }
  .sub-cancel {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }
  .sub-cancel:active { background: var(--surface2); }

  /* ── FLASH FEEDBACK ── */
  #flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(243,156,18,0.95);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    padding: 10px 24px;
    border-radius: 10px;
    pointer-events: none;
    opacity: 0;
    transition: all 0.15s;
    z-index: 200;
    letter-spacing: 0.05em;
    text-align: center;
    white-space: nowrap;
  }
  #flash.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <!-- Home -->
  <div class="team-score home">
    <div class="team-name">Camden Boys</div>
    <div class="score-row">
      <div class="score-num" id="home-score">0</div>
      <div class="foul-to">
        <span>FOULS <strong id="home-fouls">0</strong></span>
        <span>TO <strong id="home-to-full">3</strong>/<strong id="home-to-30">2</strong></span>
      </div>
    </div>
  </div>

  <!-- Clock -->
  <div id="clock-center">
    <div class="period-nav">
      <button onclick="changePeriod(-1)">‹</button>
      <div id="period-display">1ST</div>
      <button onclick="changePeriod(1)">›</button>
    </div>
    <button id="clock-btn" onclick="toggleClock()">8:00</button>
    <div class="possession-arrow home" id="possession-display" onclick="flipPossession()">
      <span class="arrow">▶</span>
      <span id="possession-label">CAMDEN</span>
    </div>
  </div>

  <!-- Away -->
  <div class="team-score away">
    <div class="team-name">Cape Elizabeth Boys</div>
    <div class="score-row">
      <div class="score-num" id="away-score">0</div>
      <div class="foul-to">
        <span>FOULS <strong id="away-fouls">0</strong></span>
        <span>TO <strong id="away-to-full">3</strong>/<strong id="away-to-30">2</strong></span>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- Home Players -->
  <div class="player-panel home-panel" id="home-panel"></div>

  <!-- Court -->
  <div id="court-wrap">
    <svg id="court-svg" viewBox="0 0 400 340" preserveAspectRatio="xMidYMid meet">
      <!-- Court floor -->
      <rect width="400" height="340" fill="#c8a96e"/>
      <!-- Lane left -->
      <rect x="20" y="100" width="90" height="140" fill="#b8955a" stroke="#8b6914" stroke-width="2"/>
      <!-- Lane right -->
      <rect x="290" y="100" width="90" height="140" fill="#b8955a" stroke="#8b6914" stroke-width="2"/>
      <!-- FT circle left -->
      <circle cx="110" cy="170" r="40" fill="none" stroke="#8b6914" stroke-width="2"/>
      <!-- FT circle right -->
      <circle cx="290" cy="170" r="40" fill="none" stroke="#8b6914" stroke-width="2"/>
      <!-- Center circle -->
      <circle cx="200" cy="170" r="40" fill="none" stroke="#8b6914" stroke-width="2"/>
      <circle cx="200" cy="170" r="4" fill="#8b6914"/>
      <!-- Center line -->
      <line x1="200" y1="20" x2="200" y2="320" stroke="#8b6914" stroke-width="2"/>
      <!-- Court border -->
      <rect x="10" y="20" width="380" height="300" fill="none" stroke="#8b6914" stroke-width="3" rx="4"/>
      <!-- 3pt arc left -->
      <path d="M 20 100 A 120 120 0 0 1 20 240" fill="none" stroke="#8b6914" stroke-width="2"/>
      <!-- 3pt arc right -->
      <path d="M 380 100 A 120 120 0 0 0 380 240" fill="none" stroke="#8b6914" stroke-width="2"/>
      <!-- Backboards -->
      <rect x="10" y="155" width="6" height="30" fill="#8b6914" rx="1"/>
      <rect x="384" y="155" width="6" height="30" fill="#8b6914" rx="1"/>
      <!-- Restricted area left -->
      <path d="M 20 152 A 18 18 0 0 1 20 188" fill="none" stroke="#8b6914" stroke-width="1.5"/>
      <!-- Restricted area right -->
      <path d="M 380 152 A 18 18 0 0 0 380 188" fill="none" stroke="#8b6914" stroke-width="1.5"/>
    </svg>

    <button id="log-toggle" onclick="toggleLog()">LOG ▾</button>

    <div id="log-panel" class="hidden">
      <div class="log-header">
        <span>EVENT LOG</span>
        <button onclick="toggleLog()">✕</button>
      </div>
      <div id="log-entries"></div>
    </div>
  </div>

  <!-- Away Players -->
  <div class="player-panel away-panel" id="away-panel"></div>
</div>

<!-- STAT BAR -->
<div id="stat-bar">
  <div id="selected-player-display">Tap a player to select</div>
  <div class="stat-grid" id="stat-grid"></div>
</div>

<!-- SUB MODAL -->
<div id="sub-modal">
  <div class="sub-box">
    <div class="sub-title" id="sub-title">Substitution</div>
    <div class="sub-subtitle" id="sub-subtitle">Select player entering the game</div>
    <div id="sub-bench-list"></div>
    <button class="sub-cancel" onclick="closeSubModal()">Cancel</button>
  </div>
</div>

<!-- FLASH -->
<div id="flash"></div>

  { key: 'assist',        label: 'Assist',   icon: '✋', type: 'normal'             },
  { key: 'steal',         label: 'Steal',    icon: '⚡', type: 'normal'             },
  { key: 'block',         label: 'Block',    icon: '✋', type: 'normal'             },
  { key: 'turnover',      label: 'T/O',      icon: '↩',  type: 'normal'             },
  { key: 'deflection',    label: 'Defl.',    icon: '✋', type: 'normal'             },
  { key: 'charge_taken',  label: 'Charge',   icon: '🛡', type: 'normal'             },
  { key: 'foul_personal', label: 'P.Foul',   icon: '⚠',  type: 'foul'               },
  { key: 'foul_offensive',label: 'O.Foul',   icon: '⚠',  type: 'foul'               },
  { key: 'foul_flagrant', label: 'Flagrant', icon: '🚨', type: 'foul'               },
  { key: 'foul_technical',label: 'Tech',     icon: '📋', type: 'foul', teamStat: true },
  { key: 'timeout_full',  label: 'TO Full',  icon: '⏸',  type: 'team-stat', teamStat: true },
  { key: 'timeout_30sec', label: 'TO 30s',   icon: '⏸',  type: 'team-stat', teamStat: true },
  { key: 'foul_intentional', label: 'Int.Foul', icon: '⚠', type: 'foul'            },
  { key: 'possession_flip', label: 'Arrow',  icon: '⇄',  type: 'team-stat', teamStat: true },
];

// ── STATE ──
let selectedPlayer = null;
let selectedTeam = null;
let clockInterval = null;
let events = [];
let holdTimer = null;
let logVisible = false;

// ── CLOCK ──
function formatClock(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function toggleClock() {
  if (GAME.clockRunning) {
    clearInterval(clockInterval);
    GAME.clockRunning = false;
  } else {
    clockInterval = setInterval(() => {
      if (GAME.clockSeconds > 0) {
        GAME.clockSeconds--;
        updateClockDisplay();
      } else {
        clearInterval(clockInterval);
        GAME.clockRunning = false;
        updateClockDisplay();
      }
    }, 1000);
    GAME.clockRunning = true;
  }
  updateClockDisplay();
}

function updateClockDisplay() {
  const btn = document.getElementById('clock-btn');
  btn.textContent = formatClock(GAME.clockSeconds);
  btn.classList.toggle('running', GAME.clockRunning);
}

function changePeriod(dir) {
  GAME.period = Math.max(1, Math.min(4, GAME.period + dir));
  GAME.clockSeconds = 480;
  GAME.clockRunning = false;
  clearInterval(clockInterval);
  updateClockDisplay();
  const labels = ['1ST','2ND','3RD','4TH','OT'];
  document.getElementById('period-display').textContent = labels[GAME.period - 1] || `OT${GAME.period - 4}`;
}

function flipPossession() {
  GAME.possession = GAME.possession === 'home' ? 'away' : 'home';
  updatePossessionDisplay();
  logEvent(null, null, 'possession_flip');
}

function updatePossessionDisplay() {
  const el = document.getElementById('possession-display');
  const label = document.getElementById('possession-label');
  el.className = `possession-arrow ${GAME.possession}`;
  label.textContent = GAME.possession === 'home' ? GAME.home.shortName : GAME.away.shortName;
}

// ── PLAYER PANELS ──
function renderPlayers() {
  ['home','away'].forEach(side => {
    const panel = document.getElementById(`${side}-panel`);
    panel.innerHTML = '';

    const onFloor = PLAYERS[side].filter(p => p.onFloor);
    const bench = PLAYERS[side].filter(p => !p.onFloor);

    onFloor.forEach(p => panel.appendChild(makePlayerCard(p, side)));

    if (bench.length) {
      const lbl = document.createElement('div');
      lbl.className = 'bench-label';
      lbl.textContent = 'Bench';
      panel.appendChild(lbl);
      bench.forEach(p => panel.appendChild(makePlayerCard(p, side)));
    }
  });
}

function makePlayerCard(player, side) {
  const div = document.createElement('div');
  div.className = 'player-card' + (player.onFloor ? '' : ' on-bench') +
    (selectedPlayer?.id === player.id ? ' selected' : '');
  div.dataset.id = player.id;
  div.dataset.side = side;

  const foulDots = Array.from({length: 5}, (_, i) =>
    `<div class="foul-dot${i < player.fouls ? ' active' : ''}"></div>`
  ).join('');

  div.innerHTML = `
    <div class="player-number">${player.number}</div>
    <div class="player-name">${player.short}</div>
    <div class="player-pts">${player.pts} pts</div>
    <div class="foul-dots">${foulDots}</div>
  `;

  div.addEventListener('click', () => selectPlayer(player, side));

  // Hold for substitution
  div.addEventListener('pointerdown', () => {
    holdTimer = setTimeout(() => {
      holdTimer = null;
      openSubModal(player, side);
    }, 600);
  });
  div.addEventListener('pointerup', () => clearTimeout(holdTimer));
  div.addEventListener('pointerleave', () => clearTimeout(holdTimer));

  return div;
}

function selectPlayer(player, side) {
  if (holdTimer) return; // was a hold
  selectedPlayer = player;
  selectedTeam = side;
  renderPlayers();
  updateSelectedDisplay();
  updateStatButtons();
}

function updateSelectedDisplay() {
  const el = document.getElementById('selected-player-display');
  if (selectedPlayer) {
    const sideColor = selectedTeam === 'home' ? 'var(--home-light)' : 'var(--away-light)';
    el.innerHTML = `<span style="color:${sideColor}">#${selectedPlayer.number} ${selectedPlayer.name}</span> selected`;
  } else {
    el.textContent = 'Tap a player to select';
  }
}

// ── STAT BUTTONS ──
function renderStatButtons() {
  const grid = document.getElementById('stat-grid');
  grid.innerHTML = '';
  STAT_DEFS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = `stat-btn ${s.type}` + (s.teamStat ? ' team-stat' : '');
    btn.dataset.key = s.key;
    btn.innerHTML = `<span class="stat-icon">${s.icon}</span>${s.label}`;
    btn.addEventListener('click', () => handleStat(s));
    grid.appendChild(btn);
  });
  updateStatButtons();
}

function updateStatButtons() {
  document.querySelectorAll('.stat-btn').forEach(btn => {
    const def = STAT_DEFS.find(s => s.key === btn.dataset.key);
    if (!def) return;
    if (def.teamStat) {
      btn.classList.remove('disabled');
    } else {
      btn.classList.toggle('disabled', !selectedPlayer);
    }
  });
}

// ── HANDLE STAT ──
function handleStat(statDef) {
  if (!statDef.teamStat && !selectedPlayer) return;

  const player = statDef.teamStat ? null : selectedPlayer;
  const team = statDef.teamStat
    ? (selectedTeam || 'home')
    : selectedTeam;

  // Update scores
  if (statDef.pts && player) {
    GAME[team].score += statDef.pts;
    player.pts += statDef.pts;
    document.getElementById(`${team}-score`).textContent = GAME[team].score;
  }

  // Update fouls
  if (statDef.key.startsWith('foul_') && !statDef.teamStat && player) {
    player.fouls++;
    GAME[team].fouls++;
    document.getElementById(`${team}-fouls`).textContent = GAME[team].fouls;
  }

  // Timeouts
  if (statDef.key === 'timeout_full') {
    const t = team;
    if (GAME[t].timeoutsFull > 0) {
      GAME[t].timeoutsFull--;
      document.getElementById(`${t}-to-full`).textContent = GAME[t].timeoutsFull;
    }
  }
  if (statDef.key === 'timeout_30sec') {
    const t = team;
    if (GAME[t].timeouts30 > 0) {
      GAME[t].timeouts30--;
      document.getElementById(`${t}-to-30`).textContent = GAME[t].timeouts30;
    }
  }

  // Possession flip on made baskets
  if (['2pt_made','3pt_made','ft_made','putback_made'].includes(statDef.key)) {
    // Scoring team loses possession
    GAME.possession = team === 'home' ? 'away' : 'home';
    updatePossessionDisplay();
  }

  logEvent(player, team, statDef.key);
  renderPlayers();
  showFlash(statDef.label + (player ? ` — #${player.number}` : ''));
}

// ── EVENT LOG ──
function logEvent(player, team, eventType) {
  const evt = {
    id: Date.now() + Math.random(),
    playerId: player?.id,
    playerName: player?.short,
    playerNumber: player?.number,
    team,
    eventType,
    period: GAME.period,
    clockSeconds: GAME.clockSeconds,
    ts: Date.now()
  };
  events.unshift(evt);
  renderLog();
}

function renderLog() {
  const container = document.getElementById('log-entries');
  if (!container) return;
  container.innerHTML = '';
  events.slice(0, 30).forEach(evt => {
    const row = document.createElement('div');
    row.className = 'log-entry';

    const dot = document.createElement('div');
    dot.className = 'log-team-dot';
    dot.style.background = evt.team === 'home' ? 'var(--home-light)' : 'var(--away-light)';

    const text = document.createElement('div');
    text.className = 'log-text';
    const statLabel = STAT_DEFS.find(s => s.key === evt.eventType)?.label || evt.eventType;
    text.textContent = evt.playerName
      ? `#${evt.playerNumber} ${statLabel}`
      : statLabel;

    const clock = document.createElement('div');
    clock.className = 'log-clock';
    clock.textContent = `Q${evt.period} ${formatClock(evt.clockSeconds)}`;

    const del = document.createElement('button');
    del.className = 'log-delete';
    del.textContent = '✕';
    del.addEventListener('click', () => deleteEvent(evt.id));

    row.appendChild(dot);
    row.appendChild(text);
    row.appendChild(clock);
    row.appendChild(del);
    container.appendChild(row);
  });
}

function deleteEvent(id) {
  const evt = events.find(e => e.id === id);
  if (!evt) return;

  // Reverse the stat
  const def = STAT_DEFS.find(s => s.key === evt.eventType);
  if (def?.pts && evt.playerId) {
    const side = evt.team;
    const player = PLAYERS[side].find(p => p.id === evt.playerId);
    if (player) player.pts -= def.pts;
    GAME[side].score -= def.pts;
    document.getElementById(`${side}-score`).textContent = GAME[side].score;
  }
  if (evt.eventType.startsWith('foul_') && evt.playerId) {
    const side = evt.team;
    const player = PLAYERS[side].find(p => p.id === evt.playerId);
    if (player && player.fouls > 0) player.fouls--;
    if (GAME[side].fouls > 0) GAME[side].fouls--;
    document.getElementById(`${side}-fouls`).textContent = GAME[side].fouls;
  }

  events = events.filter(e => e.id !== id);
  renderLog();
  renderPlayers();
}

function toggleLog() {
  logVisible = !logVisible;
  const panel = document.getElementById('log-panel');
  const toggle = document.getElementById('log-toggle');
  panel.classList.toggle('hidden', !logVisible);
  toggle.classList.toggle('hidden', logVisible);
  if (logVisible) renderLog();
}

// ── SUB MODAL ──
let subTarget = null;

function openSubModal(player, side) {
  subTarget = { player, side };
  const benchPlayers = PLAYERS[side].filter(p => !p.onFloor);
  if (!benchPlayers.length) return;

  document.getElementById('sub-title').textContent =
    `Sub out #${player.number} ${player.short}`;
  document.getElementById('sub-subtitle').textContent = 'Select player entering the game';

  const list = document.getElementById('sub-bench-list');
  list.innerHTML = '';
  const accentColor = side === 'home' ? 'var(--home-light)' : 'var(--away-light)';

  benchPlayers.forEach(bp => {
    const row = document.createElement('div');
    row.className = 'sub-player-row';
    row.innerHTML = `
      <div class="sub-num" style="color:${accentColor}">${bp.number}</div>
      <div>
        <div class="sub-name">${bp.name}</div>
        <div class="sub-stats">${bp.pts} pts · ${bp.fouls} fouls</div>
      </div>
    `;
    row.addEventListener('click', () => completeSub(bp));
    list.appendChild(row);
  });

  document.getElementById('sub-modal').classList.add('show');
}

function completeSub(incoming) {
  if (!subTarget) return;
  const { player: outgoing, side } = subTarget;

  outgoing.onFloor = false;
  incoming.onFloor = true;

  logEvent(outgoing, side, 'sub_out');
  logEvent(incoming, side, 'sub_in');

  if (selectedPlayer?.id === outgoing.id) {
    selectedPlayer = null;
    selectedTeam = null;
    updateSelectedDisplay();
    updateStatButtons();
  }

  closeSubModal();
  renderPlayers();
  showFlash(`SUB: #${incoming.number} IN / #${outgoing.number} OUT`);
}

function closeSubModal() {
  document.getElementById('sub-modal').classList.remove('show');
  subTarget = null;
}

// ── FLASH ──
function showFlash(msg) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 700);
}

// ── INIT ──
function init() {
  renderPlayers();
  renderStatButtons();
  updateClockDisplay();
  updatePossessionDisplay();
}

init();
</script>
</body>

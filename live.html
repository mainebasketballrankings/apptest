<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBR Live</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d1117;
  --ink2:#2a2f3d;
  --ink3:#5a6075;
  --rule:#d8dce8;
  --rule2:#eceef5;
  --paper:#f7f8fc;
  --paper2:#ffffff;
  --home:#1a56db;
  --home-lt:#dbeafe;
  --away:#c0392b;
  --away-lt:#fee2e2;
  --green:#15803d;
  --green-lt:#dcfce7;
  --gold:#b45309;
  --gold-lt:#fef3c7;
  --live:#dc2626;
  --radius:10px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  min-height:100dvh;
}

/* ── HEADER BAR ── */
#site-header{
  background:var(--paper2);
  border-bottom:2px solid var(--ink);
  padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.mbr-wordmark{
  font-family:'Playfair Display',serif;
  font-weight:900;font-size:18px;
  letter-spacing:-.02em;color:var(--ink);
  text-decoration:none;
}
.mbr-wordmark span{color:var(--home);}
#live-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--live);color:#fff;
  font-size:10px;font-weight:600;letter-spacing:.12em;
  padding:4px 10px;border-radius:20px;
  font-family:'DM Mono',monospace;
}
#live-dot{
  width:6px;height:6px;border-radius:50%;
  background:#fff;
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#live-pill.stale{background:var(--ink3);}

/* ── SCOREBOARD ── */
#scoreboard{
  background:var(--paper2);
  border-bottom:2px solid var(--rule);
  padding:16px 20px 12px;
}
.sb-inner{max-width:900px;margin:0 auto;}

.sb-game-info{
  text-align:center;margin-bottom:10px;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;
}

.sb-teams{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:12px;
}

.sb-team{display:flex;flex-direction:column;align-items:center;gap:6px;}
.sb-team.home{align-items:flex-end;}
.sb-team.away{align-items:flex-start;}

.sb-logo{
  width:56px;height:56px;border-radius:50%;
  object-fit:contain;background:var(--rule2);
  border:2px solid var(--rule);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.sb-logo-placeholder{
  width:56px;height:56px;border-radius:50%;
  background:var(--rule2);border:2px solid var(--rule);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:700;font-size:18px;
}
.sb-team.home .sb-logo-placeholder{color:var(--home);background:var(--home-lt);}
.sb-team.away .sb-logo-placeholder{color:var(--away);background:var(--away-lt);}

.sb-name{
  font-family:'Playfair Display',serif;
  font-weight:700;font-size:13px;
  text-align:center;color:var(--ink);
  max-width:130px;line-height:1.2;
}
.sb-team.home .sb-name{text-align:right;}
.sb-team.away .sb-name{text-align:left;}

.sb-fouls{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--ink3);letter-spacing:.06em;
}
.sb-fouls.bonus{color:var(--live);font-weight:600;}

/* Score block */
.sb-scores{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.sb-score-row{
  display:flex;align-items:center;gap:0;
}
.sb-pts{
  font-family:'Playfair Display',serif;
  font-weight:900;font-size:64px;line-height:1;
  min-width:72px;text-align:center;
}
.sb-pts.home{color:var(--home);}
.sb-pts.away{color:var(--away);}
.sb-sep{
  font-family:'DM Mono',monospace;
  font-size:24px;color:var(--rule);
  padding:0 4px;line-height:1;
  align-self:center;
}
.sb-clock-block{
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.sb-clock{
  font-family:'DM Mono',monospace;font-weight:500;
  font-size:22px;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--rule);
  border-radius:6px;padding:3px 12px;letter-spacing:.04em;
  min-width:80px;text-align:center;
}
.sb-clock.running{
  border-color:var(--green);color:var(--green);
  background:var(--green-lt);
}
.sb-period{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;
}
.sb-poss{
  font-size:11px;font-weight:600;letter-spacing:.05em;
  padding:2px 8px;border-radius:20px;
  font-family:'DM Mono',monospace;
}
.sb-poss.home{background:var(--home-lt);color:var(--home);}
.sb-poss.home::before{content:'▶  ';}
.sb-poss.away{background:var(--away-lt);color:var(--away);}
.sb-poss.away::after{content:'  ◀';}

/* Quarter scores */
.sb-qtrs{
  max-width:500px;margin:10px auto 0;
  border-top:1px solid var(--rule2);padding-top:8px;
}
.qtr-grid{
  display:grid;
  grid-template-columns:auto repeat(5, 1fr);
  gap:0;font-family:'DM Mono',monospace;font-size:11px;
}
.qtr-cell{
  padding:3px 8px;text-align:center;color:var(--ink3);
}
.qtr-cell.label{text-align:left;font-size:10px;letter-spacing:.08em;}
.qtr-cell.team{font-weight:600;color:var(--ink);font-size:10px;letter-spacing:.06em;}
.qtr-cell.home-score{color:var(--home);font-weight:600;}
.qtr-cell.away-score{color:var(--away);font-weight:600;}
.qtr-cell.total{font-weight:700;border-left:1px solid var(--rule);color:var(--ink);}
.qtr-cell.home-score.total{color:var(--home);}
.qtr-cell.away-score.total{color:var(--away);}
.qtr-cell.active-q{
  background:var(--rule2);border-radius:4px;
  color:var(--ink)!important;font-weight:700!important;
}

/* ── MAIN LAYOUT ── */
#main{
  max-width:900px;margin:0 auto;
  padding:16px;
  display:grid;
  grid-template-columns:1fr 340px;
  grid-template-rows:auto 1fr;
  gap:16px;
}

/* ── COURT ── */
#court-section{
  background:var(--paper2);
  border:1.5px solid var(--rule);
  border-radius:var(--radius);
  overflow:hidden;
  grid-column:1;grid-row:1 / 3;
}
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1.5px solid var(--rule);
}
.section-title{
  font-family:'Playfair Display',serif;font-weight:700;
  font-size:13px;color:var(--ink);letter-spacing:.01em;
}
.shot-legend{
  display:flex;gap:10px;align-items:center;
  font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;
}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.2);}

#court-svg-wrap{
  padding:10px;
  aspect-ratio:460/380;
}
#fsvg{width:100%;height:100%;display:block;}

/* ── SIDE COLUMN ── */
#side-col{
  grid-column:2;
  display:flex;flex-direction:column;gap:16px;
  min-height:0;
}

/* Box score */
#box-section{
  background:var(--paper2);
  border:1.5px solid var(--rule);
  border-radius:var(--radius);
  overflow:hidden;
  flex:1;
  min-height:0;
  display:flex;flex-direction:column;
}
.box-tabs{
  display:flex;border-bottom:1.5px solid var(--rule);
}
.btab{
  flex:1;padding:8px;text-align:center;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;border:none;background:none;
  color:var(--ink3);font-weight:500;
  border-bottom:2px solid transparent;
  transition:color .15s;
  margin-bottom:-1.5px;
}
.btab.home.active{color:var(--home);border-bottom-color:var(--home);}
.btab.away.active{color:var(--away);border-bottom-color:var(--away);}
.btab:not(.active):hover{color:var(--ink);}

.box-scroll{overflow-y:auto;flex:1;min-height:0;}
.box-table{width:100%;border-collapse:collapse;font-size:11px;}
.box-table th{
  position:sticky;top:0;
  background:var(--paper);
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink3);padding:5px 6px;
  text-align:right;border-bottom:1px solid var(--rule);
  font-weight:500;
}
.box-table th:first-child{text-align:left;}
.box-table td{
  padding:5px 6px;text-align:right;
  border-bottom:1px solid var(--rule2);
  color:var(--ink2);font-family:'DM Mono',monospace;
}
.box-table td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink);}
.box-table tr:last-child td{border-bottom:none;font-weight:700;background:var(--rule2);}
.box-table td.hi{color:var(--home);font-weight:700;}
.box-table td.ha{color:var(--away);font-weight:700;}
.box-bench td{opacity:.55;}
.box-bench td:first-child{font-weight:500;}

/* Play by play */
#feed-section{
  background:var(--paper2);
  border:1.5px solid var(--rule);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;flex-direction:column;
  max-height:260px;
}
.feed-scroll{overflow-y:auto;flex:1;}
.feed-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;border-bottom:1px solid var(--rule2);
  transition:background .3s;
}
.feed-row.new-evt{background:var(--gold-lt);}
.feed-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;
}
.feed-body{flex:1;}
.feed-desc{font-size:12px;color:var(--ink);line-height:1.35;}
.feed-desc strong{font-weight:600;}
.feed-meta{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--ink3);margin-top:1px;letter-spacing:.04em;
}
.feed-pts{
  font-family:'DM Mono',monospace;font-size:10px;
  font-weight:600;flex-shrink:0;white-space:nowrap;
  align-self:center;
}

/* ── LAST PLAY TOAST ── */
#last-play{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:#fff;
  font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:30px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  z-index:200;
  transition:transform .3s cubic-bezier(.34,1.4,.64,1), opacity .3s;
  opacity:0;pointer-events:none;
  white-space:nowrap;max-width:90vw;
  text-overflow:ellipsis;overflow:hidden;
  font-family:'DM Sans',sans-serif;
}
#last-play.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
#last-play .lp-pts{
  display:inline-block;
  background:rgba(255,255,255,.18);
  border-radius:20px;padding:1px 8px;margin-left:6px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:600;
}

/* ── RESPONSIVE ── */
@media(max-width:720px){
  #main{
    grid-template-columns:1fr;
    grid-template-rows:auto auto auto;
    padding:10px;gap:12px;
  }
  #court-section{grid-column:1;grid-row:1;}
  #side-col{grid-column:1;grid-row:2 / 4;max-height:none;}
  #feed-section{max-height:200px;}
  .sb-pts{font-size:48px;}
  .sb-logo-placeholder{width:44px;height:44px;font-size:14px;}
  .sb-name{font-size:12px;}
}

@media(max-width:420px){
  .sb-pts{font-size:38px;}
  .sb-name{max-width:100px;font-size:11px;}
  .sb-logo-placeholder{width:36px;height:36px;font-size:12px;}
  #scoreboard{padding:12px 12px 10px;}
}

/* Scrollbars */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px;}
</style>
</head>
<body>

<!-- SITE HEADER -->

        <div class="qtr-cell home-score" id="qh4">—</div>

        <div class="qtr-cell team" id="qtr-away-label">CAP</div>
        <div class="qtr-cell away-score" id="qa1">—</div>
        <div class="qtr-cell away-score" id="qa2">—</div>
        <div class="qtr-cell away-score" id="qa3">—</div>

</div>

  <!-- SIDE COLUMN -->
  <div id="side-col">

    <!-- BOX SCORE -->
    <div id="box-section">
      <div class="box-tabs">
        <button class="btab home active" onclick="showBox('home')">Camden Hills</button>
        <button class="btab away" onclick="showBox('away')">Cape Elizabeth</button>
      </div>
      <div class="box-scroll">
        <table class="box-table" id="box-table">

let evts = [];

// ── HELPERS ─────────────────────────────────────
const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const findP = (pid, side) => PL[side]?.find(p => p.id === pid);
const PERIODS = ['1st Quarter','2nd Quarter','3rd Quarter','4th Quarter','Overtime'];
const KLBL = {
  '2pt_made':'2-pt basket','2pt_miss':'2-pt miss','3pt_made':'3-pt basket','3pt_miss':'3-pt miss',
  'putback_made':'Putback','putback_miss':'Putback miss',
  'o_reb':'Offensive rebound','d_reb':'Defensive rebound',
  'assist':'Assist','steal':'Steal','block':'Block',
  'turnover':'Turnover','foul_personal':'Personal foul',
  'foul_offensive':'Offensive foul','foul_flagrant':'Flagrant foul',
  'foul_technical':'Technical foul','foul_intentional':'Intentional foul',
  'charge_taken':'Charge taken','deflection':'Deflection',
  'timeout_full':'Full timeout','timeout_30sec':'30-sec timeout',
  'ft_made':'Free throw made','ft_miss':'Free throw missed',
  'sub_in':'Substitution in','sub_out':'Substitution out',
  'possession_flip':'Ball possession',
};
function describeEvt(e) {
  const who = e.pnum ? `#${e.pnum} ${e.pfi}.${e.plast}` : GAME[e.side]?.name || '';
  if (e.key === 'possession_flip') return `${GAME[e.side]?.name} ball`;
  const action = KLBL[e.key] || e.key;
  return who ? `${who} — ${action}` : action;
}

// ── DOM UPDATES ─────────────────────────────────
function updScoreboard() {
  document.getElementById('home-score').textContent = GAME.home.score;
  document.getElementById('away-score').textContent = GAME.away.score;
  document.getElementById('fan-clock').textContent = fmt(GAME.clockSec);
  document.getElementById('fan-clock').className = 'sb-clock' + (GAME.running ? ' running' : '');
  document.getElementById('fan-period').textContent = PERIODS[Math.min(GAME.period-1, 4)];

  // Fouls + bonus
  const hf = GAME.home.fouls, af = GAME.away.fouls;
  const hBonus = hf >= 7, aBonus = af >= 7;
  document.getElementById('home-fouls-display').textContent = `${hf} foul${hf!==1?'s':''}${hBonus?' · BONUS':''}`;
  document.getElementById('home-fouls-display').className = `sb-fouls${hBonus?' bonus':''}`;
  document.getElementById('away-fouls-display').textContent = `${af} foul${af!==1?'s':''}${aBonus?' · BONUS':''}`;
  document.getElementById('away-fouls-display').className = `sb-fouls${aBonus?' bonus':''}`;

  // Possession
  const poss = document.getElementById('poss-display');
  poss.textContent = GAME[GAME.possession].short;
  poss.className = `sb-poss ${GAME.possession}`;

  // Quarter scores
  const q = GAME.period;
  ['home','away'].forEach(side => {
    for (let i=1;i<=4;i++) {
      const el = document.getElementById(`q${side==='home'?'h':'a'}${i}`);
      const val = GAME.qtrs[side][i-1];
      el.textContent = i < q ? val : i === q ? val : '—';
      el.classList.toggle('active-q', i === q);
    }
    document.getElementById(`q${side==='home'?'h':'a'}-tot`).textContent = GAME[side].score;
  });
}

function updBox() {
  const tbody = document.getElementById('box-body');
  tbody.innerHTML = '';
  const side = boxSide;
  const players = PL[side].filter(p => p.on || p.pts > 0 || p.reb > 0 || p.ast > 0);
  const bench = PL[side].filter(p => !p.on && p.pts === 0 && p.reb === 0 && p.ast === 0);

  let tPts=0,tReb=0,tAst=0,tFgm=0,tFga=0,tTpm=0,tTpa=0,tFls=0;
  const colorClass = side === 'home' ? 'hi' : 'ha';

  players.forEach(p => {
    const fg = `${p.fgm}/${p.fga}`;
    const tp = `${p.tpm}/${p.tpa}`;
    const tr = document.createElement('tr');
    if(!p.on) tr.className = 'box-bench';
    tr.innerHTML = `<td>#${p.num} ${p.fi}.${p.last}</td>
      <td class="${p.pts>0?colorClass:''}">${p.pts}</td>
      <td>${p.reb||'—'}</td><td>${p.ast||'—'}</td>
      <td>${p.fga>0?fg:'—'}</td><td>${p.tpa>0?tp:'—'}</td>
      <td>${p.fouls||'—'}</td>`;
    tbody.appendChild(tr);
    tPts+=p.pts;tReb+=p.reb;tAst+=p.ast;tFgm+=p.fgm;tFga+=p.fga;tTpm+=p.tpm;tTpa+=p.tpa;tFls+=p.fouls;
  });

  // Totals
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>TEAM</td>
    <td class="${colorClass}">${tPts}</td>
    <td>${tReb}</td><td>${tAst}</td>
    <td>${tFga>0?tFgm+'/'+tFga:'—'}</td>
    <td>${tTpa>0?tTpm+'/'+tTpa:'—'}</td>
    <td>${tFls||'—'}</td>`;
  tbody.appendChild(tr);
}

function updFeed() {
  const list = document.getElementById('feed-list');
  list.innerHTML = '';
  evts.slice(0, 40).forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'feed-row' + (i === 0 ? ' new-evt' : '');
    const dot = document.createElement('div');
    dot.className = 'feed-dot';
    dot.style.background = e.side === 'home' ? 'var(--home)' : 'var(--away)';
    const body = document.createElement('div');
    body.className = 'feed-body';
    body.innerHTML = `<div class="feed-desc">${describeEvt(e)}</div>
      <div class="feed-meta">Q${e.period} · ${fmt(e.clk)}</div>`;
    const pts = document.createElement('div');
    pts.className = 'feed-pts';
    pts.style.color = e.side === 'home' ? 'var(--home)' : 'var(--away)';
    // Show running score for scoring events
    if (e.scoreSnap) pts.textContent = `${e.scoreSnap.home}–${e.scoreSnap.away}`;
    row.appendChild(dot); row.appendChild(body); row.appendChild(pts);
    list.appendChild(row);
    // Remove highlight after animation
    if(i===0) setTimeout(()=>row.classList.remove('new-evt'), 1500);
  });
}

function addDot(pt, made, three, isPb) {
  const g = document.getElementById('fan-dots');
  const id = 'd'+Date.now()+Math.random().toString(36).slice(2,4);
  if(made) {
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', pt.x); c.setAttribute('cy', pt.y); c.setAttribute('r', '7');
    c.setAttribute('fill', isPb ? '#a78bfa' : three ? '#b45309' : '#15803d');
    c.setAttribute('fill-opacity','.8');
    c.setAttribute('stroke','rgba(255,255,255,.5)'); c.setAttribute('stroke-width','1.5');
    c.setAttribute('id', id); g.appendChild(c);
  } else {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', pt.x); t.setAttribute('y', pt.y+5.5);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','17');
    t.setAttribute('fill', isPb ? '#a78bfa' : '#c0392b');
    t.setAttribute('font-weight','bold'); t.setAttribute('id', id);
    t.textContent = '×'; g.appendChild(t);
  }
}

function showToast(msg, side) {
  const el = document.getElementById('last-play');
  el.innerHTML = msg;
  el.className = 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

function showBox(side) {
  boxSide = side;
  document.querySelectorAll('.btab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.btab.${side}`).classList.add('active');
  updBox();
}

// ── PROCESS INCOMING EVENT ──────────────────────
// This is the main intake function — same shape as scorer's pushEvt event object.
// When Supabase realtime is wired in, each INSERT on game_events calls this.
function onEvent(e) {
  // Snapshot running score onto event for feed display
  e.scoreSnap = { home: GAME.home.score, away: GAME.away.score };

  evts.unshift(e);

  const side = e.side;
  const p = e.pid ? findP(e.pid, side) : null;

  // Update clock / period state
  GAME.clockSec = e.clk;
  GAME.period = e.period;

  // Score updates
  if (e.key === '2pt_made' || e.key === 'putback_made') {
    GAME[side].score += 2;
    GAME.qtrs[side][e.period-1] += 2;
    if(p){ p.pts += 2; p.fgm++; p.fga++; }
    GAME.possession = side === 'home' ? 'away' : 'home';
    e.scoreSnap = { home: GAME.home.score, away: GAME.away.score };
    showToast(`<strong>#${e.pnum} ${e.pfi}.${e.plast}</strong> — 2 pts<span class="lp-pts">${GAME.home.score}–${GAME.away.score}</span>`, side);
  } else if (e.key === '3pt_made') {
    GAME[side].score += 3;
    GAME.qtrs[side][e.period-1] += 3;
    if(p){ p.pts += 3; p.fgm++; p.fga++; p.tpm++; p.tpa++; }
    GAME.possession = side === 'home' ? 'away' : 'home';
    e.scoreSnap = { home: GAME.home.score, away: GAME.away.score };
    showToast(`<strong>#${e.pnum} ${e.pfi}.${e.plast}</strong> — 3-pointer! 🔥<span class="lp-pts">${GAME.home.score}–${GAME.away.score}</span>`, side);
  } else if (e.key === 'ft_made') {
    GAME[side].score += 1;
    GAME.qtrs[side][e.period-1] += 1;
    if(p) p.pts += 1;
    e.scoreSnap = { home: GAME.home.score, away: GAME.away.score };
  } else if (e.key === '2pt_miss' || e.key === 'putback_miss') {
    if(p) p.fga++;
  } else if (e.key === '3pt_miss') {
    if(p){ p.fga++; p.tpa++; }
  } else if (e.key === 'assist') {
    if(p) p.ast++;
  } else if (e.key === 'o_reb' || e.key === 'd_reb') {
    if(p) p.reb++;
    if(e.key === 'o_reb') showToast(`<strong>#${e.pnum} ${e.pfi}.${e.plast}</strong> — offensive rebound`, side);
  } else if (e.key === 'steal') {
    showToast(`<strong>#${e.pnum} ${e.pfi}.${e.plast}</strong> — steal ⚡`, side);
  } else if (e.key === 'block') {
    showToast(`<strong>#${e.pnum} ${e.pfi}.${e.plast}</strong> — block ✋`, side);
  } else if (e.key === 'turnover') {
    if(p) {} // tracked in feed
    showToast(`<strong>#${e.pnum} ${e.pfi}.${e.plast}</strong> — turnover`, side);
  } else if (e.key.startsWith('foul_')) {
    if(p && !GAME[side]?.team) p.fouls++;
    GAME[side].fouls++;
    const bonus = GAME[side].fouls >= 7;
    if(bonus) showToast(`${GAME[side].name} in the bonus`, side);
  } else if (e.key === 'timeout_full') {
    GAME[side].tof = Math.max(0, GAME[side].tof - 1);
    showToast(`${GAME[side].name} full timeout`, side);
  } else if (e.key === 'timeout_30sec') {
    GAME[side].to3 = Math.max(0, GAME[side].to3 - 1);
    showToast(`${GAME[side].name} 30-second timeout`, side);
  } else if (e.key === 'possession_flip') {
    GAME.possession = side;
  } else if (e.key === 'sub_in') {
    if(p) p.on = true;
  } else if (e.key === 'sub_out') {
    if(p) p.on = false;
  }

  // Shot dots on chart
  if (['2pt_made','3pt_made','2pt_miss','3pt_miss','putback_made','putback_miss'].includes(e.key) && e.pt) {
    const made = e.key.endsWith('_made');
    const three = e.key.startsWith('3pt');
    const isPb = e.key.startsWith('putback');
    addDot(e.pt, made, three, isPb);
  }

  updScoreboard();
  updBox();
  updFeed();
}

// ── CLOCK SIM ────────────────────────────────────
// The fan view doesn't own the clock — it reflects what the scorer sends.
// But in demo mode we tick locally to show a live clock feel.
let demoClkInt = null;
function startDemoClock() {
  if(demoClkInt) return;
  demoClkInt = setInterval(() => {
    if(GAME.clockSec > 0) {
      GAME.clockSec--;
      GAME.running = true;
      document.getElementById('fan-clock').textContent = fmt(GAME.clockSec);
      document.getElementById('fan-clock').className = 'sb-clock running';
    }
  }, 1000);
}

let simIdx = 0;
function runSimulator() {
  if(simIdx >= SIM_EVENTS.length) {
    document.getElementById('live-pill').classList.add('stale');
    document.getElementById('live-label').textContent = 'FINAL';
    if(demoClkInt){ clearInterval(demoClkInt); demoClkInt=null; }
    return;
  }
  const e = SIM_EVENTS[simIdx++];
  onEvent(e);

  // Simulate clock running between events
  if(!demoClkInt && GAME.clockSec > 0) startDemoClock();

  // Vary pace — scoring plays get a short pause for drama
  const delay = ['2pt_made','3pt_made','putback_made'].includes(e.key) ? 3200 : 2200;
  setTimeout(runSimulator, delay + Math.random()*800);
}

// ── INIT ────────────────────────────────────────
function initView(homeTeam, awayTeam) {
  GAME.home.name = homeTeam.name;
  GAME.home.short = homeTeam.short;
  GAME.away.name = awayTeam.name;
  GAME.away.short = awayTeam.short;

  document.getElementById('home-name').textContent = homeTeam.name;
  document.getElementById('away-name').textContent = awayTeam.name;
  document.getElementById('qtr-home-label').textContent = homeTeam.short;
  document.getElementById('qtr-away-label').textContent = awayTeam.short;
  document.querySelector('.btab.home').textContent = homeTeam.name;
  document.querySelector('.btab.away').textContent = awayTeam.name;

  // Logo placeholder initials
  document.getElementById('home-logo').textContent = homeTeam.name.charAt(0);
  document.getElementById('away-logo').textContent = awayTeam.name.charAt(0);

  // Try Cloudinary logos (gracefully falls back to placeholder)
  if(homeTeam.logoUrl) {
    const img = document.createElement('img');
    img.src = homeTeam.logoUrl;
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;border-radius:50%;';
    img.onerror = () => {};
    const el = document.getElementById('home-logo');
    el.innerHTML = '';
    el.appendChild(img);
  }
  if(awayTeam.logoUrl) {
    const img = document.createElement('img');
    img.src = awayTeam.logoUrl;
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;border-radius:50%;';
    img.onerror = () => {};
    const el = document.getElementById('away-logo');
    el.innerHTML = '';
    el.appendChild(img);
  }

  updScoreboard();
  updBox();
  updFeed();
}

// Boot
initView(
  { name:'Camden Hills', short:'CAM',
    logoUrl:'https://res.cloudinary.com/dulfssb6y/image/upload/mbr-logos/camden-hills.png' },
  { name:'Cape Elizabeth', short:'CAP',
    logoUrl:'https://res.cloudinary.com/dulfssb6y/image/upload/mbr-logos/cape-elizabeth.png' }
);

// Start sim after a short delay
setTimeout(runSimulator, 1200);

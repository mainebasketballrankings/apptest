<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matchup — Maine Basketball Rankings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --green:   #2d6a4f;
      --green2:  #40916c;
      --greenlt: #d8f3dc;
      --orange:  #ee6730;
      --black:   #1a1a1a;
      --lgray:   #999;
      --border:  #e5e5e5;
      --bg:      #f4f5f9;
      --card:    #fff;
      --red:     #c0392b;
      --gold:    #d4a00a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }

    .page-wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── Gate ── */
    .gate-blur { filter: blur(6px); pointer-events: none; user-select: none; }
    #gateWrap  { position: relative; }
    .gate-overlay { position: absolute; inset: 0; z-index: 10; display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; }
    .gate-box { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 36px 32px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .gate-box h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .gate-box p  { font-size: 14px; color: var(--lgray); margin-bottom: 20px; line-height: 1.5; }
    .gate-subscribe { display: inline-block; background: var(--green); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 24px; border-radius: 6px; text-decoration: none; margin-bottom: 12px; }
    .gate-login-link { display: block; background: none; border: none; color: var(--lgray); font-size: 13px; cursor: pointer; font-family: 'Barlow', sans-serif; margin: 0 auto; }
    .gate-login-link:hover { color: var(--green); }

    /* ── Spinner ── */
    .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 24px; color: var(--lgray); font-size: 15px; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green2); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Hero ── */
    .hero { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
    .hero-meta { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #fafafa; border-bottom: 1px solid var(--border); font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--lgray); }

    .hero-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 24px 20px 20px; gap: 12px; }
    .hero-team  { display: flex; flex-direction: column; gap: 6px; }
    .hero-team.away { align-items: flex-end; text-align: right; }
    .hero-team.home { align-items: flex-start; }

    .hero-logo      { width: 56px; height: 56px; object-fit: contain; }
    .hero-logo-init { width: 56px; height: 56px; background: var(--greenlt); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; color: var(--green); }
    .hero-name   { font-weight: 600; font-size: 17px; line-height: 1.2; }
    .hero-rank-line { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--green2); letter-spacing: 0.3px; }
    .hero-rnk   { color: var(--lgray); font-weight: 600; }
    .hero-score  { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 700; line-height: 1; margin-top: 4px; }

    .hero-vs     { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .hero-vs-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--lgray); }
    .hero-loc    { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; color: var(--lgray); text-align: center; max-width: 72px; line-height: 1.4; }

    .stax-badge { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; }
    .stax-badge.gray   { color: #aaa; }
    .stax-badge.yellow { color: var(--gold); }
    .stax-badge.orange { color: var(--orange); }
    .stax-badge.red    { color: var(--red); }

    /* ── Win prob bar ── */
    .win-prob { padding: 0 20px 18px; }
    .win-prob-bar { height: 7px; border-radius: 4px; background: var(--border); overflow: hidden; margin-bottom: 5px; display: flex; }
    .win-prob-fill-home { background: var(--green2); transition: width 0.6s ease; }
    .win-prob-fill-away { background: #bbb; transition: width 0.6s ease; }
    .win-prob-labels { display: flex; justify-content: space-between; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--lgray); }
    .win-prob-labels .pct { font-size: 12px; color: var(--black); }

    /* ── Model pick ── */
    .pick-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 20px; border-top: 1px solid var(--border); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--lgray); }
    .pick-team-label { color: var(--green); font-size: 15px; font-weight: 700; }
    .spread-label    { color: var(--black); font-size: 15px; }

    /* ── Comparison table ── */
    .cmp-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
    .cmp-header { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--lgray); padding: 9px 16px; background: #fafafa; border-bottom: 1px solid var(--border); text-align: center; }

    .cmp-row { display: grid; grid-template-columns: 1fr 140px 1fr; align-items: center; padding: 7px 14px; border-bottom: 1px solid var(--border); }
    .cmp-row:last-child { border-bottom: none; }

    .cmp-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--lgray); text-align: center; }

    .cmp-cell { display: flex; flex-direction: column; gap: 2px; }
    .cmp-cell.home { align-items: flex-start; }
    .cmp-cell.away { align-items: flex-end; }

    .cmp-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; line-height: 1; }
    .cmp-val.better { color: var(--green2); }
    .cmp-val.worse  { color: var(--lgray); }

    .cmp-ranks { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; color: var(--lgray); letter-spacing: 0.3px; }
    .cmp-ranks span { color: var(--black); }

    /* ── ATS chips ── */
    .chips-row { display: flex; gap: 12px; margin-bottom: 14px; }
    .chip { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: center; }
    .chip-val { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
    .chip-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--lgray); }

    .watermark { text-align: center; padding: 20px 0 0; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--lgray); }

    @media (max-width: 580px) {
      .cmp-row { grid-template-columns: 1fr 120px 1fr; }
      .cmp-val { font-size: 14px; }
      .hero-name { font-size: 15px; }
    }
  </style>
</head>
<body>

<div id="mbr-header"></div>

<div class="page-wrap">
  <div id="gateWrap">
    <div id="content">
      <div class="state-msg"><div class="spinner"></div><span>Loading matchup…</span></div>
    </div>
  </div>
</div>

<script>
const SPORT_SCORE_LABELS = {
  'basketball':   ['Pts Scored', 'Pts Allowed'],
  'football':     ['Pts Scored', 'Pts Allowed'],
  'soccer':       ['Goals For',  'Goals Against'],
  'lacrosse':     ['Goals For',  'Goals Against'],
  'field-hockey': ['Goals For',  'Goals Against'],
  'baseball':     ['Runs For',   'Runs Against'],
  'softball':     ['Runs For',   'Runs Against'],
  'volleyball':   ['Sets Won',   'Sets Lost'],
};
const SPORT_IDS = {
  'basketball':   'b31ab283-b28e-4ba8-9684-b1cf30cea219',
  'baseball':     'c87a4d6c-a471-47e1-b6a0-d1643d942bf0',
  'softball':     '095c9841-7261-4cb1-824e-6304792b53d0',
  'lacrosse':     '9c34ec5c-0e4c-4b5a-8e3a-7f2d1c9b4a6e',
  'soccer':       'ff80a695-0e78-4432-98f2-141b2b571e0e',
  'field-hockey': '1054869a-2b3c-4d5e-6f7a-8b9c0d1e2f3a',
  'football':     'fa905ca5-1234-5678-abcd-ef0123456789',
  'volleyball':   'e26b0fcc-e661-4945-8b2d-063c37ace44f',
};
const SPORT_KEY_BY_ID = Object.fromEntries(Object.entries(SPORT_IDS).map(([k,v])=>[v,k]));

var _isPaid = false;

function applyGate(isPaid) {
  if (isPaid !== undefined) _isPaid = isPaid;
  const wrap = document.getElementById('gateWrap');
  const content = document.getElementById('content');
  document.getElementById('gateOverlay')?.remove();
  content.classList.remove('gate-blur');
  if (!_isPaid) {
    content.classList.add('gate-blur');
    const ov = document.createElement('div');
    ov.className = 'gate-overlay'; ov.id = 'gateOverlay';
    ov.innerHTML = `<div class="gate-box">
      <h3>Paid Subscribers Only</h3>
      <p>Matchup data is available to MBR paid subscribers.<br>Get full access for just $6/month.</p>
      <a class="gate-subscribe" href="https://mainebasketballrankings.com/#/portal/signup" target="_blank">Subscribe</a>
      <button class="gate-login-link" id="gateLoginBtn">Already a subscriber? Sign in</button>
    </div>`;
    wrap.appendChild(ov);
    document.getElementById('gateLoginBtn').addEventListener('click', () => document.getElementById('mbrSignInBtn')?.click());
  }
}

window.mbrAuthCallback = function(user, isPaid) {
  applyGate(isPaid);
  if (isPaid) loadMatchup();
};

// ── Rank helpers ────────────────────────────────────────────────────────────

// Rank a set of snaps by a stat. Returns map of team_id -> rank (1=best)
function computeRanks(snaps, statFn, higherIsBetter = true) {
  const valid = snaps.filter(s => statFn(s) != null).sort((a, b) =>
    higherIsBetter ? statFn(b) - statFn(a) : statFn(a) - statFn(b));
  const map = {};
  valid.forEach((s, i) => { map[s.team_id] = i + 1; });
  return map;
}

function rankBracket(stateRanks, classRanks, regionRanks, teamId, cls, reg) {
  const s = stateRanks[teamId];
  const c = classRanks[teamId];
  const r = regionRanks[teamId];
  const parts = [];
  if (s) parts.push(`<span>#${s}</span>`);
  if (c) parts.push(`<span>#${c} ${cls}</span>`);
  if (r && reg) parts.push(`<span>#${r} ${reg}</span>`);
  if (!parts.length) return '';
  return parts.join(' <span style="color:var(--border)">|</span> ');
}

// ── Load ─────────────────────────────────────────────────────────────────────

async function loadMatchup() {
  const el     = document.getElementById('content');
  const gameId = new URLSearchParams(window.location.search).get('game_id');
  if (!gameId) { el.innerHTML = '<div class="state-msg">No game specified.</div>'; return; }

  const sb = MBRNav.getSB();

  // 1. Fetch game
  const { data: game, error: gErr } = await sb.from('games').select(`
    id, game_date, game_time, location, sport_id, season_year,
    home_score, away_score, status, stax_index, pick_team, spread,
    home_team:home_team_id ( id, school_name, gender, logo_url, team_class, team_region,
      team_classifications ( classes(name), regions(name,abbreviation) ) ),
    away_team:away_team_id ( id, school_name, gender, logo_url, team_class, team_region,
      team_classifications ( classes(name), regions(name,abbreviation) ) )
  `).eq('id', gameId).single();

  if (gErr || !game) { el.innerHTML = '<div class="state-msg">Game not found.</div>'; return; }

  const home = game.home_team, away = game.away_team;
  const sportKey = SPORT_KEY_BY_ID[game.sport_id] || 'basketball';

  // 2. Fetch ALL snapshots for this sport+season+gender (for ranking)
  let allSnaps = [], offset = 0;
  while (true) {
    const { data: batch } = await sb.from('rankings_snapshots')
      .select(`team_id, avg_pf, avg_pa, sos, pct_perfect, vs_top_25, vs_top_50,
               win_pct, heal_points, ats_record, snapshot_date,
               team:team_id(sport_id, gender, team_class, team_region)`)
      .eq('season_year', game.season_year)
      .order('snapshot_date', { ascending: false })
      .range(offset, offset + 999);
    if (!batch || !batch.length) break;
    allSnaps.push(...batch);
    if (batch.length < 1000) break;
    offset += 1000;
  }

  // Keep only latest snap per team, filter to this sport+gender
  const latestMap = {};
  for (const s of allSnaps) {
    if (!latestMap[s.team_id]) latestMap[s.team_id] = s;
  }
  const sportSnaps = Object.values(latestMap).filter(s =>
    s.team?.sport_id === game.sport_id && s.team?.gender === home.gender);

  const hSnap = latestMap[home.id] || {};
  const aSnap = latestMap[away.id] || {};

  const homeCls = home.team_class || home.team_classifications?.classes?.name || '?';
  const awayCls = away.team_class || away.team_classifications?.classes?.name || '?';
  const homeReg = home.team_region || home.team_classifications?.regions?.abbreviation || '';
  const awayReg = away.team_region || away.team_classifications?.regions?.abbreviation || '';

  // 3. Build rank lookup tables (state, class, region) for each stat
  function makeRanks(statFn, hiGood = true) {
    const state  = computeRanks(sportSnaps, statFn, hiGood);
    const cls    = computeRanks(sportSnaps.filter(s => s.team?.team_class === homeCls), statFn, hiGood);
    const reg    = computeRanks(sportSnaps.filter(s => s.team?.team_region === homeReg), statFn, hiGood);
    return { state, cls, reg };
  }

  const pfRanks  = makeRanks(s => s.avg_pf,       true);
  const paRanks  = makeRanks(s => s.avg_pa,        false); // lower PA = better
  const difRanks = makeRanks(s => (s.avg_pf != null && s.avg_pa != null) ? s.avg_pf - s.avg_pa : null, true);
  const sosRanks = makeRanks(s => s.sos,            true);
  const pctRanks = makeRanks(s => s.pct_perfect,    true);
  const t25Ranks = makeRanks(s => s.vs_top_25,      true);
  const t50Ranks = makeRanks(s => s.vs_top_50,      true);


  // 4. Fetch rest days (last game before this one for each team)
  async function getLastGame(teamId) {
    const { data } = await sb.from('games')
      .select('game_date')
      .eq('status', 'final')
      .eq('season_year', game.season_year)
      .lt('game_date', game.game_date)
      .or(`home_team_id.eq.${teamId},away_team_id.eq.${teamId}`)
      .order('game_date', { ascending: false })
      .limit(1);
    return data?.[0]?.game_date || null;
  }

  const [hLastDate, aLastDate] = await Promise.all([
    getLastGame(home.id),
    getLastGame(away.id),
  ]);

  function restDays(lastDate) {
    if (!lastDate) return null;
    const d1 = new Date(game.game_date + 'T12:00:00');
    const d2 = new Date(lastDate + 'T12:00:00');
    return Math.round((d1 - d2) / 86400000);
  }

  const hRest = restDays(hLastDate);
  const aRest = restDays(aLastDate);

  el.innerHTML = buildMatchup({
    game, home, away, hSnap, aSnap,
    homeCls, awayCls, homeReg, awayReg,
    pfRanks, paRanks, difRanks, sosRanks, pctRanks, t25Ranks, t50Ranks,
    hRest, aRest,
    scoreLabels: SPORT_SCORE_LABELS[sportKey] || ['Pts Scored', 'Pts Allowed'],
  });
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function logoEl(team) {
  if (team.logo_url) return `
    <img class="hero-logo" src="${team.logo_url}" alt="${team.school_name}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="hero-logo-init" style="display:none">${team.school_name[0]}</div>`;
  return `<div class="hero-logo-init">${team.school_name[0]}</div>`;
}

function fmt(v, d=1)  { return (v==null||isNaN(v)) ? '—' : Number(v).toFixed(d); }
function fmtPct(v)    { return (v==null||isNaN(v)) ? '—' : (Number(v)*100).toFixed(1)+'%'; }
function fmtRec(s)    { return s.wins != null ? `${s.wins}–${s.losses??0}` : null; }
function fmtDiff(pf, pa) {
  if (pf==null||pa==null) return '—';
  const d = (Number(pf)-Number(pa)).toFixed(1);
  return d >= 0 ? `+${d}` : `${d}`;
}

function staxEl(val) {
  if (!val) return '';
  const n = parseFloat(val);
  const cls = n>=80?'red':n>=65?'orange':n>=50?'yellow':'gray';
  return `<span class="stax-badge ${cls}">⚡${n.toFixed(1)}</span>`;
}

function betterCls(hv, av, hiGood=true) {
  if (hv==null||av==null||isNaN(hv)||isNaN(av)) return ['',''];
  return (hiGood ? hv>=av : hv<=av) ? ['better','worse'] : ['worse','better'];
}

// ── Build ─────────────────────────────────────────────────────────────────────

function buildMatchup({ game, home, away, hSnap, aSnap,
  homeCls, awayCls, homeReg, awayReg,
  pfRanks, paRanks, difRanks, sosRanks, pctRanks, t25Ranks, t50Ranks,
  hRest, aRest, scoreLabels }) {

  const isFinal = game.status==='final', isLive = game.status==='active';
  const crossCls = homeCls !== awayCls;
  const clsLabel = crossCls ? `Cross-Class · ${home.gender}` : `Class ${homeCls} · ${home.gender}`;
  const dateStr  = game.game_date
    ? new Date(game.game_date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
    : '';
  const statusLabel = isFinal ? `Final · ${dateStr}` : isLive ? `Live · ${dateStr}` : dateStr;

  // Win prob
  let winProbHTML = '';
  if (hSnap.win_pct != null && aSnap.win_pct != null) {
    const total = hSnap.win_pct + aSnap.win_pct;
    const hp = total > 0 ? (hSnap.win_pct / total * 100).toFixed(0) : 50;
    const ap = 100 - hp;
    winProbHTML = `<div class="win-prob">
      <div class="win-prob-bar">
        <div class="win-prob-fill-away" style="width:${ap}%"></div>
        <div class="win-prob-fill-home" style="width:${hp}%"></div>
      </div>
      <div class="win-prob-labels">
        <span>${away.school_name.split(' ').pop()} <span class="pct">${ap}%</span></span>
        <span><span class="pct">${hp}%</span> ${home.school_name.split(' ').pop()}</span>
      </div>
    </div>`;
  }

  // Pick
  let pickHTML = '';
  if (game.pick_team && game.spread != null) {
    const pickName = game.pick_team===home.id ? home.school_name : away.school_name;
    const stax = staxEl(game.stax_index);
    pickHTML = `<div class="pick-row">
      ${stax ? stax+'<span style="color:var(--border)">·</span>' : ''}
      <span>Model Pick:</span>
      <span class="pick-team-label">${pickName}</span>
      <span class="spread-label">+${Math.abs(game.spread).toFixed(1)}</span>
    </div>`;
  }

  // cmp row builder
  function cmpRow(label, hVal, aVal, hRankHTML, aRankHTML, hCls, aCls) {
    return `<div class="cmp-row">
      <div class="cmp-cell away">
        <span class="cmp-val ${aCls}">${aVal}</span>
        ${aRankHTML ? `<span class="cmp-ranks">${aRankHTML}</span>` : ''}
      </div>
      <div class="cmp-label">${label}</div>
      <div class="cmp-cell home">
        <span class="cmp-val ${hCls}">${hVal}</span>
        ${hRankHTML ? `<span class="cmp-ranks">${hRankHTML}</span>` : ''}
      </div>
    </div>`;
  }

  function bracketFor(ranks, teamId, cls, reg, isHome) {
    const s  = ranks.state[teamId];
    const cr = isHome ? ranks.hCls[teamId]  : ranks.aCls[teamId];
    const rr = isHome ? ranks.hReg[teamId]  : ranks.aReg[teamId];
    const parts = [];
    if (s)        parts.push(`<span>#${s}</span>`);
    if (cr)       parts.push(`<span>#${cr} ${cls}</span>`);
    if (rr && reg) parts.push(`<span>#${rr} ${reg}</span>`);
    return parts.length ? `[ ${parts.join(' <span style="opacity:.3">|</span> ')} ]` : '';
  }

  function statCmpRow(label, hRaw, aRaw, ranks, fmtFn, hiGood=true) {
    const [hc, ac] = betterCls(hRaw, aRaw, hiGood);
    return cmpRow(label,
      fmtFn(hRaw), fmtFn(aRaw),
      bracketFor(ranks, home.id, homeCls, homeReg, true),
      bracketFor(ranks, away.id, awayCls, awayReg, false),
      hc, ac);
  }

  const hDiff = hSnap.avg_pf != null && hSnap.avg_pa != null ? hSnap.avg_pf - hSnap.avg_pa : null;
  const aDiff = aSnap.avg_pf != null && aSnap.avg_pa != null ? aSnap.avg_pf - aSnap.avg_pa : null;
  const [hDc, aDc] = betterCls(hDiff, aDiff, true);

  // Rest days
  const restRow = (hRest != null || aRest != null) ? cmpRow(
    'Rest Days',
    hRest != null ? `${hRest}d` : '—',
    aRest != null ? `${aRest}d` : '—',
    '', '', '', '') : '';

  // ATS
  const hAts = hSnap.ats_record || '—';
  const aAts = aSnap.ats_record || '—';

  // Hero rank line
  function heroRankLine(snap, cls, reg) {
    const parts = [];
    if (snap.rank_overall != null) parts.push(`#${snap.rank_overall} State`);
    // We don't have rank_class/rank_region in our fetched snaps here — show class/region from team
    return parts.join(' · ') || '';
  }

  return `
  <div class="hero">
    <div class="hero-meta">
      <span>${statusLabel}</span>
      <span>${clsLabel}</span>
      ${!game.pick_team ? staxEl(game.stax_index) : ''}
    </div>
    <div class="hero-teams">
      <div class="hero-team away">
        ${logoEl(away)}
        <div class="hero-name">${aSnap.rank_overall ? '<span class=\'hero-rnk\'>#'+aSnap.rank_overall+'</span> ' : ''}${away.school_name}</div>
        <div class="hero-rank-line">${awayCls}${awayReg ? ' · '+awayReg : ''}</div>
        ${isFinal ? `<div class="hero-score">${game.away_score??'–'}</div>` : ''}
      </div>
      <div class="hero-vs">
        <div class="hero-vs-label">vs</div>
        ${game.location ? `<div class="hero-loc">@ ${game.location}</div>` : ''}
      </div>
      <div class="hero-team home">
        ${logoEl(home)}
        <div class="hero-name">${hSnap.rank_overall ? '<span class=\'hero-rnk\'>#'+hSnap.rank_overall+'</span> ' : ''}${home.school_name}</div>
        <div class="hero-rank-line">${homeCls}${homeReg ? ' · '+homeReg : ''}</div>
        ${isFinal ? `<div class="hero-score">${game.home_score??'–'}</div>` : ''}
      </div>
    </div>
    ${winProbHTML}
    ${pickHTML}
  </div>

  <div class="cmp-section">
    <div class="cmp-header">Scoring</div>
    ${statCmpRow(scoreLabels[0], hSnap.avg_pf, aSnap.avg_pf, pfRanks, v=>fmt(v), true)}
    ${statCmpRow(scoreLabels[1], hSnap.avg_pa, aSnap.avg_pa, paRanks, v=>fmt(v), false)}
    <div class="cmp-row">
      <div class="cmp-cell away">
        <span class="cmp-val ${aDc}">${fmtDiff(aSnap.avg_pf, aSnap.avg_pa)}</span>
        <span class="cmp-ranks">${bracketFor(difRanks, away.id, awayCls, awayReg, false)}</span>
      </div>
      <div class="cmp-label">+/–</div>
      <div class="cmp-cell home">
        <span class="cmp-val ${hDc}">${fmtDiff(hSnap.avg_pf, hSnap.avg_pa)}</span>
        <span class="cmp-ranks">${bracketFor(difRanks, home.id, homeCls, homeReg, true)}</span>
      </div>
    </div>
  </div>

  <div class="cmp-section">
    <div class="cmp-header">Schedule &amp; Domination</div>
    ${statCmpRow('SOS',       hSnap.sos,        aSnap.sos,        sosRanks, v=>fmt(v,2), true)}
    ${statCmpRow('%Perfect',  hSnap.pct_perfect, aSnap.pct_perfect, pctRanks, v=>fmtPct(v), true)}
    ${statCmpRow('%vs Top 25', hSnap.vs_top_25, aSnap.vs_top_25, t25Ranks, v=>fmtPct(v), true)}
    ${statCmpRow('%vs Top 50', hSnap.vs_top_50, aSnap.vs_top_50, t50Ranks, v=>fmtPct(v), true)}
  </div>

  <div class="cmp-section">
    <div class="cmp-header">Assorted</div>
    ${cmpRow('Record', hSnap.wins!=null?hSnap.wins+'-'+(hSnap.losses??0):'—', aSnap.wins!=null?aSnap.wins+'-'+(aSnap.losses??0):'—', '', '', '', '')}
    ${cmpRow('ATS', hAts, aAts, '', '', '', '')}
    ${restRow}
  </div>

  <div class="watermark">mainebasketballrankings.com</div>`;
}
</script>
<script src="nav.js"></script>
<script>MBRNav.init({ active: 'matchup' });</script>
</body>
</html>

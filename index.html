<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maine Basketball Rankings — Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="nav.css" />

  <style>
    :root {
      --green:  #1a7a4a;
      --green2: #22a863;
      --red:    #c0392b;
      --gray:   #555;
      --lgray:  #999;
      --border: #e2e2e2;
      --bg:     #f0f0f0;
      --white:  #fff;
      --black:  #111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
    }


    /* PAGE */
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }

    /* DATE BAR */
    .date-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .date-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: var(--black);
    }

    .date-nav { display: flex; align-items: center; gap: 6px; }

    .date-picker {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--gray);
      padding: 0 10px; height: 34px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
    }
    .date-picker:focus { border-color: #bbb; }

    .date-btn {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--gray);
      width: 34px; height: 34px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .date-btn:hover { background: var(--bg); color: var(--black); border-color: #bbb; }

    .date-today {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--gray);
      padding: 0 14px; height: 34px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .date-today:hover { background: var(--bg); color: var(--black); border-color: #bbb; }

    /* SPORT TABS */
    .sport-tabs {
      display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .sport-tab {
      padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--white); font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--gray); transition: all .15s;
    }
    .sport-tab:hover { border-color: #bbb; color: var(--black); }
    .sport-tab.active { background: var(--black); border-color: var(--black); color: #fff; }

    /* FILTERS */
    .filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }

    .filter-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--gray);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--black); border-color: #bbb; }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* SECTION LABEL */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--lgray);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* GRID */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 10px;
      margin-bottom: 30px;
    }

    /* CARD */
    .game-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    .game-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.09); }

    .game-card.live {
      border-color: var(--green2);
      box-shadow: 0 0 0 1px var(--green2), 0 4px 18px rgba(34,168,99,0.12);
    }

    /* status bar */
    .card-top {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 5px 12px;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--lgray);
    }

    .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green2);
      margin-right: 5px;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* teams */
    .card-body { padding: 12px 14px 10px; }

    .team-row {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px;
    }

    .team-row:last-child { margin-bottom: 0; }

    .logo-wrap {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .team-logo {
      max-width: 38px; max-height: 38px;
      width: auto; height: auto;
      object-fit: contain;
      display: block;
    }

    .logo-initial {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--lgray);
    }

    .team-name-wrap { min-width: 0; }

    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--black);
    }

    .team-name .rnk { color: var(--lgray); font-weight: 600; }
    .team-name.winner { font-weight: 800; }
    .team-name.loser  { color: var(--lgray); font-weight: 600; }

    .team-score {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 27px;
      line-height: 1;
      min-width: 34px;
      text-align: right;
      color: var(--black);
    }

    .team-score.winner { color: var(--black); }
    .team-score.loser  { color: var(--lgray); font-weight: 600; }
    .team-score.empty  { color: var(--lgray); font-size: 18px; font-weight: 600; }

    /* footer */
    .card-footer {
      padding: 7px 12px 9px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-meta { font-size: 11px; color: var(--lgray); line-height: 1.5; flex: 1; min-width: 0; }

    .card-meta .stream-link {
      display: inline-block;
      color: var(--green2);
      font-weight: 700;
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .card-meta .stream-link:hover { text-decoration: underline; }

    .card-notes {
      font-size: 10px;
      color: var(--gray);
      line-height: 1.4;
      margin-top: 2px;
      font-style: italic;
    }

    .card-footer-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .stax-badge {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .stax-badge.gray   { color: #aaa; }
    .stax-badge.yellow { color: #d4a00a; }
    .stax-badge.orange { color: #e07020; }
    .stax-badge.red    { color: #c0392b; }

    .stream-icon {
      height: 24px;
      width: 24px;
      object-fit: contain;
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
      border-radius: 4px;
    }

    .submit-btn-inline {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .submit-btn-inline:hover { background: var(--green); color: #fff; }

    /* SUBMIT PANEL */
    .submit-panel {
      display: none;
      background: #f8f9fa;
      border-top: 1px solid var(--border);
      padding: 14px;
    }

    .submit-panel.open { display: block; }

    .submit-panel h4 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--lgray);
      margin-bottom: 10px;
    }

    .score-inputs {
      display: grid;
      grid-template-columns: 1fr 20px 1fr;
      gap: 6px;
      align-items: end;
      margin-bottom: 8px;
    }

    .si-group { display: flex; flex-direction: column; gap: 3px; }

    .si-group label {
      font-size: 10px;
      color: var(--lgray);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .si-group input {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 26px;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    .si-group input:focus { border-color: var(--green2); }

    .si-dash {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: var(--lgray);
      text-align: center;
      padding-bottom: 9px;
    }

    .si-extras { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }

    .si-clock-row { display: flex; gap: 8px; align-items: center; }

    .si-select {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--black);
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
      flex: 1;
    }
    .si-select:focus { border-color: var(--green2); }

    .si-time {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 7px 10px;
      border-radius: 6px;
      width: 72px;
      outline: none;
      transition: border-color 0.15s;
      text-align: center;
    }
    .si-time:focus { border-color: var(--green2); }
    .si-time::placeholder { color: var(--lgray); font-weight: 400; }

    .si-extras input,
    .si-extras textarea {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--black);
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    .si-extras input:focus,
    .si-extras textarea:focus { border-color: var(--green2); }
    .si-extras textarea { resize: vertical; min-height: 50px; }
    .si-extras input::placeholder,
    .si-extras textarea::placeholder { color: var(--lgray); }

    .si-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .final-label {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--gray); cursor: pointer;
    }

    .final-label input[type=checkbox] { accent-color: var(--green2); }

    .si-submit {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: var(--green);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .si-submit:hover { background: var(--green2); }
    .si-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .si-success {
      display: none;
      font-size: 12px;
      color: var(--green2);
      font-weight: 600;
      padding-top: 6px;
    }

    /* LOADING / EMPTY */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 60px 20px; color: var(--lgray);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--green2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--lgray);
      grid-column: 1 / -1;
    }

    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

    .empty-state h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 20px; color: var(--gray); margin-bottom: 4px;
    }

    .empty-state p { font-size: 13px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #222; color: #fff;
      padding: 11px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transform: translateY(6px);
      transition: all 0.22s; z-index: 999; pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--red); }

    @media (max-width: 640px) {
      nav { display: none; }
      .games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="mbr-header"></div>

<div class="page">
  <div class="date-bar">
    <div>
      <div class="date-heading" id="dateHeading">Today's Games</div>
    </div>
    <div class="date-nav">
      <button class="date-btn" id="prevDay">&#8592;</button>
      <button class="date-today" id="todayBtn">Today</button>
      <input type="date" class="date-picker" id="datePicker" />
      <button class="date-btn" id="nextDay">&#8594;</button>
    </div>
  </div>

  <div class="sport-tabs" id="sportTabs">
    <button class="sport-tab active" data-sport="basketball" data-season="2026">Basketball</button>
    <button class="sport-tab" data-sport="baseball" data-season="2025">Baseball</button>
    <button class="sport-tab" data-sport="softball" data-season="2025">Softball</button>
    <button class="sport-tab" data-sport="lacrosse" data-season="2025">Lacrosse</button>
    <button class="sport-tab" data-sport="soccer" data-season="2025">Soccer</button>
    <button class="sport-tab" data-sport="field-hockey" data-season="2025">Field Hockey</button>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Boys">Boys</button>
    <button class="filter-btn" data-filter="Girls">Girls</button>
    <button class="filter-btn" data-filter="A">Class A</button>
    <button class="filter-btn" data-filter="B">Class B</button>
    <button class="filter-btn" data-filter="C">Class C</button>
    <button class="filter-btn" data-filter="D">Class D</button>
    <button class="filter-btn" data-filter="S">Class S</button>
  </div>

  <div id="gamesContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://vtwupenqieesoktonbzg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0d3VwZW5xaWVlc29rdG9uYnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTA0MzgsImV4cCI6MjA4Nzk4NjQzOH0.OqkqF7NXr5LBQsQ0sl6S2o-kzQqbtBlRCLFszRnUoHA';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const SPORT_IDS = {
    'basketball':   'b31ab283-b28e-4ba8-9684-b1cf30cea219',
    'baseball':     'c87a4d6c-a471-47e1-b6a0-d1643d942bf0',
    'softball':     '095c9841-7261-4cb1-824e-6304792b53d0',
    'lacrosse':     '9c34ec5c-81b4-4e2e-9f60-740bb30fee4d',
    'soccer':       'ff80a695-0e78-4432-98f2-141b2b571e0e',
    'field-hockey': '1054869a-20d4-465f-8ca9-4bc4d2bafe1b',
  };
  const SPORT_CLASSES = {
    'basketball':   ['A','B','C','D','S'],
    'baseball':     ['A','B','C','D'],
    'softball':     ['A','B','C','D'],
    'lacrosse':     ['A','B','C'],
    'soccer':       ['A','B','C','D','8'],
    'field-hockey': ['A','B','C'],
  };
  // Sports locked to a single gender (no Boys/Girls sub-tabs)
  const SPORT_GENDER = {
    'baseball':     'Boys',
    'softball':     'Girls',
    'field-hockey': 'Girls',
  };

  function buildFilterButtons() {
    const singleGender = SPORT_GENDER[activeSport];
    const classes = SPORT_CLASSES[activeSport] || ['A','B','C','D'];
    const genderBtns = singleGender ? '' :
      `<button class="filter-btn" data-filter="Boys">Boys</button>
       <button class="filter-btn" data-filter="Girls">Girls</button>`;
    const classBtns = classes.map(c => `<button class="filter-btn" data-filter="${c}">Class ${c}</button>`).join('');
    document.getElementById('filters').innerHTML =
      `<button class="filter-btn active" data-filter="all">All</button>${genderBtns}${classBtns}`;
  }

  let currentDate   = new Date();
  let allGames      = [];
  let activeFilter  = 'all';
  let activeSport   = 'basketball';
  let activeSeason  = 2026;
  let rankMap       = {};

  function toISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function fmtHeading(d) {
    return toISO(d) === toISO(new Date()) ? "Today's Games"
      : d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  }

  function fmtSub(d) {
    return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  }

  function fmtTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':');
    const hr = parseInt(h);
    return `${hr > 12 ? hr-12 : hr || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
  }

  async function loadRanks(dateStr) {
    rankMap = {};
    const { data } = await sb
      .from('rankings_snapshots')
      .select('team_id, rank_overall')
      .order('snapshot_date', { ascending: false });
    if (data) data.forEach(r => { if (!rankMap[r.team_id]) rankMap[r.team_id] = r.rank_overall; });
  }

  async function loadGames(date) {
    const ds = toISO(date);
    document.getElementById('dateHeading').textContent = fmtHeading(date);
    document.getElementById('gamesContainer').innerHTML =
      `<div class="loading"><div class="spinner"></div><span>Loading…</span></div>`;

    await loadRanks(ds);

    const { data, error } = await sb.from('games').select(`
      id, game_date, game_time, location, status, stream_url, stax_index,
      is_neutral_site, is_tournament,
      home_score, away_score, home_score_live, away_score_live, game_clock,
      home_team:home_team_id ( id, school_name, gender, logo_url, stream_url, team_class,
        team_classifications ( classes ( name ) ) ),
      away_team:away_team_id ( id, school_name, gender, logo_url, team_class,
        team_classifications ( classes ( name ) ) )
    `).eq('game_date', ds)
      .eq('sport_id', SPORT_IDS[activeSport])
      .eq('season_year', activeSeason)
      .order('game_time', { ascending: true, nullsFirst: false });

    if (error) {
      document.getElementById('gamesContainer').innerHTML =
        `<div class="games-grid"><div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>${error.message}</p></div></div>`;
      return;
    }

    // Fetch latest notes from score_submissions for each game
    const gameIds = (data || []).map(g => g.id);
    let notesMap = {};
    if (gameIds.length) {
      const { data: subs } = await sb.from('score_submissions')
        .select('game_id, notes, created_at')
        .in('game_id', gameIds)
        .not('notes', 'is', null)
        .order('created_at', { ascending: false });
      if (subs) subs.forEach(s => { if (!notesMap[s.game_id]) notesMap[s.game_id] = s.notes; });
    }

    allGames = (data || []).filter(g => g.home_team && g.away_team);
    renderGames(notesMap);
  }

  function getHomeClass(g) {
    return g.home_team?.team_class || g.home_team?.team_classifications?.[0]?.classes?.name || '?';
  }
  function getAwayClass(g) {
    return g.away_team?.team_class || g.away_team?.team_classifications?.[0]?.classes?.name || '?';
  }
  function isCrossClass(g) {
    return getHomeClass(g) !== getAwayClass(g);
  }

  function renderGames(notesMap = {}) {
    const container = document.getElementById('gamesContainer');
    let games = allGames;

    if (activeFilter !== 'all') {
      games = games.filter(g => {
        if (activeFilter === 'Boys' || activeFilter === 'Girls')
          return g.home_team?.gender === activeFilter;
        // Cross-class: show in BOTH class filters
        return getHomeClass(g) === activeFilter || getAwayClass(g) === activeFilter;
      });
    }

    if (!games.length) {
      container.innerHTML = `<div class="games-grid"><div class="empty-state">
        <div class="icon">🏀</div><h3>No games on this date</h3>
        <p>Use the arrows to browse other dates.</p></div></div>`;
      return;
    }

    const singleGender = SPORT_GENDER[activeSport];
    const boys  = games.filter(g => g.home_team?.gender === 'Boys');
    const girls = games.filter(g => g.home_team?.gender === 'Girls');
    let html = '';
    if (boys.length  && activeFilter !== 'Girls' && (!singleGender || singleGender === 'Boys'))  html += section('Boys',  boys,  notesMap);
    if (girls.length && activeFilter !== 'Boys'  && (!singleGender || singleGender === 'Girls')) html += section('Girls', girls, notesMap);
    container.innerHTML = html;

    container.querySelectorAll('.submit-btn-inline').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = document.getElementById('panel-' + btn.dataset.id);
        const open  = panel.classList.toggle('open');
        btn.textContent = open ? 'Cancel' : 'Submit Score';
      });
    });

    container.querySelectorAll('.score-form').forEach(f => {
      f.addEventListener('submit', handleSubmit);
      const periodSel = f.querySelector('select[name="period"]');
      const timeInput = f.querySelector('input[name="clock_time"]');
      if (periodSel && timeInput) {
        periodSel.addEventListener('change', () => {
          const noTime = ['Halftime', 'End Q4', 'Final', ''].includes(periodSel.value);
          timeInput.style.display = noTime ? 'none' : '';
        });
      }
    });
  }

  function section(label, games, notesMap) {
    return `<div class="section-label">${label}</div>
            <div class="games-grid">${games.map(g => card(g, notesMap)).join('')}</div>`;
  }

  function logoEl(team) {
    if (team.logo_url) {
      return `<img class="team-logo" src="${team.logo_url}" alt="${team.school_name}"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
              <div class="logo-initial" style="display:none">${team.school_name[0]}</div>`;
    }
    return `<div class="logo-initial">${team.school_name[0]}</div>`;
  }

  function staxEl(val) {
    if (val === null || val === undefined) return '';
    const n = parseFloat(val);
    const cls = n >= 80 ? 'red' : n >= 65 ? 'orange' : n >= 50 ? 'yellow' : 'gray';
    return `<span class="stax-badge ${cls}">⚡${n.toFixed(1)}</span>`;
  }

  function streamIconEl(url) {
    if (!url) return '';
    let src = '';
    let alt = 'Stream';

    if (url.includes('youtube.com') || url.includes('youtu.be')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1773278312/You-Tube-14_nqkseu.png';
      alt = 'YouTube';
    } else if (url.includes('nfhs')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1772680700/nfhsnetworklogo2_hcomv2.png';
      alt = 'NFHS';
    } else if (url.includes('lctv') || url.includes('lctvonline')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1772680745/lctv_wikpnr.jpg';
      alt = 'LCTV';
    } else if (url.includes('whou')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1772683015/whou.live_.square-768x609_nwxdjx.png';
      alt = 'WHOU';
    } else if (url.includes('hudl.com')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1772680951/hudl_bq26ed.png';
      alt = 'Hudl';
    } else if (url.includes('theticket') || url.includes('ticket.tv')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1772680872/tickettv_llamh1.jpg';
      alt = 'The Ticket';
    } else if (url.includes('easternmainesports') || url.includes('eastern-maine')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1773278369/eastern_maine_sport_vp5nya.png';
      alt = 'Eastern Maine Sports';
    } else if (url.includes('munzing')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1773278428/munzing_c4tion.png';
      alt = 'Munzing';
    } else if (url.includes('mainepublic') || url.includes('maine-public') || url.includes('mainepublic.org')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1773278462/maine_public_logoo_mlepsa.png';
      alt = 'Maine Public';
    } else if (url.includes('mainecoast') || url.includes('maine-coast')) {
      src = 'https://res.cloudinary.com/dulfssb6y/image/upload/v1773278552/maine_coast_tv_njnccc.png';
      alt = 'Maine Coast TV';
    } else {
      return `<a href="${url}" target="_blank" rel="noopener" title="Watch live" style="color:var(--green2);font-size:18px;line-height:1;text-decoration:none">▶</a>`;
    }
    return `<a href="${url}" target="_blank" rel="noopener" title="Watch on ${alt}"><img class="stream-icon" src="${src}" alt="${alt}" /></a>`;
  }

  function card(g, notesMap = {}) {
    const home    = g.home_team;
    const away    = g.away_team;
    const homeCls = getHomeClass(g);
    const awayCls = getAwayClass(g);
    const crossCls = homeCls !== awayCls;
    const clsLabel = crossCls ? 'Cross-class' : `Class ${homeCls}`;
    const isFinal = g.status === 'final';
    const isLive  = g.status === 'active';

    const hSc = isFinal ? g.home_score : (isLive ? g.home_score_live : null);
    const aSc = isFinal ? g.away_score : (isLive ? g.away_score_live : null);
    const has = hSc !== null && aSc !== null;

    const hWin = isFinal && has && hSc > aSc;
    const aWin = isFinal && has && aSc > hSc;

    const hRnk = rankMap[home.id];
    const aRnk = rankMap[away.id];
    const hR   = hRnk ? `<span class="rnk">#${hRnk} </span>` : '';
    const aR   = aRnk ? `<span class="rnk">#${aRnk} </span>` : '';

    // Top status bar
    const topBar = isFinal
      ? `<div class="card-top"><span>Final</span><span>${clsLabel} · ${home.gender}</span></div>`
      : isLive
        ? `<div class="card-top" style="color:#22a863"><span><span class="live-dot"></span>${g.game_clock || 'Live'}</span><span>${clsLabel} · ${home.gender}</span></div>`
        : `<div class="card-top"><span>${g.game_time ? fmtTime(g.game_time) : 'Scheduled'}</span><span>${clsLabel} · ${home.gender}</span></div>`;

    // Score cells
    const hScEl = has
      ? `<div class="team-score ${isFinal ? (hWin?'winner':'loser') : ''}">${hSc}</div>`
      : `<div class="team-score empty">–</div>`;
    const aScEl = has
      ? `<div class="team-score ${isFinal ? (aWin?'winner':'loser') : ''}">${aSc}</div>`
      : `<div class="team-score empty">–</div>`;

    // Footer
    const loc = g.location || (g.is_neutral_site ? 'Neutral site' : `@ ${home.school_name}`);
    const dateShort = new Date(g.game_date + 'T12:00:00').toLocaleDateString('en-US', { month:'numeric', day:'numeric' });
    const streamUrl = g.stream_url || home.stream_url || null;
    const eventEl = g.event ? `<br/><span style="color:var(--green);font-weight:700">${g.event}</span>` : '';
    const notes = notesMap[g.id];
    const notesEl = notes ? `<div class="card-notes">${notes}</div>` : '';

    return `
    <div class="game-card ${isLive ? 'live' : ''}">
      ${topBar}
      <div class="card-body">
        <div class="team-row">
          <div class="logo-wrap">${logoEl(away)}</div>
          <div class="team-name-wrap">
            <div class="team-name ${isFinal ? (aWin?'winner':'loser') : ''}">${aR}${away.school_name}</div>
          </div>
          ${aScEl}
        </div>
        <div class="team-row">
          <div class="logo-wrap">${logoEl(home)}</div>
          <div class="team-name-wrap">
            <div class="team-name ${isFinal ? (hWin?'winner':'loser') : ''}">${hR}${home.school_name}</div>
          </div>
          ${hScEl}
        </div>
      </div>
      <div class="card-footer">
        <div class="card-meta">${loc}${eventEl}<br/>${dateShort}${g.game_time ? ' · ' + fmtTime(g.game_time) : ''}${notesEl}</div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          ${staxEl(g.stax_index)}
          ${streamIconEl(streamUrl)}
          ${!isFinal ? `<button class="submit-btn-inline" data-id="${g.id}">Submit Score</button>` : ''}
        </div>
      </div>
      ${!isFinal ? `
      <div class="submit-panel" id="panel-${g.id}">
        <h4>Submit Score</h4>
        <form class="score-form" data-id="${g.id}">
          <div class="score-inputs">
            <div class="si-group">
              <label>${home.school_name}</label>
              <input type="number" name="home_score" min="0" max="250" placeholder="0" required />
            </div>
            <div class="si-dash">–</div>
            <div class="si-group">
              <label>${away.school_name}</label>
              <input type="number" name="away_score" min="0" max="250" placeholder="0" required />
            </div>
          </div>
          <div class="si-extras">
            <div class="si-clock-row">
              <select name="period" class="si-select">
                <option value="">Period / Status</option>
                <option value="Q1">Q1</option>
                <option value="Q2">Q2</option>
                <option value="Halftime">Halftime</option>
                <option value="Q3">Q3</option>
                <option value="Q4">Q4</option>
                <option value="OT">OT</option>
                <option value="End Q4">End Q4</option>
                <option value="Final">Final</option>
              </select>
              <input type="text" name="clock_time" class="si-time" placeholder="4:00" pattern="^([0-9]{1,2}:[0-5][0-9])?$" title="Format: 4:00" />
            </div>
            <textarea name="notes" placeholder="Notes (e.g. Nolan Ames 32 pts 10 reb)"></textarea>
          </div>
          <div class="si-row">
            <label class="final-label">
              <input type="checkbox" name="is_final" /> Final score
            </label>
            <button type="submit" class="si-submit">Submit</button>
          </div>
          <div class="si-success" id="ok-${g.id}">✓ Submitted — thanks!</div>
        </form>
      </div>` : ''}
    </div>`;
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const form   = e.target;
    const id     = form.dataset.id;
    const btn    = form.querySelector('.si-submit');
    const ok     = document.getElementById('ok-' + id);

    const hSc = parseInt(form.home_score.value);
    const aSc = parseInt(form.away_score.value);
    if (isNaN(hSc) || isNaN(aSc)) return;

    const period    = form.period.value;
    const clockTime = form.clock_time.value.trim();
    const noTime    = ['Halftime', 'End Q4', 'Final', ''].includes(period);
    const gameClock = period
      ? (noTime || !clockTime ? period : `${period} | ${clockTime}`)
      : null;

    btn.disabled = true;
    btn.textContent = 'Submitting…';

    const { error } = await sb.from('score_submissions').insert({
      game_id: id, home_score: hSc, away_score: aSc,
      is_final: form.is_final.checked,
      game_clock: gameClock,
      notes: form.notes.value.trim() || null,
      status: 'pending',
    });

    if (error) {
      showToast('Failed: ' + error.message, true);
      btn.disabled = false; btn.textContent = 'Submit';
      return;
    }

    ok.style.display = 'block';
    btn.style.display = 'none';
    showToast('Score submitted — thanks!');

    if (form.is_final.checked) {
      await sb.from('games').update({
        status: 'active', home_score_live: hSc, away_score_live: aSc,
        game_clock: gameClock,
      }).eq('id', id);
      setTimeout(() => loadGames(currentDate), 1500);
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function syncDatePicker() {
    document.getElementById('datePicker').value = toISO(currentDate);
  }

  document.getElementById('prevDay').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() - 1); syncDatePicker(); loadGames(currentDate);
  });
  document.getElementById('nextDay').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() + 1); syncDatePicker(); loadGames(currentDate);
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    currentDate = new Date(); syncDatePicker(); loadGames(currentDate);
  });
  document.getElementById('datePicker').addEventListener('change', e => {
    const [y,m,d] = e.target.value.split('-').map(Number);
    currentDate = new Date(y, m-1, d);
    loadGames(currentDate);
  });

  document.getElementById('sportTabs').addEventListener('click', e => {
    if (!e.target.matches('.sport-tab')) return;
    document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeSport  = e.target.dataset.sport;
    activeSeason = parseInt(e.target.dataset.season);
    activeFilter = 'all';
    buildFilterButtons();
    loadGames(currentDate);
  });

  document.getElementById('filters').addEventListener('click', e => {
    if (!e.target.matches('.filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    renderGames();
  });

  syncDatePicker();
  loadGames(currentDate);
</script>

<script src="nav.js"></script>
<script>MBRNav.init({ active: 'scoreboard' });</script>
</body>
</html>

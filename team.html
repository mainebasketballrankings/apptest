<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Detail — Maine Basketball Rankings</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #1a7a4a;
      --green2: #22a863;
      --red:    #c0392b;
      --gray:   #555;
      --lgray:  #999;
      --border: #e2e2e2;
      --bg:     #f0f0f0;
      --white:  #fff;
      --black:  #111;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }

    nav { background: var(--white); border-bottom: 2px solid var(--border); display: flex; align-items: center; padding: 0 20px; height: 52px; gap: 8px; }
    nav .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-right: 16px; }
    nav .logo-wrap img { height: 32px; }
    nav .site-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    nav a.nav-link { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--gray); text-decoration: none; padding: 6px 12px; border-radius: 4px; transition: background 0.15s, color 0.15s; text-transform: uppercase; }
    nav a.nav-link:hover { background: var(--bg); color: var(--black); }

    .page-wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }

    /* HEADER */
    .team-header { background: var(--white); border-radius: 10px; border: 1px solid var(--border); padding: 24px; display: flex; align-items: center; gap: 24px; margin-bottom: 16px; }
    .team-logo-lg { width: 96px; height: 96px; border-radius: 50%; object-fit: contain; background: var(--bg); border: 2px solid var(--border); flex-shrink: 0; }
    .team-logo-fallback { width: 96px; height: 96px; border-radius: 50%; background: var(--green); color: var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 36px; flex-shrink: 0; }
    .team-header-info { flex: 1; min-width: 0; }
    .team-name-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
    .team-name-lg { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 34px; line-height: 1; }
    .rank-trio { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; vertical-align: middle; }
    .rank-trio span { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 14px; padding: 3px 10px; background: var(--white); color: var(--black); border-right: 1px solid var(--border); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .rank-trio span:last-child { border-right: none; }
    .rtag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; text-transform: uppercase; color: var(--gray); }
    .team-meta { font-size: 14px; color: var(--gray); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .gender-current { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; }
    .gender-link { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: var(--green); text-decoration: none; padding: 1px 8px; border: 1px solid var(--green); border-radius: 20px; }
    .gender-link:hover { background: var(--green); color: var(--white); }
    .meta-sep { color: var(--border); }
    .team-record-big { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px; color: var(--green); }
    .header-stats { display: flex; align-items: baseline; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
    .hstat { display: flex; flex-direction: column; }
    .hstat-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--lgray); margin-bottom: 1px; }
    .hstat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; line-height: 1; color: var(--black); }
    .hstat-val.grn { color: var(--green); }
    .hstat-val.pos { color: var(--green); }
    .hstat-val.neg { color: var(--red); }
    .hstat-sep { width: 1px; height: 32px; background: var(--border); align-self: center; }

    /* STAT CARDS */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; text-align: center; }
    .stat-card .lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--lgray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .stat-card .val { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 24px; color: var(--black); line-height: 1; }
    .stat-card .val.grn { color: var(--green); }

    .section-header { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }

    /* TOURNAMENT ODDS */
    .odds-section { margin-bottom: 16px; }
    .odds-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .odds-top { display: flex; border-bottom: 1px solid var(--border); }
    .odds-bucket { flex: 1; padding: 14px 18px; border-right: 1px solid var(--border); }
    .odds-bucket:last-child { border-right: none; }
    .odds-bucket .lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--lgray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .odds-bucket .val { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 30px; line-height: 1; }
    .odds-bucket .val.in  { color: var(--green); }
    .odds-bucket .val.out { color: var(--red); }
    .seed-grid { padding: 14px 18px; }
    .seed-grid-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--lgray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .seed-rows { display: flex; flex-direction: column; gap: 7px; }
    .seed-row { display: flex; align-items: center; gap: 10px; }
    .seed-lbl { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; width: 50px; color: var(--gray); flex-shrink: 0; }
    .seed-bar-wrap { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
    .seed-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .seed-bar.bye    { background: var(--green); }
    .seed-bar.playin { background: #f39c12; }
    .seed-pct { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; width: 44px; text-align: right; }

    /* COMBINED GAMES TABLE */
    .games-section { margin-bottom: 16px; }
    .games-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    table.gt { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.gt thead tr { background: var(--bg); border-bottom: 2px solid var(--border); }
    table.gt th { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--lgray); padding: 8px 10px; text-align: left; white-space: nowrap; }
    table.gt th.r { text-align: right; }
    table.gt td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.gt tr:last-child td { border-bottom: none; }
    table.gt tr:hover td { background: #fafafa; }

    .rbadge { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 14px; display: inline-block; width: 14px; }
    .rbadge.W { color: var(--green); }
    .rbadge.L { color: var(--red); }

    .opp-cell { display: flex; align-items: center; gap: 7px; }
    .opp-logo { width: 22px; height: 22px; border-radius: 50%; object-fit: contain; background: var(--bg); border: 1px solid var(--border); flex-shrink: 0; }
    .opp-fb   { width: 22px; height: 22px; border-radius: 50%; background: var(--green); color: var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 9px; flex-shrink: 0; }
    .opp-info { display: flex; flex-direction: column; line-height: 1.2; }
    .opp-name { font-weight: 500; }
    .opp-ranks { display: flex; gap: 3px; margin-top: 2px; }
    .rpill { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; color: var(--gray); }
    .atsym { color: var(--lgray); font-size: 11px; flex-shrink: 0; }

    .sc { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; text-align: right; white-space: nowrap; }
    .sc.w { color: var(--black); } .sc.l { color: var(--gray); }
    .dc { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; text-align: right; }
    .dc.p { color: var(--green); } .dc.n { color: var(--red); }
    .hc { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; text-align: right; color: var(--green); }
    .hc.none { color: var(--lgray); }

    .wp-wrap { display: flex; align-items: center; gap: 6px; }
    .wp-bar-o { width: 68px; height: 6px; background: var(--red); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .wp-bar-i { height: 100%; background: var(--green2); border-radius: 3px; }
    .wp-txt { font-size: 11px; color: var(--gray); white-space: nowrap; }

    .tbadge { font-size: 10px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--white); background: #8b5cf6; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
    .dtxt { color: var(--lgray); font-size: 12px; white-space: nowrap; }

    .games-footer { display: flex; gap: 20px; flex-wrap: wrap; padding: 10px 14px; background: #f7f7f7; border-top: 2px solid var(--border); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--gray); }
    .games-footer strong { color: var(--black); font-size: 15px; }

    .loading-state, .error-state { text-align: center; padding: 60px 20px; color: var(--lgray); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; }
    .error-state { color: var(--red); }

    @media (max-width: 640px) {
      .team-header { flex-direction: column; text-align: center; }
      .team-meta { justify-content: center; }
      .stat-cards { grid-template-columns: repeat(3, 1fr); }
      .hsm { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo-wrap" href="/">
    <img src="logo.png" alt="MBR Logo" onerror="this.style.display='none'" />
    <span class="site-name">Maine Basketball Rankings</span>
  </a>
  <a class="nav-link" href="/index.html">Scoreboard</a>
  <a class="nav-link" href="/rankings.html">Rankings</a>
  <a class="nav-link" href="/heals.html">Heal Points</a>
</nav>

<div class="page-wrap">
  <div id="app"><div class="loading-state">Loading team data…</div></div>
</div>

<script>
const SB_URL  = 'https://vtwupenqieesoktonbzg.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0d3VwZW5xaWVlc29rdG9uYnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTA0MzgsImV4cCI6MjA4Nzk4NjQzOH0.OqkqF7NXr5LBQsQ0sl6S2o-kzQqbtBlRCLFszRnUoHA';
const REG_END = '2026-02-05';
const WVALS   = { A: 40, B: 38, C: 36, D: 34, S: 32 };

async function sb(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
  });
  if (!r.ok) { const b = await r.text(); throw new Error(`${r.status} — ${b}`); }
  return r.json();
}

const qp  = n => new URLSearchParams(location.search).get(n);
const f2  = n => n != null ? (+n).toFixed(2) : '—';
const fpc = n => n != null ? (+n * 100).toFixed(1) + '%' : '—';
const fdt = d => { if (!d) return ''; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };

function pyth(a, b) {
  if (!a || !b) return null;
  const d = a - b;
  if (d > 35) return 1; if (d < -35) return 0;
  const pa = Math.pow(a,11), pb = Math.pow(b,11);
  return pa / (pa + pb);
}

function logoEl(url, name, lg) {
  const sc = lg ? 'team-logo-lg' : 'opp-logo';
  const fb = lg ? 'team-logo-fallback' : 'opp-fb';
  const ch = (name||'?')[0];
  if (url) return `<img class="${sc}" src="${url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="${fb}" style="display:none">${ch}</div>`;
  return `<div class="${fb}">${ch}</div>`;
}

function healsCalc(games, tid, smap) {
  const reg = games.filter(g => !g.is_tournament && g.game_date <= REG_END && g.status === 'final');
  const denom = Math.max(reg.length, 12);
  let piSum = 0, healSum = 0;
  const details = {};
  for (const g of reg) {
    const ih = g.home_team_id === tid;
    const oid = ih ? g.away_team_id : g.home_team_id;
    const ms = ih ? g.home_score : g.away_score;
    const os = ih ? g.away_score : g.home_score;
    const won = ms > os;
    const opp = smap[oid] || {};
    const cls = opp._class || 'A';
    const opi = opp.pi || 1.0;
    if (won) piSum += (WVALS[cls] || 36);
    const contrib = won ? opi / denom : 0;
    healSum += contrib;
    details[`${g.game_date}_${oid}`] = { wp: pyth(ms, os), contrib, oppPI: opi };
  }
  const pi = reg.length === 0 ? 1.0 : piSum / denom;
  return { pi, heals: healSum * 10, played: reg.length, denom, details };
}

async function load() {
  const tid = qp('team_id');
  const app = document.getElementById('app');
  if (!tid) { app.innerHTML = `<div class="error-state">No team_id specified.</div>`; return; }

  try {
    const [teams, snap] = await Promise.all([
      sb(`teams?id=eq.${tid}&select=id,school_name,logo_url,gender`),
      sb(`rankings_snapshots?team_id=eq.${tid}&order=snapshot_date.desc&limit=1&select=*`)
    ]);
    if (!teams.length) { app.innerHTML = `<div class="error-state">Team not found.</div>`; return; }
    const team  = teams[0];
    const stats = snap[0] || null;

    const [games, classData, allSnaps] = await Promise.all([
      sb(`games?or=(home_team_id.eq.${tid},away_team_id.eq.${tid})&order=game_date.asc&select=*`),
      sb(`team_classifications?team_id=eq.${tid}&select=class_id,region_id,classes(name),regions(name)`),
      sb(`rankings_snapshots?order=snapshot_date.desc&select=team_id,heal_points,rank_overall,rank_class&limit=2000`)
    ]);

    const oppIds = [...new Set(games.map(g => g.home_team_id === tid ? g.away_team_id : g.home_team_id))];
    const idList = oppIds.join(',');

    const [oppTeams, oppSnaps, oppCls, siblings] = await Promise.all([
      oppIds.length ? sb(`teams?id=in.(${idList})&select=id,school_name,logo_url,gender`) : [],
      oppIds.length ? sb(`rankings_snapshots?team_id=in.(${idList})&order=snapshot_date.desc&select=team_id,pi,rank_class,rank_overall&limit=2000`) : [],
      oppIds.length ? sb(`team_classifications?team_id=in.(${idList})&select=team_id,classes(name)`) : [],
      sb(`teams?school_name=eq.${team.school_name.replace(/ /g, '%20')}&gender=eq.${team.gender==='Boys'?'Girls':'Boys'}&select=id,school_name,gender&limit=1`)
    ]);

    const tmap = {};
    for (const t of oppTeams) tmap[t.id] = t;

    const smap = {};
    for (const s of oppSnaps) {
      if (!smap[s.team_id]) {
        const t = tmap[s.team_id] || {};
        smap[s.team_id] = { ...s, _name: t.school_name, _logo: t.logo_url, _class: null };
      }
    }
    for (const c of oppCls) { if (smap[c.team_id]) smap[c.team_id]._class = c.classes?.name; }

    const sibling   = siblings[0] || null;
    const myClass   = classData[0];
    const className = myClass?.classes?.name || '';
    const regionName= myClass?.regions?.name || '';
    const classReg  = [className, regionName].filter(Boolean).join(' ');

    // Compute ranks client-side from all snapshots
    // Use existing rank_overall/rank_class from DB, compute rank_region here
    const mySnap = allSnaps.find(s => s.team_id === tid);
    const rState  = mySnap?.rank_overall || stats?.rank_overall || null;
    const rClass  = mySnap?.rank_class  || stats?.rank_class  || null;

    // Region rank: filter to same class+region, sort by heal_points desc, find position
    // We need team classifications for all teams to filter by region — approximate using
    // rank_class position within class, comparing to opponents we already have.
    // Best approach: use rank_overall within the region subset we build from opponent data.
    // For now use rank_class as proxy until rank_region is added to snapshot push.
    const rRegion = stats?.rank_region || null;

    const { pi, heals, played, denom, details } = healsCalc(games, tid, smap);

    let wins = 0, losses = 0;
    for (const g of games) {
      if (g.status !== 'final') continue;
      const ih = g.home_team_id === tid;
      const ms = ih ? g.home_score : g.away_score;
      const os = ih ? g.away_score : g.home_score;
      ms > os ? wins++ : losses++;
    }

    // ── RENDER ──────────────────────────────────

    const gLbl = team.gender === 'Boys' ? 'Boys' : 'Girls';
    const sLbl = team.gender === 'Boys' ? 'Girls' : 'Boys';
    const genderHtml = sibling
      ? `<span class="gender-current">${gLbl}</span><a class="gender-link" href="team.html?team_id=${sibling.id}">${sLbl} ↗</a>`
      : `<span class="gender-current">${gLbl}</span>`;

    const rankHtml = (rState || rClass) ? `
      <span class="rank-trio">
        ${rState  ? `<span><span class="rtag">STATE</span> #${rState}</span>` : ''}
        ${rClass  ? `<span><span class="rtag">${className}</span> #${rClass}</span>` : ''}
        ${rRegion ? `<span><span class="rtag">${classReg}</span> #${rRegion}</span>` : ''}
      </span>` : '';

    // Stat cards
    const cards = `
      <div class="stat-cards">
        <div class="stat-card"><div class="lbl">DIRIGO</div><div class="val grn">${stats ? f2(stats.heal_points) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">SOS</div><div class="val">${stats ? f2(stats.sos) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">Avg PF</div><div class="val">${stats ? f2(stats.avg_pf) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">Avg PA</div><div class="val">${stats ? f2(stats.avg_pa) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">%Perfect</div><div class="val">${stats ? fpc(stats.pct_perfect) : '—'}</div></div>
      </div>`;

    // Tournament odds
    let oddsHtml = '';
    const odds = stats?.tournament_odds || null;
    if (odds) {
      const isTourney  = new Date() > new Date('2026-02-20');
      const oddsTitle  = isTourney ? 'Gold Ball Odds' : 'Tournament Odds';

      const inVal  = odds.in  != null && odds.in  !== '' ? +odds.in  : null;
      const outVal = odds.out != null && odds.out !== '' ? +odds.out : null;
      const byeVal = odds.bye != null && odds.bye !== '' ? +odds.bye : null;

      // Determine status
      let status, statusColor;
      if (byeVal >= 1)                        { status = 'BYE';     statusColor = 'var(--green)'; }
      else if (inVal >= 1 && !byeVal)         { status = 'PLAY-IN'; statusColor = '#2980b9'; }
      else if (outVal >= 1)                   { status = 'OUT';     statusColor = 'var(--red)'; }
      else                                    { status = 'BUBBLE';  statusColor = '#f39c12'; }

      const inPct  = inVal  != null ? (inVal  * 100).toFixed(1) : null;
      const outPct = outVal != null ? (outVal * 100).toFixed(1) : null;

      // Status badge + in/out display
      const statusBadge = `<span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;background:${statusColor};color:#fff;padding:3px 10px;border-radius:4px;letter-spacing:1px">${status}</span>`;

      const is100in  = byeVal >= 1 || inVal >= 1;
      const is100out = outVal >= 1;

      let inDisplay;
      if (is100out) {
        inDisplay = `${statusBadge} <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--red);margin-left:8px">Eliminated</span>`;
      } else if (is100in) {
        inDisplay = `${statusBadge} <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:${statusColor};margin-left:8px">✓ 100%</span>`;
      } else {
        inDisplay = `${statusBadge}
          <div style="margin-top:10px;display:flex;gap:24px">
            ${inPct  != null ? `<div><div class="lbl">In</div><div class="val in">${inPct}%</div></div>` : ''}
            ${outPct != null ? `<div><div class="lbl">Out</div><div class="val out">${outPct}%</div></div>` : ''}
          </div>`;
      }

      // Seed rows — absolute width bars
      const seedRows = [];
      for (let i = 1; i <= 20; i++) {
        const v = odds[`S${i}`] ?? odds[`s${i}`] ?? null;
        if (v != null && v !== '' && +v > 0) seedRows.push({ i, v: +v });
      }

      const seedHtml = seedRows.map(({ i, v }) => {
        const pct  = (v * 100).toFixed(1);
        const barW = (v * 100).toFixed(1); // absolute, not relative
        const cls  = i <= 6 ? 'bye' : 'playin';
        const note = i <= 6 ? 'Bye' : 'Play-in';
        return `<div class="seed-row">
          <span class="seed-lbl">Seed ${i} <small style="color:var(--lgray);font-size:10px">(${note})</small></span>
          <div class="seed-bar-wrap"><div class="seed-bar ${cls}" style="width:${barW}%"></div></div>
          <span class="seed-pct">${pct}%</span>
        </div>`;
      }).join('');

      oddsHtml = `
        <div class="odds-section">
          <div class="section-header">${oddsTitle}</div>
          <div class="odds-card">
            <div class="odds-bucket" style="padding:14px 18px">${inDisplay}</div>
            ${seedHtml ? `<div class="seed-grid">
              <div class="seed-grid-lbl">${is100out ? 'PROJECTED SEEDS (DID NOT QUALIFY)' : 'SEED DISTRIBUTION'}</div>
              <div class="seed-rows" style="${is100out ? 'opacity:0.45;filter:grayscale(1)' : ''}">${seedHtml}</div>
            </div>` : ''}
          </div>
        </div>`;
    }

    // Combined games table
    const rows = games.map(g => {
      if (g.status === 'cancelled') return '';
      const ih  = g.home_team_id === tid;
      const oid = ih ? g.away_team_id : g.home_team_id;
      const ot  = tmap[oid] || {};
      const os  = smap[oid] || {};
      const ms  = ih ? g.home_score : g.away_score;
      const ops = ih ? g.away_score : g.home_score;
      const fin = g.status === 'final';
      const won = fin && ms > ops;
      const lost= fin && ms < ops;
      const df  = fin ? ms - ops : null;
      const at  = g.is_neutral ? `<span class="atsym">N</span>` : !ih ? `<span class="atsym">@</span>` : '';
      const res = fin ? (won ? 'W' : 'L') : (g.status === 'scheduled' ? '–' : '●');
      const tb  = g.is_tournament ? `<span class="tbadge">T</span>` : '';

      // Rank pill: state rank only
      const pills = [];
      if (os.rank_overall) pills.push(`<span class="rpill">#${os.rank_overall}</span>`);
      const pillsHtml = pills.length ? `<div class="opp-ranks">${pills.join('')}</div>` : '';

      // Heal data
      const hkey = `${g.game_date}_${oid}`;
      const hd   = (!g.is_tournament && g.game_date <= REG_END) ? details[hkey] : null;
      const wp   = hd?.wp ?? null;
      const wpPct= wp !== null ? (wp*100).toFixed(1)+'%' : '';
      const barW = wp !== null ? (wp*100).toFixed(1) : 0;

      const scoreTxt = fin ? `${ms}–${ops}` : (g.status==='scheduled' ? 'Sched.' : 'Live');

      return `<tr>
        <td class="dtxt">${fdt(g.game_date)}${tb}</td>
        <td>
          <div class="opp-cell">
            ${at}
            ${logoEl(ot.logo_url, ot.school_name, false)}
            <div class="opp-info">
              <span class="opp-name">${ot.school_name||'Unknown'}</span>
              ${pillsHtml}
            </div>
          </div>
        </td>
        <td class="sc ${won?'w':lost?'l':''}">
          <span class="rbadge ${res==='W'?'W':res==='L'?'L':''}">${res}</span> ${scoreTxt}
        </td>
        <td class="dc ${df>0?'p':df<0?'n':''} hsm">${df!==null?(df>0?'+':'')+df:''}</td>
        <td class="hsm">
          ${wp!==null?`<div class="wp-wrap">
            <div class="wp-bar-o"><div class="wp-bar-i" style="width:${barW}%"></div></div>
            <span class="wp-txt">${wpPct} · ${f2(hd?.oppPI)} PI</span>
          </div>`:''}
        </td>
        <td class="hc ${hd&&hd.contrib?'':'none'}">${hd?(hd.contrib?'+'+f2(hd.contrib):'—'):''}</td>
      </tr>`;
    }).join('');

    const gamesHtml = `
      <div class="games-section">
        <div class="section-header">Schedule, Results &amp; Heal Points</div>
        <div class="games-wrap">
          <table class="gt">
            <thead><tr>
              <th>Date</th><th>Opponent</th><th class="r">Score</th>
              <th class="r hsm">Diff</th><th class="hsm">Win Prob · Opp PI</th>
              <th class="r">Heal +</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="games-footer">
            <span>Reg. games: <strong>${played}</strong></span>
            <span>Denominator: <strong>${denom}</strong></span>
            <span>PI: <strong>${f2(pi)}</strong></span>
            <span>Heal Points: <strong>${f2(heals)}</strong></span>
          </div>
        </div>
      </div>`;

    // Point diff from all final games
    let totalPF = 0, totalPA = 0, finalGames = 0;
    for (const g of games) {
      if (g.status !== 'final') continue;
      const ih = g.home_team_id === tid;
      totalPF += ih ? g.home_score : g.away_score;
      totalPA += ih ? g.away_score : g.home_score;
      finalGames++;
    }
    const totalDiff = totalPF - totalPA;
    const diffDisp  = totalDiff > 0 ? `+${totalDiff}` : `${totalDiff}`;
    const diffClass = totalDiff >= 0 ? 'pos' : 'neg';

    app.innerHTML = `
      <div class="team-header">
        ${logoEl(team.logo_url, team.school_name, true)}
        <div class="team-header-info">
          <div class="team-name-row">
            <span class="team-name-lg">${team.school_name}</span>
            ${rankHtml}
          </div>
          <div class="team-meta">${genderHtml}<span class="meta-sep">|</span><strong>${classReg}</strong></div>
          <div class="header-stats">
            <div class="hstat"><span class="hstat-lbl">Record</span><span class="hstat-val grn">${wins}–${losses}</span></div>
            <div class="hstat-sep"></div>
            <div class="hstat"><span class="hstat-lbl">Point Diff</span><span class="hstat-val ${diffClass}">${diffDisp}</span></div>
            <div class="hstat-sep"></div>
            <div class="hstat"><span class="hstat-lbl">Heal Points</span><span class="hstat-val">${f2(heals)}</span></div>
          </div>
        </div>
      </div>
      ${cards}
      ${oddsHtml}
      ${gamesHtml}`;

    document.title = `${team.school_name} — Maine Basketball Rankings`;

  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = `<div class="error-state">Failed to load team data.<br><small>${err.message}</small></div>`;
  }
}

load();
</script>
</body>
</html>

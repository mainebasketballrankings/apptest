<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:site_name" content="Maine Basketball Rankings" />
<meta property="og:title" content="Maine Basketball Rankings" />
<meta property="og:description" content="Maine high school sports rankings, scores, rosters, and stats." />
<meta property="og:image" content="https://res.cloudinary.com/dulfssb6y/image/upload/v1772934511/maine_basketball_rankings_logo_large_white_border_v7p2ls.png" />
<meta property="og:url" content="https://app.mainebasketballrankings.com" />
<meta name="twitter:card" content="summary" />
  <title>School — Maine Basketball Rankings</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #1a7a4a;
      --green2: #22a863;
      --red:    #c0392b;
      --gray:   #555;
      --lgray:  #999;
      --border: #e2e2e2;
      --bg:     #f0f0f0;
      --white:  #fff;
      --black:  #111;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }
    .page-wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }

    /* SCHOOL HEADER */
    .school-header { background: var(--white); border-radius: 10px; border: 1px solid var(--border); padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .school-logo-lg { width: 96px; height: 96px; border-radius: 50%; object-fit: contain; background: var(--bg); border: 2px solid var(--border); flex-shrink: 0; }
    .school-logo-fallback { width: 96px; height: 96px; border-radius: 50%; background: var(--green); color: var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 32px; flex-shrink: 0; }
    .school-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 38px; line-height: 1; }
    .school-sub { font-size: 14px; color: var(--lgray); margin-top: 6px; }

    /* SPORT CARD */
    .sport-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .sport-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--bg); }
    .sport-card-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .sport-card-link { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: var(--green); text-decoration: none; border: 1px solid var(--green); border-radius: 20px; padding: 3px 12px; white-space: nowrap; }
    .sport-card-link:hover { background: var(--green); color: var(--white); }
    .sport-card-body { padding: 16px 18px; }

    /* INLINE STATS ROW */
    .sport-stats-row { display: flex; gap: 0; margin-bottom: 16px; flex-wrap: wrap; }
    .sport-stat { display: flex; flex-direction: column; padding: 6px 20px 6px 0; margin-right: 20px; border-right: 1px solid var(--border); }
    .sport-stat:last-child { border-right: none; }
    .sport-stat-lbl { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--lgray); margin-bottom: 2px; }
    .sport-stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 24px; color: var(--black); line-height: 1; }
    .sport-stat-val.grn { color: var(--green); }
    .sport-stat-val.red { color: var(--red); }

    /* ROSTER TABLE */
    .roster-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .roster-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
    table.rt { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.rt thead tr { background: var(--bg); border-bottom: 2px solid var(--border); }
    table.rt th { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--lgray); padding: 8px 12px; text-align: center; white-space: nowrap; }
    table.rt th:nth-child(1), table.rt th:nth-child(2) { text-align: left; }
    table.rt td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.rt tr:last-child td { border-bottom: none; }
    table.rt tr:hover td { background: #fafafa; }
    .rt-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 15px; color: var(--lgray); width: 40px; }
    .rt-name { font-weight: 600; }
    .rt-bio  { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; color: var(--gray); text-align: center; }
    .rt-stat { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; text-align: right; color: var(--black); }
    .rt-stat-gap { width: 16px; border-right: 2px solid var(--border); padding: 0; }
    .rt-stat-gap-th { width: 16px; border-right: 2px solid var(--border); padding: 0; }

    .no-roster { color: var(--lgray); font-size: 13px; font-style: italic; padding: 12px 0; }

    /* GAME CARDS */
    .game-cards-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .sc-game-card { width: 260px; flex-shrink: 0; }
    .sc-game-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .sc-card-top { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; padding: 5px 12px; background: #f0f0f0; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; color: var(--lgray); }
    .sc-card-body { padding: 10px 12px 12px; background: var(--white); }
    .sc-team-row { display: grid; grid-template-columns: 30px 1fr auto; align-items: center; gap: 8px; margin-bottom: 6px; }
    .sc-team-row:last-child { margin-bottom: 0; }
    .sc-logo { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sc-logo img { max-width: 30px; max-height: 30px; object-fit: contain; display: block; }
    .sc-logo-fb { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 12px; color: var(--lgray); }
    .sc-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--black); text-decoration: none; }
    .sc-name:hover { color: var(--green); text-decoration: underline; }
    .sc-name.winner { font-weight: 800; }
    .sc-name.loser  { color: var(--lgray); font-weight: 600; }
    .sc-score { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; line-height: 1; min-width: 28px; text-align: right; color: var(--black); }
    .sc-score.winner { color: var(--black); }
    .sc-score.loser  { color: var(--lgray); font-weight: 600; }
    .sc-score.empty  { color: var(--lgray); font-size: 16px; font-weight: 600; }
    .sc-card-footer { padding: 5px 12px 8px; border-top: 1px solid var(--border); background: var(--white); font-size: 11px; color: var(--lgray); border-radius: 0 0 10px 10px; }

    .loading-state, .error-state { text-align: center; padding: 60px 20px; color: var(--lgray); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; }
    .error-state { color: var(--red); }

    @media (max-width: 640px) {
      .school-header { flex-direction: column; align-items: center; text-align: center; }
      .sport-card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .sport-stats-row { gap: 12px; }
    }
  </style>
</head>
<body>

<div class="page-wrap">

</div>

<script>
const SB_URL = 'https://vtwupenqieesoktonbzg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0d3VwZW5xaWVlc29rdG9uYnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTA0MzgsImV4cCI6MjA4Nzk4NjQzOH0.OqkqF7NXr5LBQsQ0sl6S2o-kzQqbtBlRCLFszRnUoHA';

const SPORT_IDS = {
  'basketball':   'b31ab283-b28e-4ba8-9684-b1cf30cea219',
  'baseball':     'c87a4d6c-a471-47e1-b6a0-d1643d942bf0',
  'softball':     '095c9841-7261-4cb1-824e-6304792b53d0',
  'lacrosse':     '9c34ec5c-81b4-4e2e-9f60-740bb30fee4d',
  'soccer':       'ff80a695-0e78-4432-98f2-141b2b571e0e',
  'field-hockey': '1054869a-20d4-465f-8ca9-4bc4d2bafe1b',
  'football':     'fa905ca5-f416-409b-81ac-777179ee5576',
  'volleyball':   'e26b0fcc-e661-4945-8b2d-063c37ace44f',
};
const SPORT_ID_TO_SLUG = Object.fromEntries(Object.entries(SPORT_IDS).map(([k,v]) => [v,k]));

const SPORT_NAME = {
  'basketball':   'Basketball',
  'baseball':     'Baseball',
  'softball':     'Softball',
  'lacrosse':     'Lacrosse',
  'soccer':       'Soccer',
  'field-hockey': 'Field Hockey',
  'football':     'Football',
  'volleyball':   'Volleyball',
};

// Sport display order
const SPORT_ORDER = ['football','basketball','volleyball','baseball','softball','soccer','field-hockey','lacrosse'];

const SPORT_REG_END = {
  'basketball':   '2026-02-06',
  'baseball':     '2025-06-04',
  'softball':     '2025-06-04',
  'lacrosse':     '2025-06-06',
  'soccer':       '2025-10-22',
  'field-hockey': '2025-10-22',
  'football':     '2025-11-01',
  'volleyball':   '2025-11-01',
};

async function sb(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Prefer': 'count=none' }
  });
  if (!r.ok) { const b = await r.text(); throw new Error(`${r.status} — ${b}`); }
  return r.json();
}

function slugToName(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function nameToSlug(name) {
  return name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
}

function logoEl(url, name) {
  const ch = (name || '?')[0];
  if (url) return `<img class="school-logo-lg" src="${url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="school-logo-fallback" style="display:none">${ch}</div>`;
  return `<div class="school-logo-fallback">${ch}</div>`;
}

function renderRoster(players, sport) {
  if (!players || !players.length) return `<p class="no-roster">No roster data available.</p>`;

  const isBball = sport === 'basketball';
  const isBase  = sport === 'baseball' || sport === 'softball';

  const headCells = ['<th>#</th>', '<th>Name</th>', '<th>Ht</th>', '<th>Pos</th>', '<th>Gr</th>', '<th class="rt-stat-gap-th"></th>'];
  if (isBball) headCells.push('<th>PPG</th>','<th>RPG</th>','<th>APG</th>','<th>STL</th>','<th>BLK</th>','<th>FG%</th>','<th>3P%</th>','<th>FT%</th>','<th>EFF</th>','<th>+/-</th>');
  else if (isBase) headCells.push('<th>BA</th>','<th>HR</th>','<th>RBI</th>','<th>SB</th>','<th>OPS</th>');

  const n = (v, dec) => v != null ? (dec != null ? (+v).toFixed(dec) : v) : '';

  const rows = players.map(p => {
    const cells = [
      `<td class="rt-num">${p.number || '—'}</td>`,
      `<td class="rt-name">${p.name || ''}</td>`,
      `<td class="rt-bio">${p.height || ''}</td>`,
      `<td class="rt-bio">${p.position || ''}</td>`,
      `<td class="rt-bio">${p.grade || ''}</td>`,
      `<td class="rt-stat-gap"></td>`,
    ];
    if (isBball) {
      cells.push(`<td class="rt-stat">${n(p.ppg,1)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.rpg,1)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.apg,1)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.stl)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.blk)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.fgp,1)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.tpp,1)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.ftp,1)}</td>`);
      cells.push(`<td class="rt-stat">${p.eff != null && p.games ? Math.round(p.eff / p.games) : ''}</td>`);
      cells.push(`<td class="rt-stat">${p.plusminus != null ? (p.plusminus > 0 ? '+' : '') + p.plusminus : ''}</td>`);
    } else if (isBase) {
      cells.push(`<td class="rt-stat">${n(p.ba,3)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.hr)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.rbi)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.sb)}</td>`);
      cells.push(`<td class="rt-stat">${n(p.ops,3)}</td>`);
    }
    return `<tr>${cells.join('')}</tr>`;
  }).join('');

  return `<div class="roster-wrap">
    <table class="rt">
      <thead><tr>${headCells.join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function fdt(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderSportCard(team, snap, wins, losses, ties, players, sport, showGender, lastGame, nextGame) {
  const sportName = SPORT_NAME[sport] || sport;
  const gender = team.gender;
  const title = showGender ? `${gender} ${sportName}` : sportName;
  const seasonYear = sport === 'basketball' ? 2026 : 2025;

  const rankOverall = snap ? snap.rank_overall : null;
  const rankClass   = snap ? snap.rank_class   : null;
  const heals       = snap ? (+snap.heal_points).toFixed(2) : '—';
  const cls         = team.team_class || '';
  const reg         = team.team_region || '';

  const record = ties > 0 ? `${wins}–${losses}–${ties}` : `${wins}–${losses}`;

  function scLogoEl(t) {
    if (!t) return `<div class="sc-logo-fb">?</div>`;
    const ch = (t.school_name || '?')[0];
    if (t.logo_url) return `<img src="${t.logo_url}" alt="${t.school_name}" style="max-width:30px;max-height:30px;object-fit:contain;display:block" onerror="this.style.display='none'">`;
    return `<div class="sc-logo-fb">${ch}</div>`;
  }

  function scGameCard(g, teamId) {
    const isHome = g.home_team_id === teamId;
    const us   = isHome ? g.home_team : g.away_team;
    const them = isHome ? g.away_team : g.home_team;
    const isFinal = g.status === 'final';
    const usSc   = isHome ? g.home_score : g.away_score;
    const themSc = isHome ? g.away_score : g.home_score;
    const usWin   = isFinal && usSc > themSc;
    const themWin = isFinal && themSc > usSc;
    const usSlug   = (us?.school_name||'').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    const themSlug = (them?.school_name||'').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    const topLabel = isFinal ? 'Final' : 'Upcoming';
    const dateStr  = fdt(g.game_date);
    const loc      = g.location || '';

    const usScEl   = isFinal ? `<span class="sc-score ${usWin?'winner':'loser'}">${usSc}</span>`   : `<span class="sc-score empty">–</span>`;
    const themScEl = isFinal ? `<span class="sc-score ${themWin?'winner':'loser'}">${themSc}</span>` : `<span class="sc-score empty">–</span>`;

    // Visitor (them) on top, us on bottom — standard scoreboard convention
    return `<div class="sc-game-card">
      <div class="sc-card-top"><span>${topLabel}</span><span>${dateStr}</span></div>
      <div class="sc-card-body">
        <div class="sc-team-row">
          <div class="sc-logo">${scLogoEl(them)}</div>
          <a class="sc-name ${themWin?'winner':isFinal?'loser':''}" href="team.html?team_id=${them?.id||''}">${them?.school_name||'Unknown'}</a>
          ${themScEl}
        </div>
        <div class="sc-team-row">
          <div class="sc-logo">${scLogoEl(us)}</div>
          <a class="sc-name ${usWin?'winner':isFinal?'loser':''}" href="team.html?team_id=${us?.id||''}">${us?.school_name||'Unknown'}</a>
          ${usScEl}
        </div>
      </div>
      ${loc ? `<div class="sc-card-footer">${loc}</div>` : ''}
    </div>`;
  }

  const cards = [lastGame, nextGame].filter(Boolean).map(g => scGameCard(g, team.id)).join('');
  const gamesHtml = cards ? `<div class="game-cards-row">${cards}</div>` : '';

  const statsRow = `
    <div class="sport-stats-row">
      <div class="sport-stat">
        <span class="sport-stat-lbl">Record</span>
        <span class="sport-stat-val grn">${record}</span>
      </div>
      ${rankOverall ? `<div class="sport-stat">
        <span class="sport-stat-lbl">Rank</span>
        <span class="sport-stat-val">#${rankOverall}</span>
      </div>` : ''}
      ${rankClass ? `<div class="sport-stat">
        <span class="sport-stat-lbl">Class ${cls} Rank</span>
        <span class="sport-stat-val">#${rankClass}</span>
      </div>` : ''}
      <div class="sport-stat">
        <span class="sport-stat-lbl">Heal Points</span>
        <span class="sport-stat-val">${heals}</span>
      </div>
      ${cls ? `<div class="sport-stat">
        <span class="sport-stat-lbl">Class</span>
        <span class="sport-stat-val">${cls}${reg ? ' · ' + reg : ''}</span>
      </div>` : ''}
    </div>`;

  const rosterHtml = renderRoster(players, sport);
  const teamUrl = `team.html?team_id=${team.id}`;

  return `
    <div class="sport-card">
      <div class="sport-card-header">
        <span class="sport-card-title">${title}</span>
        <a class="sport-card-link" href="${teamUrl}">Schedule &amp; Stats →</a>
      </div>
      <div class="sport-card-body">
        ${statsRow}
        ${gamesHtml}
        ${rosterHtml}
      </div>
    </div>`;
}

async function load() {
  const app = document.getElementById('app');
  const slug = new URLSearchParams(location.search).get('school');
  if (!slug) { app.innerHTML = `<div class="error-state">No school specified.</div>`; return; }

  const schoolName = slugToName(slug);

  try {
    // Fetch all teams for this school across all sports
    const teams = await sb(`teams?school_name=ilike.${encodeURIComponent(schoolName)}&select=id,school_name,logo_url,gender,sport_id,team_class,team_region&order=sport_id.asc`);

    if (!teams.length) {
      app.innerHTML = `<div class="error-state">No teams found for "${schoolName}".</div>`;
      return;
    }

    const schoolDisplayName = teams[0].school_name;
    const logoUrl = teams[0].logo_url;

    // Fetch records, snapshots, and rosters for all teams in parallel
    const teamData = await Promise.all(teams.map(async team => {
      const sport = SPORT_ID_TO_SLUG[team.sport_id] || 'basketball';
      const seasonYear = sport === 'basketball' ? 2026 : 2025;
      const regEnd = SPORT_REG_END[sport] || '2026-02-06';

      const [games, snaps, players] = await Promise.all([
        sb(`games?or=(home_team_id.eq.${team.id},away_team_id.eq.${team.id})&sport_id=eq.${team.sport_id}&order=game_date.asc&select=game_date,status,location,home_team_id,away_team_id,home_score,away_score,home_team:home_team_id(id,school_name,logo_url),away_team:away_team_id(id,school_name,logo_url)`),
        sb(`rankings_snapshots?team_id=eq.${team.id}&order=snapshot_date.desc&limit=1&select=rank_overall,rank_class,heal_points`),
        sb(`players?team_id=eq.${team.id}&sport_id=eq.${team.sport_id}&season_year=eq.${seasonYear}&select=number,name,height,position,grade,games,ppg,rpg,apg,stl,blk,fgp,tpp,ftp,eff,plusminus,ba,hr,rbi,sb,ops&order=number.asc&limit=100`),
      ]);

      let wins = 0, losses = 0, ties = 0;
      const today = new Date().toISOString().slice(0, 10);
      const finalGames = games.filter(g => g.status === 'final').sort((a,b) => a.game_date > b.game_date ? 1 : -1);
      const upcoming = games.filter(g => g.status === 'scheduled' && g.game_date >= today).sort((a,b) => a.game_date > b.game_date ? 1 : -1);

      for (const g of finalGames) {
        const home = g.home_team_id === team.id;
        const ts = home ? g.home_score : g.away_score;
        const os = home ? g.away_score : g.home_score;
        if (ts > os) wins++;
        else if (ts < os) losses++;
        else ties++;
      }

      const lastGame = finalGames[finalGames.length - 1] || null;
      const nextGame = upcoming[0] || null;

      return { team, sport, snap: snaps[0] || null, wins, losses, ties, players, lastGame, nextGame };
    }));

    // Sort by sport display order, then Boys before Girls
    teamData.sort((a, b) => {
      const si = SPORT_ORDER.indexOf(a.sport) - SPORT_ORDER.indexOf(b.sport);
      if (si !== 0) return si;
      return a.team.gender === 'Boys' ? -1 : 1;
    });

    // Build page — only show gender prefix if both Boys + Girls exist for that sport
    const sportsWithBothGenders = new Set(
      Object.entries(
        teamData.reduce((acc, { sport, team }) => {
          acc[sport] = acc[sport] || new Set();
          acc[sport].add(team.gender);
          return acc;
        }, {})
      ).filter(([, genders]) => genders.size > 1).map(([sport]) => sport)
    );

    const cardsHtml = teamData.map(({ team, sport, snap, wins, losses, ties, players, lastGame, nextGame }) =>
      renderSportCard(team, snap, wins, losses, ties, players, sport, sportsWithBothGenders.has(sport), lastGame, nextGame)
    ).join('');

    document.title = `${schoolDisplayName} — Maine Basketball Rankings`;

    app.innerHTML = `
      <div class="school-header">
        ${logoEl(logoUrl, schoolDisplayName)}
        <div>
          <div class="school-name">${schoolDisplayName}</div>
          <div class="school-sub">${teamData.length} team${teamData.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      ${cardsHtml}`;

  } catch (err) {
    console.error(err);
    app.innerHTML = `<div class="error-state">Error loading school data.<br><small>${err.message}</small></div>`;
  }
}

load();

// Load nav
fetch('nav.html').then(r => r.ok ? r.text() : '').then(h => { if(h) document.getElementById('mbr-header').innerHTML = h; }).catch(()=>{});
</script>
</body>
</html>

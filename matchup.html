<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matchup — Maine Basketball Rankings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --green:   #2d6a4f;
      --green2:  #40916c;
      --greenlt: #d8f3dc;
      --orange:  #ee6730;
      --black:   #1a1a1a;
      --gray:    #555;
      --lgray:   #999;
      --border:  #e5e5e5;
      --bg:      #f4f5f9;
      --card:    #ffffff;
      --red:     #c0392b;
      --gold:    #d4a00a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }

    .page-wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Gate */
    .gate-blur { filter: blur(6px); pointer-events: none; user-select: none; }
    #gateWrap { position: relative; }
    .gate-overlay {
      position: absolute; inset: 0; z-index: 10;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 60px;
    }
    .gate-box {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 36px 32px; max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .gate-box h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .gate-box p  { font-size: 14px; color: var(--lgray); margin-bottom: 20px; line-height: 1.5; }
    .gate-subscribe {
      display: inline-block; background: var(--green); color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
      padding: 10px 24px; border-radius: 6px; text-decoration: none; margin-bottom: 12px;
    }
    .gate-login-link {
      display: block; background: none; border: none; color: var(--lgray);
      font-size: 13px; cursor: pointer; font-family: 'Barlow', sans-serif; margin: 0 auto;
    }
    .gate-login-link:hover { color: var(--green); }

    /* Loading */
    .state-msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 80px 24px;
      color: var(--lgray); font-size: 15px;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--green2); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hero */
    .hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; margin-bottom: 16px;
    }
    .hero-meta {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: #fafafa; border-bottom: 1px solid var(--border);
      font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase; color: var(--lgray);
    }
    .hero-teams {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 28px 24px; gap: 16px;
    }
    .hero-team { display: flex; flex-direction: column; gap: 8px; }
    .hero-team.away { align-items: flex-end; text-align: right; }
    .hero-team.home { align-items: flex-start; text-align: left; }
    .hero-logo { width: 64px; height: 64px; object-fit: contain; }
    .hero-logo-init {
      width: 64px; height: 64px; background: var(--greenlt); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 24px; color: var(--green);
    }
    .hero-name  { font-weight: 600; font-size: 18px; line-height: 1.2; }
    .hero-record { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--lgray); font-weight: 600; }
    .hero-rank  { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: var(--green2); text-transform: uppercase; }
    .hero-score { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 700; line-height: 1; }
    .hero-vs    { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .hero-vs-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--lgray); }
    .hero-loc   { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: var(--lgray); text-align: center; max-width: 80px; line-height: 1.3; }

    .stax-badge { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
    .stax-badge.gray   { color: #aaa; }
    .stax-badge.yellow { color: var(--gold); }
    .stax-badge.orange { color: var(--orange); }
    .stax-badge.red    { color: var(--red); }

    /* Win prob */
    .win-prob { padding: 0 24px 20px; }
    .win-prob-bar {
      height: 8px; border-radius: 4px; background: var(--border);
      overflow: hidden; margin-bottom: 6px; display: flex;
    }
    .win-prob-home { background: var(--green2); transition: width 0.6s ease; }
    .win-prob-away { background: var(--lgray);  transition: width 0.6s ease; }
    .win-prob-labels {
      display: flex; justify-content: space-between;
      font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 0.5px; color: var(--lgray); text-transform: uppercase;
    }
    .win-prob-labels .pct { font-size: 13px; color: var(--black); }

    /* Pick row */
    .pick-row {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 14px 24px; border-top: 1px solid var(--border);
      font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
      font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--lgray);
    }
    .pick-team-label { color: var(--green); font-size: 14px; }
    .spread-label    { color: var(--black); font-size: 14px; }

    /* Stat grid */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .stat-card-header {
      font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase; color: var(--lgray);
      padding: 10px 16px 8px; border-bottom: 1px solid var(--border); background: #fafafa;
    }
    .stat-row {
      display: grid; grid-template-columns: 1fr 80px 1fr;
      align-items: center; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row .label {
      font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: var(--lgray); text-align: center;
    }
    .stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; }
    .stat-val.home { text-align: left; }
    .stat-val.away { text-align: right; }
    .stat-val.better { color: var(--green2); }
    .stat-val.worse  { color: var(--lgray);  }

    /* Bar rows */
    .bar-row { padding: 8px 16px 10px; border-bottom: 1px solid var(--border); }
    .bar-row:last-child { border-bottom: none; }
    .bar-row-header {
      display: flex; justify-content: space-between;
      font-family: 'Barlow Condensed', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px;
    }
    .bar-row-header .stat-name { color: var(--lgray); }
    .bar-row-track { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; display: flex; }
    .bar-home { background: var(--green2); }
    .bar-away { background: #aaa; }

    /* Section label */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--lgray); margin: 20px 0 8px;
    }

    /* Info chips */
    .info-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .info-chip {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; text-align: center;
    }
    .info-chip .chip-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .info-chip .chip-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--lgray); }

    /* Watermark */
    .watermark {
      text-align: center; padding: 20px 0 0;
      font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--lgray);
    }

    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: 1fr; }
      .hero-name  { font-size: 15px; }
      .hero-logo, .hero-logo-init { width: 48px; height: 48px; }
      .hero-logo-init { font-size: 18px; }
    }
  </style>
</head>
<body>

<div id="mbr-header"></div>

<div class="page-wrap">
  <div id="gateWrap">
    <div id="content">
      <div class="state-msg"><div class="spinner"></div><span>Loading matchup…</span></div>
    </div>
  </div>
</div>

<script>
const SPORT_SCORE_LABELS = {
  'basketball':   ['Avg PF', 'Avg PA'],
  'football':     ['Avg PF', 'Avg PA'],
  'soccer':       ['Avg GF', 'Avg GA'],
  'lacrosse':     ['Avg GF', 'Avg GA'],
  'field-hockey': ['Avg GF', 'Avg GA'],
  'baseball':     ['Avg RF', 'Avg RA'],
  'softball':     ['Avg RF', 'Avg RA'],
  'volleyball':   ['Avg Sets W', 'Avg Sets L'],
};

const SPORT_IDS = {
  'basketball':   'b31ab283-b28e-4ba8-9684-b1cf30cea219',
  'baseball':     'c87a4d6c-a471-47e1-b6a0-d1643d942bf0',
  'softball':     '095c9841-7261-4cb1-824e-6304792b53d0',
  'lacrosse':     '9c34ec5c-0e4c-4b5a-8e3a-7f2d1c9b4a6e',
  'soccer':       'ff80a695-0e78-4432-98f2-141b2b571e0e',
  'field-hockey': '1054869a-2b3c-4d5e-6f7a-8b9c0d1e2f3a',
  'football':     'fa905ca5-1234-5678-abcd-ef0123456789',
  'volleyball':   'e26b0fcc-e661-4945-8b2d-063c37ace44f',
};
const SPORT_KEY_BY_ID = Object.fromEntries(Object.entries(SPORT_IDS).map(([k,v]) => [v,k]));

var _isPaid = false;

function applyGate(isPaid) {
  if (isPaid !== undefined) _isPaid = isPaid;
  const wrap    = document.getElementById('gateWrap');
  const content = document.getElementById('content');
  const existing = document.getElementById('gateOverlay');
  if (existing) existing.remove();
  content.classList.remove('gate-blur');

  if (!_isPaid) {
    content.classList.add('gate-blur');
    const overlay = document.createElement('div');
    overlay.className = 'gate-overlay';
    overlay.id = 'gateOverlay';
    overlay.innerHTML = `
      <div class="gate-box">
        <h3>Paid Subscribers Only</h3>
        <p>Matchup data is available to Maine Basketball Rankings paid subscribers.<br>Get full access for just $6/month.</p>
        <a class="gate-subscribe" href="https://mainebasketballrankings.com/#/portal/signup" target="_blank">Subscribe</a>
        <button class="gate-login-link" id="gateLoginBtn">Already a subscriber? Sign in</button>
      </div>`;
    wrap.appendChild(overlay);
    document.getElementById('gateLoginBtn').addEventListener('click', () => document.getElementById('mbrSignInBtn')?.click());
  }
}

window.mbrAuthCallback = function(user, isPaid) {
  applyGate(isPaid);
  if (isPaid) loadMatchup();
};

// ── Load ──────────────────────────────────────────────────────────────────────

async function loadMatchup() {
  const el     = document.getElementById('content');
  const params = new URLSearchParams(window.location.search);
  const gameId = params.get('game_id');

  if (!gameId) {
    el.innerHTML = '<div class="state-msg">No game specified.</div>';
    return;
  }

  const sb = MBRNav.getSB();

  const { data: game, error: gErr } = await sb.from('games').select(`
    id, game_date, game_time, location, sport_id, season_year,
    home_score, away_score, status, stax_index, pick_team, spread,
    home_team:home_team_id ( id, school_name, gender, logo_url, team_class,
      team_classifications ( classes(name), regions(name,abbreviation) ) ),
    away_team:away_team_id ( id, school_name, gender, logo_url, team_class,
      team_classifications ( classes(name), regions(name,abbreviation) ) )
  `).eq('id', gameId).single();

  if (gErr || !game) {
    el.innerHTML = '<div class="state-msg">Game not found.</div>';
    return;
  }

  const home = game.home_team;
  const away = game.away_team;

  const { data: snaps } = await sb.from('rankings_snapshots')
    .select(`team_id, rank_overall, rank_class, rank_region, pi, heal_points,
             wins, losses, avg_pf, avg_pa, sos, pct_perfect, win_pct,
             ats_record, snapshot_date`)
    .in('team_id', [home.id, away.id])
    .eq('season_year', game.season_year)
    .order('snapshot_date', { ascending: false });

  const snapMap = {};
  if (snaps) for (const s of snaps) if (!snapMap[s.team_id]) snapMap[s.team_id] = s;

  const hSnap = snapMap[home.id] || {};
  const aSnap = snapMap[away.id] || {};
  const sportKey    = SPORT_KEY_BY_ID[game.sport_id] || 'basketball';
  const scoreLabels = SPORT_SCORE_LABELS[sportKey] || ['Avg PF', 'Avg PA'];

  el.innerHTML = buildMatchup(game, home, away, hSnap, aSnap, scoreLabels);
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function logoEl(team) {
  if (team.logo_url) return `
    <img class="hero-logo" src="${team.logo_url}" alt="${team.school_name}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="hero-logo-init" style="display:none">${team.school_name[0]}</div>`;
  return `<div class="hero-logo-init">${team.school_name[0]}</div>`;
}

function getClass(team) { return team.team_class || team.team_classifications?.classes?.name || '?'; }
function getRegion(team) { return team.team_classifications?.regions?.abbreviation || ''; }

function rankLabel(snap, cls, reg) {
  const parts = [];
  if (snap.rank_overall) parts.push(`#${snap.rank_overall} State`);
  if (snap.rank_class)   parts.push(`#${snap.rank_class} Class ${cls}`);
  if (snap.rank_region && reg) parts.push(`#${snap.rank_region} ${reg}`);
  return parts.join(' · ') || '—';
}

function fmt(v, d = 1)  { return (v == null || isNaN(v)) ? '—' : Number(v).toFixed(d); }
function fmtPct(v)       { return (v == null || isNaN(v)) ? '—' : (Number(v) * 100).toFixed(1) + '%'; }
function fmtRec(s)       { return s.wins != null ? `${s.wins}–${s.losses ?? 0}` : '—'; }

function staxEl(val) {
  if (!val) return '';
  const n = parseFloat(val);
  const cls = n >= 80 ? 'red' : n >= 65 ? 'orange' : n >= 50 ? 'yellow' : 'gray';
  return `<span class="stax-badge ${cls}">⚡${n.toFixed(1)}</span>`;
}

function betterCls(hv, av, hiGood = true) {
  if (hv == null || av == null) return ['', ''];
  return (hiGood ? hv >= av : hv <= av) ? ['better', 'worse'] : ['worse', 'better'];
}

function statRow(label, hVal, aVal, hCls, aCls) {
  return `<div class="stat-row">
    <span class="stat-val home ${hCls}">${hVal}</span>
    <span class="label">${label}</span>
    <span class="stat-val away ${aCls}">${aVal}</span>
  </div>`;
}

function barRow(label, hv, av, hFmt, aFmt) {
  if (hv == null && av == null) return '';
  const total = (hv || 0) + (av || 0);
  const hp = total > 0 ? ((hv || 0) / total * 100).toFixed(1) : 50;
  const ap = total > 0 ? ((av || 0) / total * 100).toFixed(1) : 50;
  return `<div class="bar-row">
    <div class="bar-row-header">
      <span style="color:var(--black)">${hFmt}</span>
      <span class="stat-name">${label}</span>
      <span style="color:var(--black)">${aFmt}</span>
    </div>
    <div class="bar-row-track">
      <div class="bar-home" style="width:${hp}%"></div>
      <div class="bar-away" style="width:${ap}%"></div>
    </div>
  </div>`;
}

// ── Build ─────────────────────────────────────────────────────────────────────

function buildMatchup(game, home, away, hSnap, aSnap, scoreLabels) {
  const homeCls = getClass(home), awayCls = getClass(away);
  const homeReg = getRegion(home), awayReg = getRegion(away);
  const isFinal = game.status === 'final', isLive = game.status === 'active';
  const crossCls = homeCls !== awayCls;
  const clsLabel = crossCls ? `Cross-Class · ${home.gender}` : `Class ${homeCls} · ${home.gender}`;

  const dateStr = game.game_date
    ? new Date(game.game_date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
    : '';
  const statusLabel = isFinal ? `Final · ${dateStr}` : isLive ? `Live · ${dateStr}` : dateStr;

  // Win prob from PI
  let winProbHTML = '';
  if (hSnap.pi && aSnap.pi) {
    const total = hSnap.pi + aSnap.pi;
    const hp = (hSnap.pi / total * 100).toFixed(0);
    const ap = (100 - hp);
    winProbHTML = `<div class="win-prob">
      <div class="win-prob-bar">
        <div class="win-prob-home" style="width:${hp}%"></div>
        <div class="win-prob-away" style="width:${ap}%"></div>
      </div>
      <div class="win-prob-labels">
        <span>${home.school_name.split(' ').pop()} <span class="pct">${hp}%</span></span>
        <span><span class="pct">${ap}%</span> ${away.school_name.split(' ').pop()}</span>
      </div>
    </div>`;
  }

  // Pick
  let pickHTML = '';
  if (game.pick_team && game.spread != null) {
    const pickName = game.pick_team === home.id ? home.school_name : away.school_name;
    pickHTML = `<div class="pick-row">
      <span>Model Pick:</span>
      <span class="pick-team-label">${pickName}</span>
      <span class="spread-label">–${Math.abs(game.spread).toFixed(1)}</span>
    </div>`;
  }

  // Rankings card
  const [hRkBetter, aRkBetter] = betterCls(hSnap.rank_overall, aSnap.rank_overall, false);
  const [hClBetter, aClBetter] = betterCls(hSnap.rank_class,   aSnap.rank_class,   false);
  const [hRgBetter, aRgBetter] = betterCls(hSnap.rank_region,  aSnap.rank_region,  false);
  const [hWnBetter, aWnBetter] = betterCls(hSnap.win_pct,      aSnap.win_pct,      true);

  const rankCard = `<div class="stat-card">
    <div class="stat-card-header">Rankings</div>
    ${statRow('State',       hSnap.rank_overall ? `#${hSnap.rank_overall}` : '—', aSnap.rank_overall ? `#${aSnap.rank_overall}` : '—', hRkBetter, aRkBetter)}
    ${statRow(`Class ${homeCls}`, hSnap.rank_class ? `#${hSnap.rank_class}` : '—', aSnap.rank_class ? `#${aSnap.rank_class}` : '—', hClBetter, aClBetter)}
    ${homeReg ? statRow(homeReg, hSnap.rank_region ? `#${hSnap.rank_region}` : '—', aSnap.rank_region ? `#${aSnap.rank_region}` : '—', hRgBetter, aRgBetter) : ''}
    ${statRow('Record',  fmtRec(hSnap), fmtRec(aSnap), hWnBetter, aWnBetter)}
    ${statRow('Win %',   fmtPct(hSnap.win_pct), fmtPct(aSnap.win_pct), hWnBetter, aWnBetter)}
  </div>`;

  // Analytics card
  const hasSos = hSnap.sos != null || aSnap.sos != null;
  const hasPf  = hSnap.avg_pf != null || aSnap.avg_pf != null;
  const hasPct = hSnap.pct_perfect != null || aSnap.pct_perfect != null;

  const analyCard = `<div class="stat-card">
    <div class="stat-card-header">Analytics</div>
    ${barRow('DIRIGO',         hSnap.heal_points, aSnap.heal_points, fmt(hSnap.heal_points, 2), fmt(aSnap.heal_points, 2))}
    ${barRow('PI',             hSnap.pi,          aSnap.pi,          fmt(hSnap.pi, 3),           fmt(aSnap.pi, 3))}
    ${hasSos  ? barRow('SOS',        hSnap.sos,         aSnap.sos,         fmt(hSnap.sos, 2),          fmt(aSnap.sos, 2))          : ''}
    ${hasPct  ? barRow('%Perfect',   hSnap.pct_perfect, aSnap.pct_perfect, fmtPct(hSnap.pct_perfect),  fmtPct(aSnap.pct_perfect))  : ''}
    ${hasPf   ? barRow(scoreLabels[0], hSnap.avg_pf,   aSnap.avg_pf,      fmt(hSnap.avg_pf),           fmt(aSnap.avg_pf))           : ''}
    ${hasPf   ? barRow(scoreLabels[1], hSnap.avg_pa,   aSnap.avg_pa,      fmt(hSnap.avg_pa),           fmt(aSnap.avg_pa))           : ''}
  </div>`;

  return `
  <div class="hero">
    <div class="hero-meta">
      <span>${statusLabel}</span>
      <span>${clsLabel}</span>
      ${staxEl(game.stax_index)}
    </div>
    <div class="hero-teams">
      <div class="hero-team away">
        ${logoEl(away)}
        <div class="hero-name">${away.school_name}</div>
        <div class="hero-record">${fmtRec(aSnap)}</div>
        <div class="hero-rank">${rankLabel(aSnap, awayCls, awayReg)}</div>
        ${isFinal ? `<div class="hero-score">${game.away_score ?? '–'}</div>` : ''}
      </div>
      <div class="hero-vs">
        <div class="hero-vs-label">vs</div>
        ${game.location ? `<div class="hero-loc">${game.location}</div>` : ''}
      </div>
      <div class="hero-team home">
        ${logoEl(home)}
        <div class="hero-name">${home.school_name}</div>
        <div class="hero-record">${fmtRec(hSnap)}</div>
        <div class="hero-rank">${rankLabel(hSnap, homeCls, homeReg)}</div>
        ${isFinal ? `<div class="hero-score">${game.home_score ?? '–'}</div>` : ''}
      </div>
    </div>
    ${winProbHTML}
    ${pickHTML}
  </div>

  <div class="section-label">Team Comparison</div>
  <div class="stat-grid">${rankCard}${analyCard}</div>

  <div class="section-label">Against the Spread</div>
  <div class="info-row">
    <div class="info-chip">
      <div class="chip-val">${aSnap.ats_record || '—'}</div>
      <div class="chip-lbl">${away.school_name.split(' ').pop()} ATS</div>
    </div>
    <div class="info-chip">
      <div class="chip-val">${hSnap.ats_record || '—'}</div>
      <div class="chip-lbl">${home.school_name.split(' ').pop()} ATS</div>
    </div>
  </div>

  <div class="watermark">mainebasketballrankings.com</div>`;
}
</script>
<script src="nav.js"></script>
<script>MBRNav.init({ active: 'matchup' });</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MBR Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3250;
  --hl:#4a9eff; --al:#e05c52; --text:#f0f2ff; --dim:#8890b0;
  --green:#27ae60; --gold:#f39c12; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Barlow',sans-serif;
  height:100dvh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;touch-action:none;
}

/* ── TOP BAR ── */
#topbar{
  display:grid;grid-template-columns:auto 1fr auto 1fr auto;
  align-items:stretch;
  background:var(--surface);border-bottom:2px solid var(--border);
  padding:0 10px;gap:0;flex-shrink:0;min-height:72px;
}
/* Fouls/TO blocks on far left/right */
.side-block{
  display:flex;flex-direction:column;justify-content:center;gap:3px;
  padding:6px 12px;border-right:1px solid var(--border);
}
.side-block.away-side{border-right:none;border-left:1px solid var(--border);}
.side-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.side-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--text);}
.side-to{display:flex;gap:4px;align-items:baseline;}
.side-to .side-val{font-size:16px;}
.side-to .side-sep{color:var(--dim);font-size:12px;}

/* Score+name blocks */
.tscore{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1px;padding:4px 8px;}
.tname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
.tscore.home .tname{color:var(--hl);}
.tscore.away .tname{color:var(--al);}
.snum{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:42px;line-height:1;}
.tscore.home .snum{color:var(--hl);}
.tscore.away .snum{color:var(--al);}
.poss-btn{
  display:inline-flex;align-items:center;gap:3px;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  letter-spacing:.06em;color:var(--dim);
  border:1px solid transparent;border-radius:5px;
  padding:1px 5px;cursor:pointer;margin-top:1px;
  transition:opacity .15s;
}
.poss-btn .pa{font-size:16px;line-height:1;}
.tscore.home .poss-btn .pa{color:var(--hl);}
.tscore.away .poss-btn .pa{color:var(--al);}
.poss-btn.has-poss{border-color:var(--border);opacity:1;}
.poss-btn.no-poss{opacity:.28;}

/* Clock centre */
#clk-col{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:4px 0;
}
#clock-btn{
  background:var(--surface2);border:2px solid var(--border);border-radius:8px;
  color:var(--text);font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:28px;padding:2px 16px;cursor:pointer;
  min-width:108px;text-align:center;
  transition:border-color .15s,color .15s,box-shadow .15s;
}
#clock-btn.running{border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(39,174,96,.25);}
#period-row{display:flex;align-items:center;gap:5px;}
#period-row button{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:5px;width:28px;height:28px;font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#period-row button:active{background:var(--border);}
#pdisplay{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.15em;color:var(--text);min-width:32px;text-align:center;}

/* ── MIDDLE: panels + court ── */
#middle{display:grid;grid-template-columns:162px 1fr 162px;flex:1;min-height:0;overflow:hidden;}

/* Player panels */
.ppanel{
  display:flex;flex-direction:column;gap:4px;padding:5px;
  overflow-y:auto;background:var(--surface);
}
.ppanel.hp{border-right:2px solid var(--border);}
.ppanel.ap{border-left:2px solid var(--border);}

.pcard{
  border-radius:8px;padding:10px 9px;cursor:pointer;
  border:2px solid transparent;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  transition:transform .1s;
}
.hp .pcard{background:rgba(45,125,210,.1);border-color:rgba(45,125,210,.2);}
.ap .pcard{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.2);}
.pcard.sel{border-color:var(--gold)!important;background:rgba(243,156,18,.18)!important;box-shadow:0 0 14px rgba(243,156,18,.35);}
.pcard:active{transform:scale(.97);}

.pnum{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;line-height:1;flex-shrink:0;}
.hp .pnum{color:var(--hl);}
.ap .pnum{color:var(--al);}
.pinfo{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.pname{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pstats{display:flex;gap:8px;}
.ps{display:flex;flex-direction:column;align-items:center;}
.psv{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;line-height:1;color:var(--text);}
.psl{font-size:8px;color:var(--dim);letter-spacing:.05em;text-transform:uppercase;}
.fdots{display:flex;gap:2px;margin-top:2px;}
.fd{width:7px;height:7px;border-radius:50%;background:var(--border);}
.fd.on{background:var(--gold);}

/* ── COURT ── */
#court-wrap{position:relative;display:flex;overflow:hidden;background:#1a1208;}
#csvg{width:100%;height:100%;display:block;cursor:crosshair;}

/* Live event feed overlay */
#evt-feed{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:2px;
  pointer-events:none;z-index:10;min-width:220px;max-width:320px;
}
.ef-row{
  display:flex;align-items:center;gap:5px;
  background:rgba(10,12,20,.82);border-radius:5px;
  padding:3px 8px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:.04em;
}
.ef-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ef-txt{color:var(--text);}
.ef-clk{color:var(--dim);font-size:10px;margin-left:auto;}

/* Swipe overlay */
#swipe-ov{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  pointer-events:none;z-index:15;
}
#swipe-ov.show{display:flex;}
.sw-dirs{position:relative;width:160px;height:160px;}
.sw-dir{
  position:absolute;display:flex;flex-direction:column;align-items:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  transition:opacity .1s,transform .1s;opacity:.55;
}
.sw-dir.lit{opacity:1;transform:scale(1.25)!important;}
.sw-dir .da{font-size:30px;line-height:1;}
.sw-dir .dl{font-size:11px;letter-spacing:.06em;}
.sd-up{top:0;left:50%;transform:translateX(-50%);color:var(--green);}
.sd-up.lit{transform:translateX(-50%) scale(1.25);}
.sd-right{right:0;top:50%;transform:translateY(-50%);color:#a78bfa;}
.sd-right.lit{transform:translateY(-50%) scale(1.25);}
.sd-left{left:0;top:50%;transform:translateY(-50%);color:var(--al);}
.sd-left.lit{transform:translateY(-50%) scale(1.25);}
.sd-down{bottom:0;left:50%;transform:translateX(-50%);color:var(--dim);}
.sd-down.lit{transform:translateX(-50%) scale(1.25);}
.sw-ctr{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--dim);
  letter-spacing:.05em;
}

#ghint{
  position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:var(--dim);
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  letter-spacing:.06em;padding:3px 10px;border-radius:20px;
  pointer-events:none;white-space:nowrap;
}

/* Log + box score buttons */
#court-btns{position:absolute;top:6px;right:6px;display:flex;gap:5px;z-index:10;}
.cbtn{
  background:rgba(22,25,38,.88);border:1px solid var(--border);border-radius:6px;
  color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:11px;
  letter-spacing:.08em;padding:4px 9px;cursor:pointer;
}
.cbtn:active{background:var(--surface2);}

/* Log panel */
#log-panel{
  position:absolute;top:34px;right:6px;width:215px;max-height:220px;
  background:rgba(12,14,22,.96);border:1px solid var(--border);border-radius:var(--radius);
  overflow-y:auto;font-size:10px;z-index:20;display:none;
}
#log-panel.open{display:block;}
.lhdr{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--dim);padding:6px 8px 4px;
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;
  align-items:center;position:sticky;top:0;background:rgba(12,14,22,.98);
}
.lhdr button{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;}
.lrow{display:flex;align-items:center;gap:5px;padding:4px 8px;border-bottom:1px solid rgba(46,50,80,.4);}
.lrow:hover{background:var(--surface2);}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ltxt{flex:1;color:var(--text);line-height:1.3;}
.lclk{color:var(--dim);font-size:9px;flex-shrink:0;}
.ldel{background:none;border:none;color:var(--al);font-size:12px;cursor:pointer;opacity:.5;padding:0 2px;}
.ldel:hover{opacity:1;}

/* ── STAT BAR ── */
#stat-bar{background:var(--surface);border-top:2px solid var(--border);padding:5px 8px 6px;flex-shrink:0;}
#sel-display{
  text-align:center;font-family:'Barlow Condensed',sans-serif;
  font-size:12px;color:var(--dim);margin-bottom:4px;min-height:16px;letter-spacing:.05em;
}
#sel-display .sn{font-weight:700;font-size:14px;}
.sgrid{display:grid;grid-template-columns:repeat(11,1fr);gap:4px;}
.sbtn{
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;
  padding:6px 2px;text-align:center;cursor:pointer;
  transition:transform .08s,background .08s;line-height:1.2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
}
.sbtn .si{font-size:13px;line-height:1;}
.sbtn:active{transform:scale(.91);background:var(--border);}
.sbtn.sc{border-color:rgba(39,174,96,.6);color:#5ddb8a;}
.sbtn.ms{border-color:rgba(192,57,43,.5);color:var(--al);}
.sbtn.fo{border-color:rgba(243,156,18,.6);color:var(--gold);}
.sbtn.ts{border-color:rgba(140,140,180,.35);color:var(--dim);}
.sbtn.np{opacity:.28;pointer-events:none;}

/* ── BOX SCORE MODAL ── */
#bs-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);
  z-index:100;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;
}
#bs-modal.show{display:flex;}
.bs-box{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  width:min(96vw,700px);padding:16px;box-shadow:0 4px 30px rgba(0,0,0,.6);
  margin-bottom:20px;
}
.bs-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;
  letter-spacing:.06em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;
}
.bs-close{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;}
.bs-team{margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.bs-tname{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:.1em;text-transform:uppercase;padding:3px 0;
  border-bottom:1px solid var(--border);margin-bottom:6px;
}
.bs-tname.hn{color:var(--hl);}
.bs-tname.an{color:var(--al);}
.bs-table{border-collapse:collapse;font-size:11px;min-width:560px;width:100%;}
.bs-table th{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dim);text-align:right;padding:2px 5px;
}
.bs-table th:first-child{text-align:left;}
.bs-table td{text-align:right;padding:3px 5px;border-bottom:1px solid rgba(46,50,80,.3);}
.bs-table td:first-child{text-align:left;font-weight:600;}
.bs-table tr:last-child td{border-bottom:none;font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:12px;}

/* ── SUB MODAL ── */
#sub-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center;}
#sub-modal.show{display:flex;}
.sub-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;width:270px;max-height:80vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.sub-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;margin-bottom:3px;}
.sub-sub{font-size:11px;color:var(--dim);margin-bottom:10px;}
.sub-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .1s;border:1px solid transparent;}
.sub-row:hover{background:var(--surface2);border-color:var(--border);}
.sub-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;width:30px;text-align:center;}
.sub-name{font-weight:600;font-size:13px;}
.sub-sm{font-size:10px;color:var(--dim);}
.sub-cancel{margin-top:10px;width:100%;padding:9px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:14px;cursor:pointer;}

/* ── FLASH ── */
#flash{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.85);
  background:rgba(243,156,18,.95);color:#000;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;
  padding:9px 22px;border-radius:10px;pointer-events:none;opacity:0;
  transition:opacity .12s,transform .12s;z-index:200;letter-spacing:.05em;white-space:nowrap;
}
#flash.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#flash.made{background:rgba(39,174,96,.95);color:#fff;}
#flash.mfl{background:rgba(192,57,43,.88);color:#fff;}
#flash.cfl{background:rgba(60,60,80,.9);color:var(--dim);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- TOP BAR: [Fouls/TO] [Home Score+Name] [Clock/Period] [Away Score+Name] [Fouls/TO] -->
<div id="topbar">
  <!-- Home fouls/TO -->
  <div class="side-block">
    <div class="side-lbl">Fouls</div>
    <div class="side-val" id="home-fouls">0</div>
    <div class="side-lbl" style="margin-top:4px">Timeouts</div>
    <div class="side-to">
      <div class="side-val" id="home-tof">3</div>
      <div class="side-sep">/</div>
      <div class="side-val" id="home-to3">2</div>
    </div>
  </div>

  <!-- Home score + name -->
  <div class="tscore home">
    <div class="tname">Camden Boys</div>
    <div class="snum" id="home-score">0</div>
    <div class="poss-btn has-poss" id="poss-home" onclick="setPoss('home')">
      <span class="pa">▶</span><span>POSS</span>
    </div>
  </div>

  <!-- Clock centre -->
  <div id="clk-col">
    <button id="clock-btn" onclick="toggleClock()">8:00</button>
    <div id="period-row">
      <button onclick="chgPeriod(-1)">‹</button>
      <div id="pdisplay">1ST</div>
      <button onclick="chgPeriod(1)">›</button>
    </div>
  </div>

  <!-- Away score + name -->
  <div class="tscore away">
    <div class="tname">Cape Elizabeth Boys</div>
    <div class="snum" id="away-score">0</div>
    <div class="poss-btn no-poss" id="poss-away" onclick="setPoss('away')">
      <span class="pa">▶</span><span>POSS</span>
    </div>
  </div>

  <!-- Away fouls/TO -->
  <div class="side-block away-side">
    <div class="side-lbl">Fouls</div>
    <div class="side-val" id="away-fouls">0</div>
    <div class="side-lbl" style="margin-top:4px">Timeouts</div>
    <div class="side-to">
      <div class="side-val" id="away-tof">3</div>
      <div class="side-sep">/</div>
      <div class="side-val" id="away-to3">2</div>
    </div>
  </div>
</div>

<!-- MIDDLE -->
<div id="middle">
  <div class="ppanel hp" id="home-panel"></div>

  <div id="court-wrap">
    <!--
      COURT: basket at TOP. ViewBox 460 x 380.
      Scale: 430px / 50ft = 8.6px/ft. Basket centre (230, 40).
      Baseline: y=18. Half court line: y=372.

      Key: 12ft=103px wide, 15ft=129px deep
        x: 179–281, top y=18, FT line y=147
      FT circle: centre (230,147), r=52px
      3pt arc: r=170px from (230,40)
        endpoints at baseline y=18:
          (x-230)²+(18-40)²=170² → (x-230)²=28900-484=28416 → x=230±169 → x=61, x=399
        Arc must sweep DOWNWARD through the court (away from baseline, toward half court)
        From (61,18) to (399,18): large arc going DOWN = large-arc=1, sweep=1
      Restricted arc: r=34px from (230,40), endpoints at y=18:
        (x-230)²+(18-40)²=34² → (x-230)²=1156-484=672 → x=230±26 → x=204,256
        Arc sweeps DOWN into court = sweep=1, large-arc=0
    -->
    <svg id="csvg" viewBox="0 0 460 380" preserveAspectRatio="xMidYMid meet">
      <!--
        NFHS half court: 50ft wide × 47ft deep (baseline to half court).
        ViewBox 460×380. Margins 15px each side → playable 430×362.
        Scale: 430/50 = 8.6px/ft horizontal, 362/47 = 7.7px/ft vertical.
        Use 8.0px/ft as a round uniform scale (slight letterbox is fine).

        Origin: top-left of playable area = (15, 10).
        Basket: 5.25ft from baseline → y = 10 + 5.25*8 = 52. Centre (230, 52).
        Key (paint): 12ft wide, 19ft deep.
          x: 230 ± 6*8 = 230±48 → x=182 to 278. y: 10 to 10+19*8=162.
        FT line: y=162. FT circle: centre (230,162), r=6*8=48px.
        Restricted arc: r=4*8=32px from basket (230,52).
          At y=10: (x-230)²+(10-52)²=32² → 1764+1024=2788 > 1024 → arc starts below baseline.
          Just draw from x=230-32=198 to 262 tangent to baseline.
        3pt arc: r=19.75*8=158px from basket (230,52).
          At y=10 (baseline): (x-230)²+(10-52)²=158²
          (x-230)²=24964-1764=23200 → x=230±152 → x=78, x=382.
          Arc from (78,10) to (382,10) sweeping DOWN into court: sweep=0, large-arc=0.
          Arc bottom: y = 52+158 = 210. Extends to halfway between FT line (162) and half court.
          ✓ Matches reference image proportions.
      -->

      <!-- Floor -->
      <rect width="460" height="380" fill="#c9a96e"/>
      <!-- Boundary -->
      <rect x="15" y="10" width="430" height="362" fill="none" stroke="#7a5c1e" stroke-width="3" rx="2"/>

      <!-- HALF COURT line + circle at bottom -->
      <line x1="15" y1="372" x2="445" y2="372" stroke="#7a5c1e" stroke-width="2"/>
      <circle cx="230" cy="372" r="48" fill="none" stroke="#7a5c1e" stroke-width="2"/>

      <!-- KEY / PAINT: x=182–278, y=10–162 -->
      <rect x="182" y="10" width="96" height="152" fill="#b8955a" stroke="#7a5c1e" stroke-width="2"/>
      <!-- Lane tick marks -->
      <line x1="202" y1="10" x2="202" y2="162" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>
      <line x1="258" y1="10" x2="258" y2="162" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>

      <!-- BACKBOARD: 6ft=48px wide, at y=13 -->
      <rect x="206" y="13" width="48" height="6" fill="#7a5c1e" rx="1"/>

      <!-- BASKET centre (230, 52) r=9 -->
      <circle cx="230" cy="52" r="9" fill="none" stroke="#7a5c1e" stroke-width="2.5"/>
      <circle cx="230" cy="52" r="3" fill="#7a5c1e"/>

      <!-- RESTRICTED AREA ARC: r=32 from (230,52), tangent to baseline -->
      <path d="M 198 10 A 32 32 0 0 1 262 10" fill="none" stroke="#7a5c1e" stroke-width="1.8"/>

      <!-- FT LINE at y=162 -->
      <line x1="182" y1="162" x2="278" y2="162" stroke="#7a5c1e" stroke-width="2"/>
      <!-- FT CIRCLE: centre (230,162) r=48. Top half solid (toward basket), bottom dashed -->
      <path d="M 182 162 A 48 48 0 0 0 278 162" fill="none" stroke="#7a5c1e" stroke-width="2"/>
      <path d="M 182 162 A 48 48 0 0 1 278 162" fill="none" stroke="#7a5c1e" stroke-width="2" stroke-dasharray="7,6"/>

      <!-- 3-POINT ARC: r=158, centre (230,52)
           endpoints (78,10) and (382,10). sweep=0 bows downward into court. -->
      <!-- 3pt arc: r=170 from basket (230,52). No corner lines — arc endpoints land on baseline.
           At y=10: (x-230)²+(10-52)²=170² → (x-230)²=28900-1764=27136 → x=230±165 → x=65, x=395
           Arc bottom: y=52+170=222 (~60% court depth). sweep=0 bows downward. -->
      <path d="M 65 10 A 170 170 0 0 0 395 10" fill="none" stroke="#7a5c1e" stroke-width="2.5"/>

      <!-- Shot dots -->
      <g id="shot-dots"></g>
      <!-- Touch ring -->
      <circle id="tring" cx="0" cy="0" r="20" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.3)" stroke-width="2" opacity="0" pointer-events="none"/>
    </svg>

    <!-- Live event feed -->
    <div id="evt-feed"></div>

    <!-- Swipe overlay -->
    <div id="swipe-ov">
      <div class="sw-dirs">
        <div class="sw-dir sd-up" id="dir-up"><span class="da">↑</span><span class="dl">MAKE</span></div>
        <div class="sw-dir sd-right" id="dir-right"><span class="da">→</span><span class="dl">PB ✓</span></div>
        <div class="sw-dir sd-left" id="dir-left"><span class="da">←</span><span class="dl">PB ✗</span></div>
        <div class="sw-dir sd-down" id="dir-down"><span class="da">↓</span><span class="dl">CANCEL</span></div>
        <div class="sw-ctr">SWIPE</div>
      </div>
    </div>

    <div id="ghint">TAP = miss · SWIPE ↑ = make · → putback ✓ · ← putback ✗ · ↓ cancel</div>

    <div id="court-btns">
      <button class="cbtn" onclick="toggleLog()">LOG ▾</button>
      <button class="cbtn" onclick="openBoxScore()">BOX ▾</button>
    </div>

    <div id="log-panel">
      <div class="lhdr"><span>EVENT LOG</span><button onclick="toggleLog()">✕</button></div>
      <div id="log-entries"></div>
    </div>
  </div>

  <div class="ppanel ap" id="away-panel"></div>
</div>

<!-- STAT BAR -->
<div id="stat-bar">
  <div id="sel-display">Tap a player to select</div>
  <div class="sgrid" id="stat-grid"></div>
</div>

<!-- BOX SCORE MODAL -->
<div id="bs-modal">
  <div class="bs-box">
    <div class="bs-title">
      <span>Box Score</span>
      <button class="bs-close" onclick="closeBoxScore()">✕</button>
    </div>
    <div id="bs-content"></div>
  </div>
</div>

<!-- SUB MODAL -->
<div id="sub-modal">
  <div class="sub-box">
    <div class="sub-title" id="sub-title">Substitution</div>
    <div class="sub-sub">Select player entering the game</div>
    <div id="sub-list"></div>
    <button class="sub-cancel" onclick="closeSubModal()">Cancel</button>
  </div>
</div>

<div id="flash"></div>

<script>
// ══ DATA ══════════════════════════════════════
const GAME={
  home:{name:'Camden Boys',    short:'CAMDEN',  score:0,fouls:0,tof:3,to3:2},
  away:{name:'Cape Elizabeth', short:'CAP.ELI', score:0,fouls:0,tof:3,to3:2},
  period:1,clockSec:480,running:false,possession:'home'
};

const PL={
  home:[
    {id:'h1',fi:'H',last:'Stewart',   num:4, pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'h2',fi:'S',last:'Johnson',   num:10,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'h3',fi:'K',last:'Melquist',  num:11,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'h4',fi:'H',last:'Schwalm',   num:12,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'h5',fi:'T',last:'Leadbetter',num:15,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'h6',fi:'E',last:'Stearns',   num:22,pts:0,reb:0,ast:0,fouls:0,on:false},
    {id:'h7',fi:'M',last:'Webb',      num:3, pts:0,reb:0,ast:0,fouls:0,on:false},
  ],
  away:[
    {id:'a1',fi:'L',last:'Lombardo',    num:10,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'a2',fi:'C',last:'Wannemacher', num:11,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'a3',fi:'J',last:'Rosen',       num:14,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'a4',fi:'E',last:'Morse',       num:20,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'a5',fi:'O',last:'Beaureguard', num:23,pts:0,reb:0,ast:0,fouls:0,on:true},
    {id:'a6',fi:'F',last:'Casey',       num:5, pts:0,reb:0,ast:0,fouls:0,on:false},
    {id:'a7',fi:'D',last:'Park',        num:33,pts:0,reb:0,ast:0,fouls:0,on:false},
  ]
};

const SDEFS=[
  {key:'o_reb',           lbl:'O-Reb',   icon:'↑', t:'nm'},
  {key:'d_reb',           lbl:'D-Reb',   icon:'↓', t:'nm'},
  {key:'assist',          lbl:'Assist',  icon:'🤝',t:'nm'},
  {key:'steal',           lbl:'Steal',   icon:'⚡',t:'nm'},
  {key:'block',           lbl:'Block',   icon:'✋',t:'nm'},
  {key:'turnover',        lbl:'T/O',     icon:'↩', t:'nm'},
  {key:'deflection',      lbl:'Defl.',   icon:'🖐',t:'nm'},
  {key:'charge_taken',    lbl:'Charge',  icon:'🛡',t:'nm'},
  {key:'foul_personal',   lbl:'P.Foul',  icon:'⚠', t:'fo'},
  {key:'foul_offensive',  lbl:'O.Foul',  icon:'⚠', t:'fo'},
  {key:'foul_flagrant',   lbl:'Flagrant',icon:'🚨',t:'fo'},
  {key:'foul_intentional',lbl:'Int.Foul',icon:'⚠', t:'fo'},
  {key:'foul_technical',  lbl:'Tech',    icon:'📋',t:'fo',team:true},
  {key:'timeout_full',    lbl:'TO Full', icon:'⏸', t:'ts',team:true},
  {key:'timeout_30sec',   lbl:'TO 30s',  icon:'⏸', t:'ts',team:true},
  {key:'ft_made',         lbl:'FT Made', icon:'🟢',t:'sc'},
  {key:'ft_miss',         lbl:'FT Miss', icon:'🔴',t:'ms'},
  {key:'possession_flip', lbl:'Arrow',   icon:'⇄', t:'ts',team:true},
];

const KLBL={
  '2pt_made':'2 PTS','2pt_miss':'2 Miss','3pt_made':'3 PTS','3pt_miss':'3 Miss',
  'putback_made':'Putback ✓','putback_miss':'Putback ✗',
  'sub_in':'Sub IN','sub_out':'Sub OUT',
};

// ══ STATE ═════════════════════════════════════
let selP=null,selSide=null;
let evts=[],dots=[];
let clkInt=null,holdTmr=null,subTgt=null,logOpen=false,flashTmr=null;
let tSX=0,tSY=0,tMoving=false,tOvShown=false;
const SWPX=28;

// ══ CLOCK ═════════════════════════════════════
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
function toggleClock(){
  if(GAME.running){clearInterval(clkInt);GAME.running=false;}
  else{
    clkInt=setInterval(()=>{
      if(GAME.clockSec>0){GAME.clockSec--;updClk();}
      else{clearInterval(clkInt);GAME.running=false;updClk();}
    },1000);
    GAME.running=true;
  }
  updClk();
}
function updClk(){
  const b=document.getElementById('clock-btn');
  b.textContent=fmt(GAME.clockSec);
  b.classList.toggle('running',GAME.running);
}
function chgPeriod(d){
  GAME.period=Math.max(1,Math.min(4,GAME.period+d));
  GAME.clockSec=480;GAME.running=false;
  clearInterval(clkInt);updClk();
  document.getElementById('pdisplay').textContent=['1ST','2ND','3RD','4TH'][GAME.period-1]||'OT';
}
function setPoss(side){
  GAME.possession=side;
  updPoss();
  pushEvt(null,side,'possession_flip',null,null);
}
function updPoss(){
  ['home','away'].forEach(s=>{
    const el=document.getElementById(`poss-${s}`);
    el.className='poss-btn '+(GAME.possession===s?'has-poss':'no-poss');
  });
}

// ══ PLAYERS ═══════════════════════════════════
function renderPl(){
  ['home','away'].forEach(side=>{
    const panel=document.getElementById(`${side}-panel`);
    panel.innerHTML='';
    PL[side].filter(p=>p.on).forEach(p=>panel.appendChild(mkCard(p,side)));
  });
}

function mkCard(p,side){
  const div=document.createElement('div');
  div.className='pcard'+(selP?.id===p.id?' sel':'');
  const dots=Array.from({length:5},(_,i)=>`<div class="fd${i<p.fouls?' on':''}"></div>`).join('');
  div.innerHTML=`
    <div class="pnum">${p.num}</div>
    <div class="pinfo">
      <div class="pname">${p.fi}. ${p.last}</div>
      <div class="pstats">
        <div class="ps"><div class="psv">${p.pts}</div><div class="psl">PTS</div></div>
        <div class="ps"><div class="psv">${p.reb}</div><div class="psl">REB</div></div>
        <div class="ps"><div class="psv">${p.ast}</div><div class="psl">AST</div></div>
      </div>
      <div class="fdots">${dots}</div>
    </div>`;

  div.addEventListener('pointerup',()=>{
    if(holdTmr){clearTimeout(holdTmr);holdTmr=null;selPlayer(p,side);}
  });
  div.addEventListener('pointerdown',()=>{
    holdTmr=setTimeout(()=>{holdTmr=null;openSub(p,side);},600);
  });
  ['pointerleave','pointercancel'].forEach(ev=>
    div.addEventListener(ev,()=>{if(holdTmr){clearTimeout(holdTmr);holdTmr=null;}})
  );
  return div;
}

function selPlayer(p,side){
  if(selP?.id===p.id){selP=null;selSide=null;}
  else{selP=p;selSide=side;}
  renderPl();updSel();updBtns();
}
function updSel(){
  const el=document.getElementById('sel-display');
  if(selP){
    const c=selSide==='home'?'var(--hl)':'var(--al)';
    el.innerHTML=`<span class="sn" style="color:${c}">#${selP.num} ${selP.fi}. ${selP.last}</span>`;
  } else {el.textContent='Tap a player to select';}
}

// ══ STAT BUTTONS ══════════════════════════════
function renderBtns(){
  const g=document.getElementById('stat-grid');g.innerHTML='';
  SDEFS.forEach(s=>{
    const b=document.createElement('button');
    b.className=`sbtn ${s.t}`;b.dataset.key=s.key;
    b.innerHTML=`<span class="si">${s.icon}</span>${s.lbl}`;
    b.addEventListener('click',()=>doStat(s));
    g.appendChild(b);
  });
  updBtns();
}
function updBtns(){
  document.querySelectorAll('.sbtn').forEach(b=>{
    const d=SDEFS.find(s=>s.key===b.dataset.key);
    if(!d)return;
    b.classList.toggle('np',!d.team&&!selP);
  });
}

function doStat(def){
  const isTeam=!!def.team;
  if(!isTeam&&!selP)return;
  const p=isTeam?null:selP;
  const side=isTeam?(selSide||'home'):selSide;
  let pts=0;
  if(def.key==='ft_made')pts=1;
  if(pts&&p){p.pts+=pts;GAME[side].score+=pts;document.getElementById(`${side}-score`).textContent=GAME[side].score;}
  if(def.key==='assist'&&p)p.ast++;
  if((def.key==='o_reb'||def.key==='d_reb')&&p)p.reb++;
  if(def.key.startsWith('foul_')&&!isTeam&&p){
    p.fouls++;GAME[side].fouls++;document.getElementById(`${side}-fouls`).textContent=GAME[side].fouls;
  }
  if(def.key==='timeout_full'&&GAME[side].tof>0){GAME[side].tof--;document.getElementById(`${side}-tof`).textContent=GAME[side].tof;}
  if(def.key==='timeout_30sec'&&GAME[side].to3>0){GAME[side].to3--;document.getElementById(`${side}-to3`).textContent=GAME[side].to3;}
  pushEvt(p,side,def.key,null,null);
  renderPl();
  flash(def.lbl+(p?` — #${p.num}`:''),def.t==='sc'?'made':'');
}

// ══ COURT ═════════════════════════════════════
const svg=document.getElementById('csvg');
const tring=document.getElementById('tring');
const swOv=document.getElementById('swipe-ov');

function svgP(e){
  const r=svg.getBoundingClientRect(),vb=svg.viewBox.baseVal;
  const s=e.touches?e.touches[0]:e;
  return{x:((s.clientX-r.left)/r.width)*vb.width,y:((s.clientY-r.top)/r.height)*vb.height};
}
// Basket at (230,52), arc r=158px
function is3(pt){const dx=pt.x-230,dy=pt.y-52;return Math.sqrt(dx*dx+dy*dy)>170;}

function swDir(dx,dy){
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<SWPX&&ay<SWPX)return null;
  if(ay>ax)return dy<0?'up':'down';
  return dx>0?'right':'left';
}
function litDir(dir){
  ['up','down','left','right'].forEach(d=>
    document.getElementById(`dir-${d}`).classList.toggle('lit',d===dir)
  );
}

svg.addEventListener('pointerdown',e=>{
  if(!selP)return;e.preventDefault();
  const pt=svgP(e);tSX=pt.x;tSY=pt.y;tMoving=false;tOvShown=false;
  tring.setAttribute('cx',pt.x);tring.setAttribute('cy',pt.y);tring.setAttribute('opacity','.5');
  litDir(null);
},{passive:false});

svg.addEventListener('pointermove',e=>{
  if(!selP)return;e.preventDefault();
  const pt=svgP(e);
  const dx=pt.x-tSX,dy=pt.y-tSY;
  tring.setAttribute('cx',pt.x);tring.setAttribute('cy',pt.y);
  if(Math.sqrt(dx*dx+dy*dy)>SWPX){
    tMoving=true;
    if(!tOvShown){swOv.classList.add('show');tOvShown=true;}
    litDir(swDir(dx,dy));
  }
},{passive:false});

svg.addEventListener('pointerup',e=>{
  if(!selP)return;e.preventDefault();
  tring.setAttribute('opacity','0');
  swOv.classList.remove('show');
  const pt=svgP(e);
  const dx=pt.x-tSX,dy=pt.y-tSY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const sp={x:tSX,y:tSY};
  if(!tMoving||dist<SWPX){recShot(sp,false,'norm');}
  else{
    const d=swDir(dx,dy);
    if(d==='up')   recShot(sp,true,'norm');
    else if(d==='right') recShot(sp,true,'pb');
    else if(d==='left')  recShot(sp,false,'pb');
    else flash('Cancelled','cfl');
  }
  tMoving=false;tOvShown=false;
},{passive:false});

svg.addEventListener('pointercancel',()=>{
  tring.setAttribute('opacity','0');swOv.classList.remove('show');
  tMoving=false;tOvShown=false;
});

function recShot(pt,made,type){
  const three=type==='norm'&&is3(pt);
  let key,pts=0,msg,ft='';
  if(type==='pb'){
    key=made?'putback_made':'putback_miss';pts=made?2:0;
    msg=(made?'PUTBACK ✓':'PUTBACK ✗')+` — #${selP.num}`;ft=made?'made':'mfl';
    selP.reb++; // putback = offensive rebound
  } else if(made){
    key=three?'3pt_made':'2pt_made';pts=three?3:2;
    msg=`${pts} PTS${three?' (3)':''} — #${selP.num}`;ft='made';
  } else {
    key=three?'3pt_miss':'2pt_miss';
    msg=`Miss${three?' (3)':''} — #${selP.num}`;ft='mfl';
  }
  if(pts>0){
    selP.pts+=pts;GAME[selSide].score+=pts;
    document.getElementById(`${selSide}-score`).textContent=GAME[selSide].score;
    GAME.possession=selSide==='home'?'away':'home';updPoss();
  }
  addDot(pt,made,three,type==='pb');
  pushEvt(selP,selSide,key,pt,three);
  renderPl();flash(msg,ft);
}

// ══ DOTS ══════════════════════════════════════
function addDot(pt,made,three,isPb){
  const g=document.getElementById('shot-dots');
  const id='d'+Date.now()+Math.random().toString(36).slice(2,4);
  if(made){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r','7');
    c.setAttribute('fill',isPb?'#a78bfa':three?'#f39c12':'#27ae60');
    c.setAttribute('fill-opacity','.85');c.setAttribute('stroke','rgba(255,255,255,.6)');c.setAttribute('stroke-width','1.5');
    c.setAttribute('id',id);g.appendChild(c);
  } else {
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',pt.x);t.setAttribute('y',pt.y+5.5);t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','17');t.setAttribute('fill',isPb?'#a78bfa':'#e05c52');
    t.setAttribute('font-weight','bold');t.setAttribute('id',id);t.textContent='×';g.appendChild(t);
  }
  dots.push({id,eid:null,pend:true});
}

// ══ EVENTS ════════════════════════════════════
function pushEvt(p,side,key,pt,three){
  const e={
    id:Date.now()+'_'+Math.random().toString(36).slice(2,5),
    pid:p?.id,pnum:p?.num,plast:p?.last,pfi:p?.fi,
    side,key,period:GAME.period,clk:GAME.clockSec,
    pts:getPts(key),three
  };
  evts.unshift(e);
  const pend=dots.find(d=>d.pend);
  if(pend){pend.eid=e.id;delete pend.pend;}
  renderFeed();renderLog();
  return e;
}
function getPts(k){
  if(k==='2pt_made'||k==='putback_made')return 2;
  if(k==='3pt_made')return 3;
  if(k==='ft_made')return 1;
  return 0;
}
function getLabel(k,side){if(k==='possession_flip'){return (side?GAME[side].name:'')+' ball';}return KLBL[k]||(SDEFS.find(s=>s.key===k)?.lbl)||k;}

function delEvt(id){
  const e=evts.find(x=>x.id===id);if(!e)return;
  if(e.pts>0&&e.side){
    GAME[e.side].score=Math.max(0,GAME[e.side].score-e.pts);
    document.getElementById(`${e.side}-score`).textContent=GAME[e.side].score;
    if(e.pid){const p=findP(e.pid,e.side);if(p)p.pts=Math.max(0,p.pts-e.pts);}
  }
  if(e.pid){
    const p=findP(e.pid,e.side);
    if(p){
      if(e.key==='o_reb'||e.key==='d_reb')p.reb=Math.max(0,p.reb-1);
      if(e.key==='assist')p.ast=Math.max(0,p.ast-1);
      if(e.key==='putback_made'||e.key==='putback_miss')p.reb=Math.max(0,p.reb-1);
      if(e.key.startsWith('foul_')){
        const def=SDEFS.find(s=>s.key===e.key);
        if(!def?.team){p.fouls=Math.max(0,p.fouls-1);GAME[e.side].fouls=Math.max(0,GAME[e.side].fouls-1);
          document.getElementById(`${e.side}-fouls`).textContent=GAME[e.side].fouls;}
      }
    }
  }
  const dot=dots.find(d=>d.eid===id);
  if(dot){document.getElementById(dot.id)?.remove();dots=dots.filter(d=>d.eid!==id);}
  evts=evts.filter(x=>x.id!==id);
  renderFeed();renderLog();renderPl();
}
function findP(pid,side){return PL[side]?.find(p=>p.id===pid);}

// ══ LIVE FEED ═════════════════════════════════
function renderFeed(){
  const feed=document.getElementById('evt-feed');
  feed.innerHTML='';
  evts.slice(0,6).forEach(e=>{
    const row=document.createElement('div');row.className='ef-row';
    const dot=document.createElement('div');dot.className='ef-dot';
    dot.style.background=e.side==='home'?'var(--hl)':'var(--al)';
    const txt=document.createElement('div');txt.className='ef-txt';
    txt.textContent=e.pnum?`#${e.pnum} ${e.pfi||''}.${e.plast||''} — ${getLabel(e.key,e.side)}`:getLabel(e.key,e.side);
    const clk=document.createElement('div');clk.className='ef-clk';
    clk.textContent=`Q${e.period} ${fmt(e.clk)}`;
    row.appendChild(dot);row.appendChild(txt);row.appendChild(clk);
    feed.appendChild(row);
  });
}

// ══ LOG ═══════════════════════════════════════
function renderLog(){
  const c=document.getElementById('log-entries');if(!c)return;
  c.innerHTML='';
  evts.slice(0,50).forEach(e=>{
    const row=document.createElement('div');row.className='lrow';
    const dot=document.createElement('div');dot.className='ldot';
    dot.style.background=e.side==='home'?'var(--hl)':'var(--al)';
    const txt=document.createElement('div');txt.className='ltxt';
    txt.textContent=e.pnum?`#${e.pnum} ${e.pfi||''}.${e.plast||''} — ${getLabel(e.key,e.side)}`:getLabel(e.key,e.side);
    const clk=document.createElement('div');clk.className='lclk';
    clk.textContent=`Q${e.period} ${fmt(e.clk)}`;
    const del=document.createElement('button');del.className='ldel';del.textContent='✕';
    del.addEventListener('click',()=>delEvt(e.id));
    row.appendChild(dot);row.appendChild(txt);row.appendChild(clk);row.appendChild(del);
    c.appendChild(row);
  });
}
function toggleLog(){
  logOpen=!logOpen;
  document.getElementById('log-panel').classList.toggle('open',logOpen);
  if(logOpen)renderLog();
}

// ══ BOX SCORE ═════════════════════════════════
function openBoxScore(){
  const content=document.getElementById('bs-content');
  content.innerHTML='';
  ['home','away'].forEach(side=>{
    const g=GAME[side];
    const div=document.createElement('div');div.className='bs-team';
    const nm=document.createElement('div');nm.className=`bs-tname ${side==='home'?'hn':'an'}`;
    nm.textContent=`${g.name} — ${g.score}`;div.appendChild(nm);

    const tbl=document.createElement('table');tbl.className='bs-table';
    tbl.innerHTML=`<thead><tr>
      <th>Player</th><th>PTS</th><th>FG</th><th>FG%</th><th>3P</th><th>3P%</th><th>FT</th><th>FT%</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TO</th><th>FLS</th>
    </tr></thead>`;
    const tbody=document.createElement('tbody');

    const allP=PL[side];
    let totals={pts:0,fgm:0,fga:0,tpm:0,tpa:0,ftm:0,fta:0,reb:0,ast:0,stl:0,blk:0,to:0,fls:0};

    allP.filter(p=>p.on||p.pts>0||p.reb>0||p.ast>0).forEach(p=>{
      const stl=evts.filter(e=>e.pid===p.id&&e.key==='steal').length;
      const blk=evts.filter(e=>e.pid===p.id&&e.key==='block').length;
      const to=evts.filter(e=>e.pid===p.id&&e.key==='turnover').length;
      const fgm=evts.filter(e=>e.pid===p.id&&(e.key==='2pt_made'||e.key==='putback_made'||e.key==='3pt_made')).length;
      const fga=fgm+evts.filter(e=>e.pid===p.id&&(e.key==='2pt_miss'||e.key==='putback_miss'||e.key==='3pt_miss')).length;
      const tpm=evts.filter(e=>e.pid===p.id&&e.key==='3pt_made').length;
      const tpa=tpm+evts.filter(e=>e.pid===p.id&&e.key==='3pt_miss').length;
      const ftm=evts.filter(e=>e.pid===p.id&&e.key==='ft_made').length;
      const fta=ftm+evts.filter(e=>e.pid===p.id&&e.key==='ft_miss').length;
      const pct=n=>n===0?'—':`${Math.round(100*n)}%`;
      const fgpct=fga?pct(fgm/fga):'—';
      const tppct=tpa?pct(tpm/tpa):'—';
      const ftpct=fta?pct(ftm/fta):'—';
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>#${p.num} ${p.fi}. ${p.last}</td><td>${p.pts}</td><td>${fgm}/${fga}</td><td>${fgpct}</td><td>${tpm}/${tpa}</td><td>${tppct}</td><td>${ftm}/${fta}</td><td>${ftpct}</td><td>${p.reb}</td><td>${p.ast}</td><td>${stl}</td><td>${blk}</td><td>${to}</td><td>${p.fouls}</td>`;
      tbody.appendChild(tr);
      totals.pts+=p.pts;totals.fgm+=fgm;totals.fga+=fga;totals.tpm+=tpm;totals.tpa+=tpa;
      totals.ftm+=ftm;totals.fta+=fta;totals.reb+=p.reb;totals.ast+=p.ast;
      totals.stl+=stl;totals.blk+=blk;totals.to+=to;totals.fls+=p.fouls;
    });

    const pct=n=>n===0?'—':`${Math.round(100*n)}%`;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>TOTALS</td><td>${totals.pts}</td><td>${totals.fgm}/${totals.fga}</td><td>${totals.fga?pct(totals.fgm/totals.fga):'—'}</td><td>${totals.tpm}/${totals.tpa}</td><td>${totals.tpa?pct(totals.tpm/totals.tpa):'—'}</td><td>${totals.ftm}/${totals.fta}</td><td>${totals.fta?pct(totals.ftm/totals.fta):'—'}</td><td>${totals.reb}</td><td>${totals.ast}</td><td>${totals.stl}</td><td>${totals.blk}</td><td>${totals.to}</td><td>${totals.fls}</td>`;
    tbody.appendChild(tr);
    tbl.appendChild(tbody);div.appendChild(tbl);content.appendChild(div);
  });
  document.getElementById('bs-modal').classList.add('show');
}
function closeBoxScore(){document.getElementById('bs-modal').classList.remove('show');}

// ══ SUB ═══════════════════════════════════════
function openSub(p,side){
  const bench=PL[side].filter(x=>!x.on);
  if(!bench.length){flash('No bench players');return;}
  subTgt={p,side};
  document.getElementById('sub-title').textContent=`Sub out #${p.num} ${p.fi}. ${p.last}`;
  const list=document.getElementById('sub-list');list.innerHTML='';
  const ac=side==='home'?'var(--hl)':'var(--al)';
  bench.forEach(bp=>{
    const row=document.createElement('div');row.className='sub-row';
    row.innerHTML=`<div class="sub-num" style="color:${ac}">${bp.num}</div><div><div class="sub-name">${bp.fi}. ${bp.last}</div><div class="sub-sm">${bp.pts} pts · ${bp.reb} reb · ${bp.fouls} fls</div></div>`;
    row.addEventListener('click',()=>doSub(bp));
    list.appendChild(row);
  });
  document.getElementById('sub-modal').classList.add('show');
}
function doSub(inc){
  if(!subTgt)return;
  const{p:out,side}=subTgt;
  out.on=false;inc.on=true;
  pushEvt(out,side,'sub_out',null,null);
  pushEvt(inc,side,'sub_in',null,null);
  if(selP?.id===out.id)selP=inc;
  closeSubModal();renderPl();updSel();
  flash(`#${inc.num} IN / #${out.num} OUT`);
}
function closeSubModal(){document.getElementById('sub-modal').classList.remove('show');subTgt=null;}

// ══ FLASH ═════════════════════════════════════
function flash(msg,type){
  const el=document.getElementById('flash');
  el.textContent=msg;el.className='show'+(type?' '+type:'');
  clearTimeout(flashTmr);flashTmr=setTimeout(()=>el.className='',850);
}

// ══ INIT ══════════════════════════════════════
renderPl();renderBtns();updClk();updPoss();
</script>
</body>

<script>

};

const SPORT_SCORE_LABELS = {
  'basketball':   ['Avg PF',     'Avg PA'],
  'football':     ['Avg PF',     'Avg PA'],
  'soccer':       ['Avg GF',     'Avg GA'],
  'lacrosse':     ['Avg GF',     'Avg GA'],
  'field-hockey': ['Avg GF',     'Avg GA'],
  'baseball':     ['Avg RF',     'Avg RA'],
  'softball':     ['Avg RF',     'Avg RA'],
  'volleyball':   ['Avg Sets W', 'Avg Sets L'],
};

const WVALS = { A: 40, B: 38, C: 36, D: 34, S: 32 };

async function sb(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Prefer': 'count=none' }
  });
  if (!r.ok) { const b = await r.text(); throw new Error(`${r.status} — ${b}`); }
  return r.json();
}

const qp  = n => new URLSearchParams(location.search).get(n);
const f2  = n => n != null ? (+n).toFixed(2) : '—';
const fpc = n => n != null ? (+n * 100).toFixed(1) + '%' : '—';
const fdt = d => { if (!d) return ''; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };

function pyth(a, b) {
  if (a == null || b == null) return null;
  if (a === 0 && b === 0) return 0.5;
  const d = a - b;
  if (d > 35) return 1; if (d < -35) return 0;
  const pa = Math.pow(a + 0.5, 11), pb = Math.pow(b + 0.5, 11);
  return pa / (pa + pb);
}

function logoEl(url, name, lg) {
  const sc = lg ? 'team-logo-lg' : 'opp-logo';
  const fb = lg ? 'team-logo-fallback' : 'opp-fb';
  const ch = (name||'?')[0];
  if (url) return `<img class="${sc}" src="${url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="${fb}" style="display:none">${ch}</div>`;
  return `<div class="${fb}">${ch}</div>`;
}

function healsCalc(games, tid, smap, regEnd, getScheduled) {
  const reg = games.filter(g => !g.is_tournament && g.game_date <= regEnd && g.status !== 'cancelled');
  const denom = getScheduled(tid);
  let piSum = 0, healSum = 0;
  const details = {};
  for (const g of reg) {
    if (g.status !== 'final') continue;
    const ih = g.home_team_id === tid;
    const oid = ih ? g.away_team_id : g.home_team_id;
    const ms = ih ? g.home_score : g.away_score;
    const os = ih ? g.away_score : g.home_score;
    const opp = smap[oid] || {};
    const cls = opp._class || 'A';
    const opi = opp.pi || 1.0;
    const wval = WVALS[cls] || 36;
    const tied = ms === os;
    const won  = ms > os;
    if (won)  piSum += wval;
    if (tied) piSum += wval * 0.5;
    const contrib = won ? opi / denom : tied ? (opi * 0.5) / denom : 0;
    healSum += contrib;
    details[`${g.game_date}_${oid}`] = { wp: pyth(ms, os), contrib, oppPI: opi };
  }
  const played = reg.filter(g => g.status === 'final').length;
  const pi = played === 0 ? 1.0 : piSum / denom;
  return { pi, heals: healSum * 10, played, denom, details };
}

async function load() {
  const tid = qp('team_id');
  const app = document.getElementById('app');
  if (!tid) { app.innerHTML = `<div class="error-state">No team_id specified.</div>`; return; }

  try {
    const [teams, snap] = await Promise.all([
      sb(`teams?id=eq.${tid}&select=id,school_name,logo_url,gender,sport_id,team_class,team_region`),
      sb(`rankings_snapshots?team_id=eq.${tid}&order=snapshot_date.desc&limit=1&select=*`)
    ]);
    if (!teams.length) { app.innerHTML = `<div class="error-state">Team not found.</div>`; return; }
    const team  = teams[0];
    const stats = snap[0] || null;

    // Derive sport slug and regEnd from team.sport_id
    const sport   = Object.keys(SPORT_IDS).find(k => SPORT_IDS[k] === team.sport_id) || 'basketball';
    const regEnd  = SPORT_REG_END[sport];
    const [pfLbl, paLbl] = SPORT_SCORE_LABELS[sport] || ['Avg PF', 'Avg PA'];
    const seasonYear = 2026;

    const [games, classData, allSnaps] = await Promise.all([
      sb(`games?or=(home_team_id.eq.${tid},away_team_id.eq.${tid})&sport_id=eq.${team.sport_id}&season_year=eq.${seasonYear}&order=game_date.asc&select=*`),
      sb(`team_classifications?team_id=eq.${tid}&select=class_id,region_id,classes(name),regions(name)`),
      sb(`rankings_snapshots?season_year=eq.${seasonYear}&order=snapshot_date.desc&select=team_id,heal_points,rank_overall,rank_class&limit=2000`)
    ]);

    // Paginated fetch helper
    // Fetch roster players for this team
    const playersPromise = sb(`players?team_id=eq.${tid}&sport_id=eq.${team.sport_id}&season_year=eq.${seasonYear}&select=id,number,name,pronunciation,grade,position,height,games,ppg,rpg,apg,stl,blk,fgm,fga,fgp,tpm,tpa,tpp,ftm,fta,ftp,eff,plusminus,ba,hr,rbi,sb,ops&order=number.asc&limit=100`);

    async function fetchAll(query) {
      const pageSize = 1000;
      let offset = 0, results = [];
      while (true) {
        const page = await sb(`${query}&limit=${pageSize}&offset=${offset}`);
        results.push(...page);
        if (page.length < pageSize) break;
        offset += pageSize;
      }
      return results;
    }

    // Get all same-gender team IDs for this sport — needed to filter games correctly
    const genderTeams = await sb(`teams?sport_id=eq.${team.sport_id}&gender=eq.${team.gender}&select=id&limit=500`);
    const genderTeamIds = new Set((genderTeams || []).map(t => t.id));

    const [allSportFinalGames, allSportScheduled] = await Promise.all([
      fetchAll(`games?sport_id=eq.${team.sport_id}&is_tournament=eq.false&status=eq.final&season_year=eq.${seasonYear}&game_date=lte.${regEnd}&select=id,home_team_id,away_team_id,home_score,away_score,status,home_team:home_team_id(id,team_class,team_classifications(classes(name))),away_team:away_team_id(id,team_class,team_classifications(classes(name)))`),
      fetchAll(`games?sport_id=eq.${team.sport_id}&is_tournament=eq.false&status=neq.cancelled&season_year=eq.${seasonYear}&game_date=lte.${regEnd}&select=id,home_team_id,away_team_id`)
    ]);

    // Filter to same-gender games only
    const genderFinalGames = allSportFinalGames.filter(g => genderTeamIds.has(g.home_team_id) && genderTeamIds.has(g.away_team_id));
    const genderScheduled = allSportScheduled.filter(g => genderTeamIds.has(g.home_team_id) && genderTeamIds.has(g.away_team_id));

    const oppIds = [...new Set(games.map(g => g.home_team_id === tid ? g.away_team_id : g.home_team_id))];
    const idList = oppIds.join(',');

    // Build scheduled count map per team (deduplicated by game id, same-gender only)
    const schedCountMap = {};
    const seenSched = new Set();
    for (const g of genderScheduled) {
      if (seenSched.has(g.id)) continue;
      seenSched.add(g.id);
      schedCountMap[g.home_team_id] = (schedCountMap[g.home_team_id] || 0) + 1;
      schedCountMap[g.away_team_id] = (schedCountMap[g.away_team_id] || 0) + 1;
    }
    const getScheduled = (id) => Math.max(schedCountMap[id] || 0, 12);

    // Collect all unique team IDs from gender-filtered final games for class lookup
    const allSportTeamIds = [...new Set(genderFinalGames.flatMap(g => [g.home_team_id, g.away_team_id]))];
    const allSportIdList = allSportTeamIds.join(',');

    const [oppTeams, allSportTeams, siblings] = await Promise.all([
      oppIds.length ? sb(`teams?id=in.(${idList})&select=id,school_name,logo_url,gender,team_class`) : [],
      allSportTeamIds.length ? sb(`teams?id=in.(${allSportIdList})&select=id,team_class,team_region,team_classifications(classes(name))`) : [],
      sb(`teams?school_name=eq.${encodeURIComponent(team.school_name)}&gender=eq.${team.gender==='Boys'?'Girls':'Boys'}&sport_id=eq.${team.sport_id}&select=id,school_name,gender&limit=1`)
    ]);

    const tmap = {};
    for (const t of oppTeams) tmap[t.id] = t;

    // Build class map for ALL sport teams — prefer team_class, fall back to team_classifications
    const clsMap = {};
    for (const t of allSportTeams) {
      clsMap[t.id] = t.team_class || t.team_classifications?.[0]?.classes?.name || 'A';
    }

    // Calculate each opponent's PI from their full schedule using embedded class
    const oppPIMap = {};
    const seenFinal = new Set();
    const dedupedFinalGames = genderFinalGames.filter(g => {
      if (seenFinal.has(g.id)) return false;
      seenFinal.add(g.id);
      return true;
    });
    for (const oid of oppIds) {
      const og = dedupedFinalGames.filter(g => g.home_team_id === oid || g.away_team_id === oid);
      let piSum = 0;
      for (const g of og) {
        const ih = g.home_team_id === oid;
        const ms = ih ? g.home_score : g.away_score;
        const os = ih ? g.away_score : g.home_score;
        if (ms == null || os == null) continue;
        // Get OPPONENT's class — win value depends on who you beat
        const oppObj = ih ? g.away_team : g.home_team;
        const cls = oppObj?.team_classifications?.[0]?.classes?.name || oppObj?.team_class || clsMap[ih ? g.away_team_id : g.home_team_id] || 'A';
        const wval = WVALS[cls] || 36;
        if (ms > os)        piSum += wval;
        else if (ms === os) piSum += wval * 0.5;
      }
      oppPIMap[oid] = piSum / getScheduled(oid);
      const oppName = tmap[oid]?.school_name || '';
      if (oppName.includes('Messalonskee') || oppName.includes('Cape Elizabeth')) {
        og.forEach(g => {
          const ih = g.home_team_id === oid;
          const ms = ih ? g.home_score : g.away_score;
          const os = ih ? g.away_score : g.home_score;
          const oppObj = ih ? g.away_team : g.home_team;
          const cls = oppObj?.team_classifications?.[0]?.classes?.name || oppObj?.team_class || 'A';
          const result = ms > os ? 'W' : ms === os ? 'T' : 'L';
        });
      }
    }

    // smap: logo/name/rank for display, PI from computed oppPIMap
    const smap = {};
    for (const t of oppTeams) {
      smap[t.id] = { _name: t.school_name, _logo: t.logo_url, _class: clsMap[t.id] || 'A', pi: oppPIMap[t.id] || 1.0 };
    }
    // Merge rank info from allSnaps
    for (const s of allSnaps) {
      if (smap[s.team_id]) { smap[s.team_id].rank_overall = s.rank_overall; smap[s.team_id].rank_class = s.rank_class; }
    }

    const sibling   = siblings[0] || null;
    const myClass   = classData[0];
    const className = myClass?.classes?.name || team.team_class || '';
    const regionName= myClass?.regions?.name || team.team_region || '';
    const classReg  = [className, regionName].filter(Boolean).join(' ');

    // Compute ranks client-side from all snapshots
    // Use existing rank_overall/rank_class from DB, compute rank_region here
    const mySnap = allSnaps.find(s => s.team_id === tid);
    const rState  = mySnap?.rank_overall || stats?.rank_overall || null;
    const rClass  = mySnap?.rank_class  || stats?.rank_class  || null;

    // Region rank: filter to same class+region, sort by heal_points desc, find position
    // We need team classifications for all teams to filter by region — approximate using
    // rank_class position within class, comparing to opponents we already have.
    // Best approach: use rank_overall within the region subset we build from opponent data.
    // For now use rank_class as proxy until rank_region is added to snapshot push.
    // Region rank: compute from allSnaps filtered to same class+region+gender
    let rRegion = stats?.rank_region || null;
    if (!rRegion && className && regionName) {
      // Build region map from allSportTeams
      const regionMap = {};
      for (const t of allSportTeams) regionMap[t.id] = t.team_region || '';
      // Filter allSnaps to same class+region+gender, sort by heal_points desc
      const regionSnaps = allSnaps
        .filter(s => genderTeamIds.has(s.team_id) && clsMap[s.team_id] === className && regionMap[s.team_id] === regionName)
        .sort((a, b) => (b.heal_points || 0) - (a.heal_points || 0));
      const pos = regionSnaps.findIndex(s => s.team_id === tid);
      if (pos !== -1) rRegion = pos + 1;
    }

    const { pi, heals, played, denom, details } = healsCalc(games, tid, smap, regEnd, getScheduled);

    let wins = 0, losses = 0, pointDiff = 0;
    for (const g of games) {
      if (g.status !== 'final') continue;
      const ih = g.home_team_id === tid;
      const ms = ih ? g.home_score : g.away_score;
      const os = ih ? g.away_score : g.home_score;
      if (ms != null && os != null) pointDiff += (ms - os);
      ms > os ? wins++ : losses++;
    }
    const diffStr = pointDiff >= 0 ? `+${pointDiff}` : `${pointDiff}`;

    // ── RENDER ──────────────────────────────────

    const gLbl = team.gender === 'Boys' ? 'Boys' : 'Girls';
    const sLbl = team.gender === 'Boys' ? 'Girls' : 'Boys';
    const genderHtml = sibling
      ? `<span class="gender-current">${gLbl}</span><a class="gender-link" href="team.html?team_id=${sibling.id}">${sLbl} ↗</a>`
      : `<span class="gender-current">${gLbl}</span>`;

    const rankHtml = (rState || rClass) ? `
      <span class="rank-trio">
        ${rState  ? `<span><span class="rtag">STATE</span>#${rState}</span>`  : ''}
        ${rClass  ? `<span><span class="rtag">${className}</span>#${rClass}</span>` : ''}
        ${rRegion ? `<span><span class="rtag">${classReg.toUpperCase()}</span>#${rRegion}</span>` : ''}
      </span>` : '';

    // Stat cards
    const cards = `
      <div class="stat-cards">
        <div class="stat-card"><div class="lbl">DIRIGO</div><div class="val grn">${stats ? f2(stats.heal_points) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">SOS</div><div class="val">${stats ? f2(stats.sos) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">${pfLbl}</div><div class="val">${stats ? f2(stats.avg_pf) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">${paLbl}</div><div class="val">${stats ? f2(stats.avg_pa) : '—'}</div></div>
        <div class="stat-card"><div class="lbl">%Perfect</div><div class="val">${stats ? fpc(stats.pct_perfect) : '—'}</div></div>
      </div>`;

    // Tournament odds
    const REGION_CUTOFFS = {
  "A North|Boys": { bye: 8, inCutoff: 8 },
  "A South|Boys": { bye: 5, inCutoff: 11 },
  "B North|Boys": { bye: 7, inCutoff: 9 },
  "B South|Boys": { bye: 6, inCutoff: 10 },
  "C North|Boys": { bye: 6, inCutoff: 10 },
  "C South|Boys": { bye: 6, inCutoff: 10 },
  "D North|Boys": { bye: 5, inCutoff: 11 },
  "D South|Boys": { bye: 8, inCutoff: 8 },
  "S North|Boys": { bye: 8, inCutoff: 8 },
  "S South|Boys": { bye: 8, inCutoff: 8 },
  "A North|Girls": { bye: 8, inCutoff: 8 },
  "A South|Girls": { bye: 5, inCutoff: 11 },
  "B North|Girls": { bye: 7, inCutoff: 9 },
  "B South|Girls": { bye: 6, inCutoff: 10 },
  "C North|Girls": { bye: 6, inCutoff: 10 },
  "C South|Girls": { bye: 6, inCutoff: 10 },
  "D North|Girls": { bye: 6, inCutoff: 10 },
  "D South|Girls": { bye: 8, inCutoff: 8 },
  "S North|Girls": { bye: 8, inCutoff: 8 },
  "S South|Girls": { bye: 8, inCutoff: 8 }
};

    let oddsHtml = '';
    const odds = stats?.tournament_odds || null;
    if (odds) {
      const isTourney  = new Date() > new Date('2026-02-20');
      const oddsTitle  = isTourney ? 'Gold Ball Odds' : 'Tournament Odds';

      // Get cutoffs for this team's region
      // Normalize gender to Title case for key lookup
      const genderNorm = team.gender ? team.gender.charAt(0).toUpperCase() + team.gender.slice(1).toLowerCase() : 'Boys';
      const cutoffKey = `${classReg}|${genderNorm}`;
      const cutoff    = REGION_CUTOFFS[cutoffKey] || { bye: 6, inCutoff: 10 };
      const byeCutoff = cutoff.bye;
      const inCutoff  = cutoff.inCutoff;

      // Compute overall IN% = sum of all seed probabilities within inCutoff
      const seedRows = [];
      for (let i = 1; i <= 20; i++) {
        const v = odds[`S${i}`] ?? odds[`s${i}`] ?? null;
        if (v != null && v !== '' && +v > 0) seedRows.push({ i, v: +v });
      }

      const inTotal  = seedRows.filter(s => s.i <= inCutoff).reduce((a,s) => a+s.v, 0);
      const outTotal = seedRows.filter(s => s.i >  inCutoff).reduce((a,s) => a+s.v, 0);
      const byeTotal = seedRows.filter(s => s.i <= byeCutoff).reduce((a,s) => a+s.v, 0);

      const inPct  = inTotal  > 0 ? (inTotal  * 100).toFixed(1) : null;
      const outPct = outTotal > 0 ? (outTotal * 100).toFixed(1) : null;
      const byePct = byeTotal > 0 ? (byeTotal * 100).toFixed(1) : null;

      const maxV = seedRows.length ? Math.max(...seedRows.map(s => s.v)) : 1;

      // Badge logic:
      // BYE=1 → BYE | BYE<1 & IN=1 & BYE>0 → IN | BYE=0 & IN=1 → PLAY-IN
      // OUT=1 → OUT | everything else → BUBBLE
      let statusBadge2 = '';
      if      (byeTotal >= 0.999)                          statusBadge2 = '<span class="status-badge bye">BYE</span>';
      else if (inTotal  >= 0.999 && byeTotal === 0)        statusBadge2 = '<span class="status-badge playin">PLAY-IN</span>';
      else if (inTotal  >= 0.999 && byeTotal > 0)         statusBadge2 = '<span class="status-badge playin">IN</span>';
      else if (outTotal >= 0.999)                          statusBadge2 = '<span class="status-badge out">OUT</span>';
      else                                                  statusBadge2 = '<span class="status-badge bubble">BUBBLE</span>';

      // If BYE is 100%, just show BYE badge + pct. Otherwise show relevant buckets.
      const playInTotal = inTotal - byeTotal;
      const playInPct   = playInTotal > 0 ? (playInTotal * 100).toFixed(1) : null;

      const is100     = byeTotal >= 0.999 || inTotal >= 0.999 || outTotal >= 0.999;
      const pct100    = byeTotal >= 0.999 ? byePct : inTotal >= 0.999 ? inPct : outTotal >= 0.999 ? outPct : null;
      const pct100col = outTotal >= 0.999 ? 'out-col' : 'green-col';

      // Sub-buckets: shown when IN=100% but seed still uncertain
      const showByeSub    = inTotal >= 0.999 && byeTotal > 0.001 && byeTotal < 0.999;
      const showPlayInSub = inTotal >= 0.999 && playInTotal > 0.001;

      // Normal buckets: shown when nothing is 100%
      const showBye = !is100 && byeTotal > 0;
      const showIn  = !is100 && inTotal  > 0 && byeTotal < 0.999;
      const showOut = !is100 && outTotal > 0;


      const topHtml = `
        <div class="odds-top">
          <div class="odds-hero">
            ${statusBadge2}
            ${is100 ? `<span class="odds-check-pct">${outTotal<0.999?'<span class="odds-check">✓</span>':''}<span class="odds-big-num ${pct100col}">${pct100}%</span></span>` : ''}
          </div>
          ${showBye ? `<div class="odds-bucket"><div class="lbl">BYE</div><div class="val bye-val">${byePct}%</div></div>` : ''}
          ${showIn  ? `<div class="odds-bucket"><div class="lbl">In Tournament</div><div class="val in">${inPct}%</div></div>` : ''}
          ${showOut ? `<div class="odds-bucket"><div class="lbl">Out</div><div class="val out">${outPct}%</div></div>` : ''}
          ${showByeSub    ? `<div class="odds-bucket"><div class="lbl">BYE</div><div class="val bye-val">${byePct}%</div></div>` : ''}
          ${showPlayInSub ? `<div class="odds-bucket"><div class="lbl">Play-In</div><div class="val in">${playInPct}%</div></div>` : ''}
        </div>`;

      const seedHtml = seedRows.map(({ i, v }) => {
        const pct  = (v * 100).toFixed(1);
        const barW = maxV > 0 ? (v / maxV * 100).toFixed(1) : 0;
        let cls, note;
        if (i <= byeCutoff)       { cls = 'bye';    note = '(Bye)'; }
        else if (i <= inCutoff)   { cls = 'playin'; note = '(Play-in)'; }
        else                      { cls = 'out';    note = '(Out)'; }
        return `<div class="seed-row">
          <span class="seed-lbl">Seed ${i} <small style="color:var(--lgray);font-size:10px">${note}</small></span>
          <div class="seed-bar-wrap"><div class="seed-bar ${cls}" style="width:${barW}%"></div></div>
          <span class="seed-pct">${pct}%</span>
        </div>`;
      }).join('');

      oddsHtml = `
        <div class="odds-section">
          <div class="section-header">${oddsTitle}</div>
          <div class="odds-card">
            ${topHtml}
            ${seedHtml ? `<div class="seed-grid"><div class="seed-grid-lbl">Seed Distribution</div><div class="seed-rows">${seedHtml}</div></div>` : ''}
          </div>
        </div>`;
    }

    // Combined games table
    const rows = games.map(g => {
      if (g.status === 'cancelled') return '';
      const ih  = g.home_team_id === tid;
      const oid = ih ? g.away_team_id : g.home_team_id;
      const ot  = tmap[oid] || {};
      const os  = smap[oid] || {};
      const ms  = ih ? g.home_score : g.away_score;
      const ops = ih ? g.away_score : g.home_score;
      const fin = g.status === 'final';
      const won = fin && ms > ops;
      const lost= fin && ms < ops;
      const df  = fin ? ms - ops : null;
      const at  = g.is_neutral ? `<span class="atsym">N</span>` : !ih ? `<span class="atsym">@</span>` : '';
      const res = fin ? (won ? 'W' : 'L') : (g.status === 'scheduled' ? '–' : '●');
      const tb  = g.is_tournament ? `<span class="tbadge">T</span>` : '';

      // Rank pill: state rank only
      const pills = [];
      if (os.rank_overall) pills.push(`<span class="rpill">#${os.rank_overall}</span>`);
      const pillsHtml = pills.length ? `<div class="opp-ranks">${pills.join('')}</div>` : '';

      // Heal data
      const hkey = `${g.game_date}_${oid}`;
      const hd   = (!g.is_tournament && g.game_date <= regEnd) ? details[hkey] : null;
      const wp   = hd?.wp ?? null;
      const wpPct= wp !== null ? (wp*100).toFixed(1)+'%' : '';
      const barW = wp !== null ? (wp*100).toFixed(1) : 0;

      const scoreTxt = fin ? `${ms}–${ops}` : (g.status==='scheduled' ? 'Sched.' : 'Live');

      return `<tr>
        <td class="dtxt">${fdt(g.game_date)}${tb}</td>
        <td>
          <div class="opp-cell">
            ${at}
            ${logoEl(ot.logo_url, ot.school_name, false)}
            <div class="opp-info">
              <span class="opp-name">${ot.school_name||'Unknown'}</span>
              ${pillsHtml}
            </div>
          </div>
        </td>
        <td class="sc ${won?'w':lost?'l':''}">
          <span class="rbadge ${res==='W'?'W':res==='L'?'L':''}">${res}</span> ${scoreTxt}
        </td>
        <td class="dc ${df>0?'p':df<0?'n':''} hsm">${df!==null?(df>0?'+':'')+df:''}</td>
        <td class="hsm">
          ${wp!==null?`<div class="wp-wrap">
            <div class="wp-bar-o"><div class="wp-bar-i" style="width:${barW}%"></div></div>
            <span class="wp-txt">${wpPct} · ${f2(hd?.oppPI)} PI</span>
          </div>`:''}
        </td>
        <td class="hc ${hd&&hd.contrib?'':'none'}">${hd?(hd.contrib?'+'+f2(hd.contrib*10):'—'):''}</td>
      </tr>`;
    }).join('');

    const gamesHtml = `
      <div class="games-section">
        <div class="section-header">${SPORT_NAME[sport] || 'Sport'} Schedule, Results &amp; Heal Points</div>
        <div class="games-wrap">
          <table class="gt">
            <thead><tr>
              <th>Date</th><th>Opponent</th><th class="r">Score</th>
              <th class="r hsm">Diff</th><th class="hsm">Win Prob · Opp PI</th>
              <th class="r">Heal +</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="games-footer">
            <span>Reg. games: <strong>${played}</strong></span>
            <span>Denominator: <strong>${denom}</strong></span>
            <span>PI: <strong>${f2(pi)}</strong></span>
            <span>Heal Points: <strong>${f2(heals)}</strong></span>
          </div>
        </div>
      </div>`;

    // Roster
    let rosterHtml = '';
    try {
      const players = await playersPromise;
      console.log('Players fetched:', players?.length, players);
      if (players && players.length) {
        const isBball = sport === 'basketball';
        const isBase  = sport === 'baseball' || sport === 'softball';
        const rows = players.map(p => {
          const n = (v, decimals) => v != null ? (decimals != null ? (+v).toFixed(decimals) : v) : '';
          const cells = [
            `<td class="rt-num">${p.number != null ? parseInt(p.number) : '—'}</td>`,
            `<td class="rt-name">${p.name || ''}</td>`,
            `<td class="rt-pron">${p.pronunciation || ''}</td>`,
            `<td class="rt-grade" style="text-align:center">${p.height || ''}</td>`,
            `<td class="rt-pos" style="text-align:center">${p.position || ''}</td>`,
            `<td class="rt-grade" style="text-align:center">${p.grade || ''}</td>`,
            `<td class="rt-stat-gap"></td>`,
          ];
          if (isBball) {
            cells.push(`<td class="rt-stat">${n(p.ppg,1)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.rpg,1)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.apg,1)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.stl)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.blk)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.fgp,1)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.tpp,1)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.ftp,1)}</td>`);
            cells.push(`<td class="rt-stat">${p.eff != null && p.games ? (p.eff / p.games).toFixed(1) : ''}</td>`);
            cells.push(`<td class="rt-stat">${p.plusminus != null ? (p.plusminus > 0 ? '+' : '') + p.plusminus : ''}</td>`);
          } else if (isBase) {
            cells.push(`<td class="rt-stat">${n(p.ba,3)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.hr)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.rbi)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.sb)}</td>`);
            cells.push(`<td class="rt-stat">${n(p.ops,3)}</td>`);
          }
          return `<tr>${cells.join('')}</tr>`;
        }).join('');
        const headCells = [
          '<th>#</th>','<th style="position:sticky;left:0;background:var(--white);z-index:3">Name</th>','<th>Pronunciation</th>',
          '<th>Ht</th>','<th>Pos</th>','<th>Grade</th>',
          '<th class="rt-stat-gap-th"></th>',
        ];
        if (isBball) headCells.push('<th>PPG</th>','<th>RPG</th>','<th>APG</th>','<th>STL</th>','<th>BLK</th>','<th>FG%</th>','<th>3P%</th>','<th>FT%</th>','<th>EFF</th>','<th>+/-</th>');
        else if (isBase) headCells.push('<th>BA</th>','<th>HR</th>','<th>RBI</th>','<th>SB</th>','<th>OPS</th>');
        const headerRow = headCells.join('');
        rosterHtml = `
          <div class="roster-section">
            <div class="section-header">Roster</div>
            <div class="roster-wrap">
              <table class="rt">
                <thead><tr>${headerRow}</tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>`;
      }
    } catch(e) { /* no roster yet, silently skip */ }

    app.innerHTML = `
      <div class="team-header">
        ${logoEl(team.logo_url, team.school_name, true)}
        <div class="team-header-info">
          <div class="team-name-row">
            <span class="team-name-lg">${team.school_name}</span>
            ${rankHtml}
          </div>
          <div class="team-meta">${genderHtml}<span class="meta-sep">|</span><strong>${classReg}</strong><span class="meta-sep">|</span>${SPORT_NAME[sport] || ''}<span class="meta-sep">|</span><span style="font-size:12px;color:var(--gray);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;">25-26</span><span class="meta-sep">|</span><a class="gender-link" href="school.html?school=${team.school_name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')}">All ${team.school_name} Sports ↗</a></div>
          <div class="team-inline-stats">
            <span class="inline-stat"><span class="inline-lbl">RECORD</span><span class="inline-val grn">${wins}–${losses}</span></span>
            <span class="inline-stat"><span class="inline-lbl">POINT DIFF</span><span class="inline-val ${pointDiff >= 0 ? 'grn' : 'red'}">${diffStr}</span></span>
            <span class="inline-stat"><span class="inline-lbl">HEAL POINTS</span><span class="inline-val">${f2(heals)}</span></span>
          </div>
        </div>
      </div>
      ${cards}
      ${oddsHtml}
      ${gamesHtml}
      ${rosterHtml}`;

    document.title = `${team.school_name} ${SPORT_NAME[sport] || ''} — Maine Basketball Rankings`;

  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = `<div class="error-state">Failed to load team data.<br><small>${err.message}</small></div>`;
  }
}

load();
</script>

<script src="nav.js"></script>
<script>MBRNav.init({ active: 'team' });</script>
</body>
</html>

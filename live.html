<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBR Live</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d1117; --ink2:#2a2f3d; --ink3:#5a6075;
  --rule:#d8dce8; --rule2:#eceef5;
  --paper:#f4f5f9; --paper2:#ffffff;
  --home:#1a56db; --home-lt:#dbeafe;
  --away:#c0392b; --away-lt:#fee2e2;
  --green:#15803d; --gold:#b45309;
  --live:#dc2626; --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;}

/* HEADER */
#site-header{background:var(--paper2);border-bottom:2px solid var(--ink);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mbr-wordmark{font-family:'Playfair Display',serif;font-weight:900;font-size:17px;color:var(--ink);text-decoration:none;letter-spacing:-.02em;}
.mbr-wordmark span{color:var(--home);}
#live-pill{display:flex;align-items:center;gap:5px;background:var(--live);color:#fff;font-size:10px;font-weight:600;letter-spacing:.12em;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}
#live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
#live-pill.final{background:var(--ink3);}

/* SCOREBOARD */
#scoreboard{background:var(--paper2);border-bottom:1.5px solid var(--rule);padding:10px 16px 8px;flex-shrink:0;}
.sb-inner{max-width:1100px;margin:0 auto;}
.sb-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.sb-team{display:flex;align-items:center;gap:10px;}
.sb-team.home{justify-content:flex-end;}
.sb-logo{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;overflow:hidden;flex-shrink:0;border:1.5px solid var(--rule);}
.sb-team.home .sb-logo{color:var(--home);background:var(--home-lt);}
.sb-team.away .sb-logo{color:var(--away);background:var(--away-lt);}
.sb-logo img{width:100%;height:100%;object-fit:contain;border-radius:50%;}
.sb-team-info{display:flex;flex-direction:column;gap:2px;}
.sb-team.home .sb-team-info{align-items:flex-end;text-align:right;}
.sb-name{font-family:'Playfair Display',serif;font-weight:700;font-size:14px;color:var(--ink);line-height:1.2;}
.sb-meta{display:flex;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);flex-wrap:wrap;}
.sb-team.home .sb-meta{justify-content:flex-end;}
.sb-foul{padding:1px 6px;border-radius:10px;}
.sb-foul.bonus{background:var(--live);color:#fff;font-weight:600;}
.sb-centre{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sb-scores-row{display:flex;align-items:baseline;gap:6px;}
.sb-pts{font-family:'Playfair Display',serif;font-weight:900;font-size:52px;line-height:1;min-width:64px;text-align:center;}
.sb-pts.home{color:var(--home);}
.sb-pts.away{color:var(--away);}
.sb-dash{font-family:'DM Mono',monospace;font-size:22px;color:var(--rule);line-height:1;}
.sb-clock{font-family:'DM Mono',monospace;font-weight:500;font-size:18px;background:var(--paper);border:1.5px solid var(--rule);border-radius:6px;padding:2px 10px;letter-spacing:.04em;min-width:70px;text-align:center;}
.sb-clock.running{border-color:var(--green);color:var(--green);background:#f0fdf4;}
.sb-period{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;margin-top:1px;}
.sb-poss{font-size:10px;font-weight:600;letter-spacing:.05em;padding:1px 7px;border-radius:20px;font-family:'DM Mono',monospace;margin-top:2px;}
.sb-poss.home{background:var(--home-lt);color:var(--home);}
.sb-poss.home::before{content:'◀  ';}
.sb-poss.away{background:var(--away-lt);color:var(--away);}
.sb-poss.away::after{content:'  ▶';}
.sb-qtrs{max-width:460px;margin:7px auto 0;border-top:1px solid var(--rule2);padding-top:6px;}
.qtr-grid{display:grid;grid-template-columns:72px repeat(4,1fr) 6px 1fr;gap:0;font-family:'DM Mono',monospace;font-size:11px;}
.qc{padding:2px 5px;text-align:center;color:var(--ink3);}
.qc.lbl{text-align:left;font-size:10px;letter-spacing:.06em;}
.qc.tn{font-weight:600;font-size:10px;color:var(--ink2);}
.qc.hs{color:var(--home);font-weight:600;}
.qc.as{color:var(--away);font-weight:600;}
.qc.tot{font-weight:700;color:var(--ink);}
.qc.hs.tot{color:var(--home);}
.qc.as.tot{color:var(--away);}
.qc.sep{background:var(--rule);width:2px;padding:0;}
.qc.aq{background:var(--rule2);border-radius:4px;color:var(--ink)!important;font-weight:700!important;}

/* MAIN 3-COL */
#main{display:grid;grid-template-columns:210px 1fr 210px;gap:0;flex:1;min-height:0;max-width:1100px;margin:0 auto;width:100%;padding:12px 12px 12px;box-sizing:border-box;align-items:start;}

/* STAT PANELS */
.stat-panel{display:flex;flex-direction:column;overflow-y:auto;max-height:calc(100dvh - 280px);border:1.5px solid var(--rule);border-radius:var(--r);background:var(--paper2);overflow:hidden;}
.panel-hdr{font-family:'Playfair Display',serif;font-weight:700;font-size:12px;padding:8px 10px 5px;border-bottom:1.5px solid var(--rule);display:flex;align-items:center;justify-content:space-between;background:var(--paper2);}
.panel-hdr.hh{color:var(--home);}
.panel-hdr.ah{color:var(--away);}
.panel-hdr-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);font-weight:400;}
.team-summary{display:flex;padding:5px 6px;background:var(--paper);border-bottom:1px solid var(--rule2);}
.ts-stat{display:flex;flex-direction:column;align-items:center;flex:1;}
.ts-val{font-weight:700;font-size:13px;color:var(--ink);}
.ts-lbl{font-size:8px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.pl-rows{overflow-y:auto;flex:1;}
.pl-row{padding:6px 10px;border-bottom:1px solid var(--rule2);background:var(--paper2);}
.pl-row.bench{opacity:.5;}
.pl-top{display:flex;align-items:baseline;justify-content:space-between;gap:4px;margin-bottom:2px;}
.pl-ident{display:flex;align-items:baseline;gap:3px;min-width:0;overflow:hidden;}
.pl-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);flex-shrink:0;}
.pl-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-pts{font-family:'Playfair Display',serif;font-weight:700;font-size:17px;line-height:1;flex-shrink:0;}
.home .pl-pts{color:var(--home);}
.away .pl-pts{color:var(--away);}
.pl-stats{display:flex;gap:8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);margin-bottom:3px;}
.pl-stats span{color:var(--ink2);}
.pl-fouls{display:flex;gap:2px;}
.pl-fd{width:6px;height:6px;border-radius:50%;background:var(--rule);}
.pl-fd.on{background:var(--gold);}

/* COURT */
#court-col{display:flex;flex-direction:column;gap:10px;}
#court-wrap{background:var(--paper2);border:1.5px solid var(--rule);border-radius:var(--r);overflow:hidden;}
#court-svg-wrap{width:100%;aspect-ratio:800/380;padding:6px;}
#fsvg{width:100%;height:100%;display:block;}
#court-legend{display:flex;align-items:center;justify-content:center;gap:16px;padding:5px 10px;border-top:1px solid var(--rule2);font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;}
.leg{display:flex;align-items:center;gap:4px;}
.leg-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.12);}

/* FEED */
#feed-wrap{background:var(--paper2);border:1.5px solid var(--rule);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;max-height:190px;}
.feed-hdr{font-family:'Playfair Display',serif;font-weight:700;font-size:12px;padding:7px 12px;border-bottom:1px solid var(--rule2);flex-shrink:0;color:var(--ink);}
#feed-list{overflow-y:auto;flex:1;}
.fr{display:flex;align-items:flex-start;gap:8px;padding:5px 12px;border-bottom:1px solid var(--rule2);transition:background .5s;}
.fr.new{background:#fefce8;}
.fr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.fr-body{flex:1;}
.fr-desc{font-size:11px;color:var(--ink);line-height:1.3;}
.fr-desc b{font-weight:600;}
.fr-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);margin-top:1px;}
.fr-score{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;align-self:center;flex-shrink:0;white-space:nowrap;}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:30px;box-shadow:0 4px 18px rgba(0,0,0,.22);z-index:300;transition:transform .3s cubic-bezier(.34,1.35,.64,1),opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.tp{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:1px 8px;margin-left:6px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;}

/* RESPONSIVE */
@media(max-width:860px){#main{grid-template-columns:160px 1fr 160px;padding:8px;}}
@media(max-width:640px){
  #main{grid-template-columns:1fr;padding:8px;}
  #court-col{order:1;}#home-panel{order:2;}#away-panel{order:3;}
  .stat-panel{max-height:none;}
  .sb-pts{font-size:38px;min-width:50px;}
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px;}
</style>
</head>
<body style="display:flex;flex-direction:column;min-height:100dvh;">

<header id="site-header">
  <a class="mbr-wordmark" href="#">MBR<span>·</span>LIVE</a>
  <div id="live-pill"><div id="live-dot"></div><span id="live-lbl">LIVE</span></div>
</header>

<div id="scoreboard">
  <div class="sb-inner">
    <div class="sb-row">
      <div class="sb-team home">
        <div class="sb-team-info">
          <div class="sb-name" id="home-name">Camden Hills</div>
          <div class="sb-meta">
            <span class="sb-foul" id="home-foul-lbl">0 fouls</span>

          </div>
        </div>
        <div class="sb-logo" id="home-logo">C</div>
      </div>
      <div class="sb-centre">
        <div class="sb-scores-row">
          <div class="sb-pts home" id="home-score">0</div>
          <div class="sb-dash">–</div>
          <div class="sb-pts away" id="away-score">0</div>
        </div>
        <div class="sb-clock" id="fan-clock">8:00</div>
        <div class="sb-period" id="fan-period">1st Quarter</div>
        <div class="sb-poss home" id="poss-disp">CAM</div>
      </div>
      <div class="sb-team away">
        <div class="sb-logo" id="away-logo">C</div>
        <div class="sb-team-info">
          <div class="sb-name" id="away-name">Cape Elizabeth</div>
          <div class="sb-meta">

      </div>

    <div class="sb-qtrs">

        <div class="qc lbl"></div>
        <div class="qc">Q1</div><div class="qc">Q2</div><div class="qc">Q3</div><div class="qc">Q4</div>
        <div class="qc sep"></div><div class="qc lbl" style="font-weight:700;color:var(--ink2)">TOT</div>
        <div class="qc tn" id="qhl">CAM</div>
        <div class="qc hs" id="qh1">—</div><div class="qc hs" id="qh2">—</div><div class="qc hs" id="qh3">—</div><div class="qc hs" id="qh4">—</div>
        <div class="qc sep"></div><div class="qc hs tot" id="qh-tot">0</div>
        <div class="qc tn" id="qal">CAP</div>
        <div class="qc as" id="qa1">—</div><div class="qc as" id="qa2">—</div><div class="qc as" id="qa3">—</div><div class="qc as" id="qa4">—</div>
        <div class="qc sep"></div><div class="qc as tot" id="qa-tot">0</div>
      </div>
    </div>
  </div>
</div>

<div id="main">

  <!-- HOME STATS (left) -->
  <div class="stat-panel home" id="home-panel">
    <div class="panel-hdr hh">
      <span id="home-panel-name">Camden Hills</span>
      <span class="panel-hdr-sub" id="home-fg-sub">0/0 FG</span>
    </div>
    <div class="team-summary" id="home-team-sum"></div>
    <div class="pl-rows" id="home-pl-rows"></div>
  </div>

  <!-- COURT + FEED -->
  <div id="court-col">
    <div id="court-wrap">
      <div id="court-svg-wrap">
        <!--
          FULL COURT: 800×380 viewBox
          Left half  — HOME attacks LEFT basket (cx=23, cy=190)
          Right half — AWAY attacks RIGHT basket (cx=777, cy=190)
          Centre line: x=400

          Shot coordinate transform from scorer (460×380, basket at top y≈25, x=230):
            HOME → LEFT:  fan_x = (sy/380)*400    fan_y = (sx/460)*380
            AWAY → RIGHT: fan_x = 800-(sy/380)*400  fan_y = (sx/460)*380
        -->
        <svg id="fsvg" viewBox="0 0 800 380" preserveAspectRatio="xMidYMid meet">
          <!-- Floor -->
          <rect width="800" height="380" fill="#c9a96e"/>
          <!-- Boundary -->
          <rect x="8" y="8" width="784" height="364" fill="none" stroke="#7a5c1e" stroke-width="3" rx="2"/>
          <!-- Centre line + circle -->
          <line x1="400" y1="8" x2="400" y2="372" stroke="#7a5c1e" stroke-width="2"/>
          <circle cx="400" cy="190" r="44" fill="none" stroke="#7a5c1e" stroke-width="2"/>
          <circle cx="400" cy="190" r="3" fill="#7a5c1e"/>

          <!-- HOME HALF (left, basket on left wall) -->
          <!-- Paint: key is 163px deep, 122px wide, centred at y=190 -->
          <rect x="8" y="129" width="163" height="122" fill="#b8955a" stroke="#7a5c1e" stroke-width="2"/>
          <line x1="8" y1="152" x2="171" y2="152" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>
          <line x1="8" y1="228" x2="171" y2="228" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>
          <rect x="8" y="167" width="5" height="46" fill="#7a5c1e" rx="1"/><!-- backboard -->
          <circle cx="23" cy="190" r="10" fill="none" stroke="#7a5c1e" stroke-width="2.5"/>
          <circle cx="23" cy="190" r="3" fill="#7a5c1e"/>
          <line x1="171" y1="129" x2="171" y2="251" stroke="#7a5c1e" stroke-width="2"/><!-- FT line -->
          <!-- FT circle: centre (171,190) r=59. Right arc solid, left dashed -->
          <path d="M 171 131 A 59 59 0 0 1 171 249" fill="none" stroke="#7a5c1e" stroke-width="2"/>
          <path d="M 171 131 A 59 59 0 0 0 171 249" fill="none" stroke="#7a5c1e" stroke-width="2" stroke-dasharray="7,6"/>
          <!-- 3pt arc: full circle clipped to left half. Centre offset so arc matches scorer geometry. -->
          <!-- Scorer: basket at (230,25), arc r=176.1 from centre (230,55.9). -->
          <!-- Transformed to left half: basket at (23,190). Arc centre maps from (230,55.9): -->
          <!--   fan_x = (55.9/380)*400 = 58.8   fan_y = (230/460)*380 = 190  -->
          <clipPath id="hclip"><rect x="8" y="8" width="392" height="364"/></clipPath>
          <circle cx="59" cy="190" r="176" fill="none" stroke="#7a5c1e" stroke-width="2.5" clip-path="url(#hclip)"/>
          <!-- Restricted area arc -->
          <path d="M 23 157 A 33 33 0 0 1 23 223" fill="none" stroke="#7a5c1e" stroke-width="1.5" stroke-dasharray="4,3"/>

          <!-- AWAY HALF (right, basket on right wall — mirror of home) -->
          <rect x="629" y="129" width="163" height="122" fill="#b8955a" stroke="#7a5c1e" stroke-width="2"/>
          <line x1="629" y1="152" x2="792" y2="152" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>
          <line x1="629" y1="228" x2="792" y2="228" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>
          <rect x="787" y="167" width="5" height="46" fill="#7a5c1e" rx="1"/>
          <circle cx="777" cy="190" r="10" fill="none" stroke="#7a5c1e" stroke-width="2.5"/>
          <circle cx="777" cy="190" r="3" fill="#7a5c1e"/>
          <line x1="629" y1="129" x2="629" y2="251" stroke="#7a5c1e" stroke-width="2"/>
          <path d="M 629 131 A 59 59 0 0 0 629 249" fill="none" stroke="#7a5c1e" stroke-width="2"/>
          <path d="M 629 131 A 59 59 0 0 1 629 249" fill="none" stroke="#7a5c1e" stroke-width="2" stroke-dasharray="7,6"/>
          <clipPath id="aclip"><rect x="400" y="8" width="392" height="364"/></clipPath>
          <circle cx="741" cy="190" r="176" fill="none" stroke="#7a5c1e" stroke-width="2.5" clip-path="url(#aclip)"/>
          <path d="M 777 157 A 33 33 0 0 0 777 223" fill="none" stroke="#7a5c1e" stroke-width="1.5" stroke-dasharray="4,3"/>

          <!-- Shot dots -->
          <g id="home-dots"></g>
          <g id="away-dots"></g>
        </svg>
      </div>
      <div id="court-legend">
        <div class="leg"><div class="leg-dot" style="background:#15803d"></div>2pt made</div>
        <div class="leg"><div class="leg-dot" style="background:#b45309"></div>3pt made</div>
        <div class="leg"><div class="leg-dot" style="background:#a78bfa"></div>Putback</div>
        <div class="leg" style="gap:3px"><span style="font-size:14px;color:#c0392b;line-height:1">×</span>Miss</div>
      </div>
    </div>
    <div id="feed-wrap">
      <div class="feed-hdr">Play by Play</div>
      <div id="feed-list"></div>
    </div>
  </div>

  <!-- AWAY STATS (right) -->
  <div class="stat-panel away" id="away-panel">
    <div class="panel-hdr ah">
      <span id="away-panel-name">Cape Elizabeth</span>
      <span class="panel-hdr-sub" id="away-fg-sub">0/0 FG</span>
    </div>
    <div class="team-summary" id="away-team-sum"></div>
    <div class="pl-rows" id="away-pl-rows"></div>
  </div>

</div>

<div id="toast"></div>

// ── COORDINATE TRANSFORM ──────────────────────────────
// Scorer: 460×380, basket at top (y≈25, x=230).
// Fan court: 800×380. Home basket left (x=8), away basket right (x=792).
// HOME → LEFT:  fan_x=(sy/380)*400,       fan_y=(sx/460)*380
// AWAY → RIGHT: fan_x=800-(sy/380)*400,   fan_y=(sx/460)*380
function xfm(pt, side) {
  if(!pt) return null;
  return side==='home'
    ? { x:(pt.y/380)*400,       y:(pt.x/460)*380 }
    : { x:800-(pt.y/380)*400,   y:(pt.x/460)*380 };
}

function addDot(pt, made, three, isPb, side) {
  const tp = xfm(pt, side);
  if(!tp) return;
  const g = document.getElementById(side+'-dots');
  const id = 'd'+Date.now()+Math.random().toString(36).slice(2,4);
  if(made){
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',tp.x); c.setAttribute('cy',tp.y); c.setAttribute('r','7');
    c.setAttribute('fill', isPb?'#a78bfa':three?'#b45309':'#15803d');
    c.setAttribute('fill-opacity','.82');
    c.setAttribute('stroke','rgba(255,255,255,.55)'); c.setAttribute('stroke-width','1.5');
    c.setAttribute('id',id); g.appendChild(c);
  } else {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',tp.x); t.setAttribute('y',tp.y+5.5);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','17');
    t.setAttribute('fill',isPb?'#a78bfa':'#c0392b'); t.setAttribute('font-weight','bold');
    t.setAttribute('id',id); t.textContent='×'; g.appendChild(t);
  }
}

// ── MAIN EVENT INTAKE ─────────────────────────────────
function onEvent(e){
  const s=e.side, opp=s==='home'?'away':'home';
  const p=e.pid?findP(e.pid,s):null;
  const ts=GAME.ts[s];
  GAME.clockSec=e.clk; GAME.period=e.period;
  e.scoreSnap={home:GAME.home.score,away:GAME.away.score};

  const shotKeys=['2pt_made','3pt_made','2pt_miss','3pt_miss','putback_made','putback_miss'];

  if(e.key==='2pt_made'||e.key==='putback_made'){
    GAME[s].score+=2; GAME.qtrs[s][e.period-1]+=2;
    if(p){p.pts+=2;p.fgm++;p.fga++;} ts.fgm++;ts.fga++;
    GAME.possession=opp;
    e.scoreSnap={home:GAME.home.score,away:GAME.away.score};
    toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — 2 pts<span class="tp">${e.scoreSnap.home}–${e.scoreSnap.away}</span>`);
  } else if(e.key==='3pt_made'){
    GAME[s].score+=3; GAME.qtrs[s][e.period-1]+=3;
    if(p){p.pts+=3;p.fgm++;p.fga++;p.tpm++;p.tpa++;} ts.fgm++;ts.fga++;ts.tpm++;ts.tpa++;
    GAME.possession=opp;
    e.scoreSnap={home:GAME.home.score,away:GAME.away.score};
    toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — 3-pointer! 🔥<span class="tp">${e.scoreSnap.home}–${e.scoreSnap.away}</span>`);
  } else if(e.key==='ft_made'){
    GAME[s].score+=1; GAME.qtrs[s][e.period-1]+=1;
    if(p) p.pts++;
    e.scoreSnap={home:GAME.home.score,away:GAME.away.score};
  } else if(e.key==='2pt_miss'||e.key==='putback_miss'){
    if(p) p.fga++; ts.fga++;
  } else if(e.key==='3pt_miss'){
    if(p){p.fga++;p.tpa++;} ts.fga++;ts.tpa++;
  } else if(e.key==='assist'){
    if(p) p.ast++; ts.ast++;
  } else if(e.key==='o_reb'||e.key==='d_reb'){
    if(p) p.reb++; ts.reb++;
    if(e.key==='o_reb') toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — offensive rebound`);
  } else if(e.key==='steal'){
    ts.stl++; toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — steal ⚡`);
  } else if(e.key==='block'){
    ts.blk++; toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — block ✋`);
  } else if(e.key==='turnover'){
    ts.to++; toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — turnover`);
  } else if(e.key.startsWith('foul_')){
    if(p) p.fouls++; GAME[s].fouls++;
    if(GAME[s].fouls===7) toast(`${GAME[s].name} in the bonus`);
    else if(GAME[s].fouls===10) toast(`${GAME[s].name} double bonus`);
  } else if(e.key==='timeout_full'){
    GAME[s].tof=Math.max(0,GAME[s].tof-1); toast(`${GAME[s].name} — full timeout`);
  } else if(e.key==='timeout_30sec'){
    GAME[s].to3=Math.max(0,GAME[s].to3-1); toast(`${GAME[s].name} — 30-sec timeout`);
  } else if(e.key==='possession_flip'){
    GAME.possession=s;
  } else if(e.key==='sub_in'){ if(p) p.on=true; }
  else if(e.key==='sub_out'){ if(p) p.on=false; }

  if(shotKeys.includes(e.key)&&e.pt){
    addDot(e.pt,e.key.endsWith('_made'),e.key.startsWith('3pt'),e.key.startsWith('putback'),s);
  }
  evts.unshift(e);
  updScoreboard(); updPanels(); updFeed();
}

function runSim(){
  if(simIdx>=SIM.length){
    document.getElementById('live-pill').classList.add('final');
    document.getElementById('live-lbl').textContent='FINAL';
    GAME.running=false; if(demoClk){clearInterval(demoClk);demoClk=null;}

  const evt=SIM[simIdx++];
  onEvent(evt);
  if(!demoClk) startClock();
  const big=['2pt_made','3pt_made','putback_made'].includes(evt.key);
  setTimeout(runSim,(big?3000:2000)+Math.random()*900);
}

// ── INIT ──────────────────────────────────────────────
function initView(home,away){
  ['home','away'].forEach(s=>{
    const t=s==='home'?home:away;
    GAME[s].name=t.name; GAME[s].short=t.short;
    document.getElementById(s+'-name').textContent=t.name;
    document.getElementById(s+'-panel-name').textContent=t.name;
    document.getElementById(s==='home'?'qhl':'qal').textContent=t.short;
    document.getElementById(s+'-logo').textContent=t.name.charAt(0);
    if(t.logoUrl){
      const img=document.createElement('img');
      img.src=t.logoUrl; img.alt=t.name; img.onerror=()=>{};
      const el=document.getElementById(s+'-logo');
      el.textContent=''; el.appendChild(img);
    }
  });
  updScoreboard(); updPanels(); updFeed();
}

initView(
  {name:'Camden Hills',  short:'CAM', logoUrl:'https://res.cloudinary.com/dulfssb6y/image/upload/mbr-logos/camden-hills.png'},
  {name:'Cape Elizabeth',short:'CAP', logoUrl:'https://res.cloudinary.com/dulfssb6y/image/upload/mbr-logos/cape-elizabeth.png'}
);
setTimeout(runSim, 1000);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MBR Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --home-light: #4a9eff;
    --away-light: #e05c52;
    --text: #f0f2ff;
    --text-dim: #8890b0;
    --green: #27ae60;
    --gold: #f39c12;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100dvh; display: flex; flex-direction: column;
    overflow: hidden; user-select: none; touch-action: none;
  }

  /* TOP BAR */
  #topbar {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 5px 12px; gap: 8px; flex-shrink: 0; height: 62px;
  }
  .team-score { display: flex; flex-direction: column; gap: 1px; }
  .team-score.home { align-items: flex-start; }
  .team-score.away { align-items: flex-end; }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .team-score.home .team-name { color: var(--home-light); }
  .team-score.away .team-name { color: var(--away-light); }
  .score-row { display: flex; align-items: baseline; gap: 8px; }
  .team-score.away .score-row { flex-direction: row-reverse; }
  .score-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 38px; line-height: 1; }
  .team-score.home .score-num { color: var(--home-light); }
  .team-score.away .score-num { color: var(--away-light); }
  .foul-to { display: flex; flex-direction: column; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: var(--text-dim); gap: 1px; }
  .foul-to span { display: flex; gap: 3px; align-items: center; }
  .foul-to strong { color: var(--text); font-size: 12px; }

  /* Clock area: clock button centre, period controls BELOW it, possession arrows BIG on sides */
  #clock-center { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  #clock-btn {
    background: var(--surface2); border: 2px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 28px;
    padding: 2px 16px; cursor: pointer; min-width: 108px; text-align: center;
    transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
  }
  #clock-btn.running { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(39,174,96,0.25); }

  /* Period row: sits below clock, well away from iPad notch */
  #period-row { display: flex; align-items: center; gap: 5px; }
  #period-row button {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; width: 26px; height: 26px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  #period-row button:active { background: var(--border); }
  #period-display { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.15em; color: var(--text); min-width: 32px; text-align: center; }

  /* Possession arrows — much bigger, inside team score areas */
  .poss-arrow {
    font-size: 11px; letter-spacing: 0.06em; color: var(--text-dim);
    display: flex; align-items: center; gap: 4px; cursor: pointer; margin-top: 2px;
    padding: 3px 6px; border-radius: 5px; border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .poss-arrow:active { background: var(--surface2); }
  .poss-arrow .arr { font-size: 20px; line-height: 1; }
  .poss-arrow.home .arr { color: var(--home-light); }
  .poss-arrow.away .arr { color: var(--away-light); }
  .poss-arrow.active-poss { border-color: var(--border); }

  /* MIDDLE */
  #middle { display: grid; grid-template-columns: 165px 1fr 165px; flex: 1; min-height: 0; overflow: hidden; }

  /* PLAYER PANELS */
  .player-panel { display: flex; flex-direction: column; gap: 3px; padding: 5px; overflow-y: auto; background: var(--surface); }
  .player-panel.home-panel { border-right: 2px solid var(--border); }
  .player-panel.away-panel { border-left: 2px solid var(--border); }

  .player-card {
    border-radius: 8px; padding: 10px 10px; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s; border: 2px solid transparent; flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .home-panel .player-card { background: rgba(45,125,210,0.1); border-color: rgba(45,125,210,0.2); }
  .away-panel .player-card { background: rgba(192,57,43,0.1); border-color: rgba(192,57,43,0.2); }
  .player-card.selected { border-color: var(--gold) !important; background: rgba(243,156,18,0.18) !important; box-shadow: 0 0 14px rgba(243,156,18,0.35); }
  .player-card.on-bench { opacity: 0.38; }
  .player-card:active { transform: scale(0.97); }

  .card-num-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .player-number { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 34px; line-height: 1; }
  .home-panel .player-number { color: var(--home-light); }
  .away-panel .player-number { color: var(--away-light); }

  .card-info-col { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .player-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.02em; }
  .player-stats-row { display: flex; gap: 8px; }
  .pstat { display: flex; flex-direction: column; align-items: center; }
  .pstat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; line-height: 1; color: var(--text); }
  .pstat-lbl { font-size: 8px; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; }

  .foul-dots { display: flex; gap: 2px; margin-top: 2px; }
  .foul-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
  .foul-dot.active { background: var(--gold); }

  .bench-label { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; text-align: center; padding: 3px 0 1px; border-top: 1px solid var(--border); margin-top: 1px; }

  /* COURT */
  #court-container { position: relative; display: flex; background: #1a1208; overflow: hidden; }
  #court-svg { width: 100%; height: 100%; display: block; cursor: crosshair; }

  /* SWIPE DIRECTION OVERLAY */
  #swipe-overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 15;
  }
  #swipe-overlay.show { display: flex; }
  .swipe-directions {
    position: relative; width: 160px; height: 160px;
  }
  .swipe-dir {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    transition: opacity 0.15s, transform 0.15s;
    opacity: 0.6;
  }
  .swipe-dir.highlighted { opacity: 1; transform: scale(1.2); }
  .swipe-dir .darrow { font-size: 28px; line-height: 1; }
  .swipe-dir .dlabel { font-size: 11px; letter-spacing: 0.06em; }

  /* UP = make */
  .dir-up { top: 0; left: 50%; transform: translateX(-50%); color: var(--green); }
  .dir-up.highlighted { transform: translateX(-50%) scale(1.2); }
  /* RIGHT = putback make */
  .dir-right { right: 0; top: 50%; transform: translateY(-50%); color: #a78bfa; }
  .dir-right.highlighted { transform: translateY(-50%) scale(1.2); }
  /* LEFT = putback miss */
  .dir-left { left: 0; top: 50%; transform: translateY(-50%); color: var(--away-light); }
  .dir-left.highlighted { transform: translateY(-50%) scale(1.2); }
  /* DOWN = cancel */
  .dir-down { bottom: 0; left: 50%; transform: translateX(-50%); color: var(--text-dim); }
  .dir-down.highlighted { transform: translateX(-50%) scale(1.2); }

  .swipe-circle {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 54px; height: 54px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    color: var(--text-dim); letter-spacing: 0.05em;
  }

  #gesture-hint {
    position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif; font-size: 10px;
    letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px;
    pointer-events: none; white-space: nowrap;
  }

  #log-toggle-btn {
    position: absolute; top: 6px; right: 6px;
    background: rgba(22,25,38,0.88); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    letter-spacing: 0.08em; padding: 4px 8px; cursor: pointer; z-index: 10;
  }

  #log-panel {
    position: absolute; top: 6px; right: 6px; width: 215px; max-height: 220px;
    background: rgba(12,14,22,0.96); border: 1px solid var(--border); border-radius: var(--radius);
    overflow-y: auto; font-size: 10px; z-index: 20; display: none;
  }
  #log-panel.open { display: block; }
  .log-header {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim); padding: 6px 8px 4px;
    border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
    align-items: center; position: sticky; top: 0; background: rgba(12,14,22,0.98);
  }
  .log-header button { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; }
  .log-entry { display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-bottom: 1px solid rgba(46,50,80,0.4); }
  .log-entry:hover { background: var(--surface2); }
  .log-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .log-txt { flex: 1; color: var(--text); line-height: 1.3; }
  .log-clk { color: var(--text-dim); font-size: 9px; flex-shrink: 0; }
  .log-del { background: none; border: none; color: var(--away-light); font-size: 12px; cursor: pointer; opacity: 0.5; padding: 0 2px; }
  .log-del:hover { opacity: 1; }

  /* STAT BAR */
  #stat-bar { background: var(--surface); border-top: 2px solid var(--border); padding: 5px 8px 6px; flex-shrink: 0; }
  #sel-display { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; min-height: 16px; letter-spacing: 0.05em; }
  #sel-display .sn { font-weight: 700; font-size: 14px; }
  .stat-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .stat-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 10px;
    padding: 6px 2px; text-align: center; cursor: pointer;
    transition: transform 0.08s, background 0.08s; line-height: 1.2;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
  }
  .stat-btn .si { font-size: 13px; line-height: 1; }
  .stat-btn:active { transform: scale(0.91); background: var(--border); }
  .stat-btn.scoring { border-color: rgba(39,174,96,0.6); color: #5ddb8a; }
  .stat-btn.miss    { border-color: rgba(192,57,43,0.5); color: var(--away-light); }
  .stat-btn.foul    { border-color: rgba(243,156,18,0.6); color: var(--gold); }
  .stat-btn.team-stat { border-color: rgba(140,140,180,0.35); color: var(--text-dim); }
  .stat-btn.needs-player { opacity: 0.3; pointer-events: none; }

  /* SUB MODAL */
  #sub-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; align-items: center; justify-content: center; }
  #sub-modal.show { display: flex; }
  .sub-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; width: 270px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow); }
  .sub-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 3px; }
  .sub-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
  .sub-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.1s; border: 1px solid transparent; }
  .sub-row:hover { background: var(--surface2); border-color: var(--border); }
  .sub-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; width: 30px; text-align: center; }
  .sub-name { font-weight: 600; font-size: 13px; }
  .sub-sm { font-size: 10px; color: var(--text-dim); }
  .sub-cancel { margin-top: 10px; width: 100%; padding: 9px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; cursor: pointer; }

  /* FLASH */
  #flash {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.85);
    background: rgba(243,156,18,0.95); color: #000;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px;
    padding: 9px 22px; border-radius: 10px; pointer-events: none; opacity: 0;
    transition: opacity 0.12s, transform 0.12s; z-index: 200; letter-spacing: 0.05em; white-space: nowrap;
  }
  #flash.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  #flash.made { background: rgba(39,174,96,0.95); color: #fff; }
  #flash.miss-fl { background: rgba(192,57,43,0.88); color: #fff; }
  #flash.cancel-fl { background: rgba(80,80,100,0.9); color: var(--text-dim); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="team-score home">
    <div class="team-name">Camden Boys</div>
    <div class="score-row">
      <div class="score-num" id="home-score">0</div>
      <div class="foul-to">
        <span>FOULS <strong id="home-fouls">0</strong></span>
        <span>TO <strong id="home-to-full">3</strong>/<strong id="home-to-30">2</strong></span>
      </div>
    </div>
    <div class="poss-arrow home" id="poss-home" onclick="setPossession('home')">
      <span class="arr">▶</span><span>POSS</span>
    </div>
  </div>

  <div id="clock-center">
    <button id="clock-btn" onclick="toggleClock()">8:00</button>
    <div id="period-row">
      <button onclick="changePeriod(-1)">‹</button>
      <div id="period-display">1ST</div>
      <button onclick="changePeriod(1)">›</button>
    </div>
  </div>

  <div class="team-score away">
    <div class="team-name">Cape Elizabeth Boys</div>
    <div class="score-row">
      <div class="score-num" id="away-score">0</div>
      <div class="foul-to">
        <span>FOULS <strong id="away-fouls">0</strong></span>
        <span>TO <strong id="away-to-full">3</strong>/<strong id="away-to-30">2</strong></span>
      </div>
    </div>
    <div class="poss-arrow away" id="poss-away" onclick="setPossession('away')">
      <span class="arr">▶</span><span>POSS</span>
    </div>
  </div>
</div>

<div id="middle">
  <div class="player-panel home-panel" id="home-panel"></div>

  <div id="court-container">
    <!--
      Court geometry (viewBox 500 x 420):
      Scale: 1 SVG unit ≈ 0.5 ft  (so full court ~94ft = 470px, half = ~47ft = 235px)
      Basket at (250, 40).
      Key: 12ft wide = 60px, 19ft deep = 95px  → rect x=220, y=15, w=60, h=95  (FT line at y=110... wait)

      Maine HS uses NCAA women dimensions (similar to NFHS):
      - Key: 12ft wide, lane 15ft to FT line
      - FT line: 15ft from backboard → y = 15 + 75 = 90... let's use real proportions.

      Let's set:
        Basket centre: (250, 45)
        1 px = 0.4 ft  (court 50ft wide = 500px... but viewBox only 500, side margins 20 = 460 playable)
        Actually: playable width 460px / 50ft = 9.2px/ft
        Basket at y=45 (near top)
        FT line: 15ft from basket → 15 * 9.2 = 138px → y = 45 + 138 = 183... too deep
        Let's just use 8px/ft
          FT: 15ft * 8 = 120 → y = 45 + 120 = 165
          Key width: 12ft * 8 = 96px → x = 250-48=202, w=96
          3pt: 20.75ft * 8 = 166px from basket
          Corner 3pt: 22ft from sideline... side at x=20, so corner at x=20+6=26... too tight
          
      Let me just use a clean proportional system that looks right:
        ViewBox: 0 0 460 400
        Basket: (230, 38)
        Key: width=88px (centered), top at y=15, FT line at y=155
        3pt arc radius: 150px from basket
        Corner 3: at x=50 (left) and x=410 (right), up to y=130
        Half court line at y=385
    -->
    <svg id="court-svg" viewBox="0 0 460 380" preserveAspectRatio="xMidYMid meet">
      <!-- GEOMETRY: basket at BOTTOM, attack upward
           Scale 8.6px/ft. Basket (230,340). Baseline y=365. Half court top.
           Key: 12ft=103px wide, 15ft=129px deep → x=179–281, y=236–365
           FT line: y=236. FT circle r=52px centre (230,236).
           3pt r=170px. At baseline y=365: x=230±sqrt(170²-25²)=230±168=62,398
           Arc sweeps from (62,365) to (398,365) through the court (large arc, CCW) -->

      <!-- Floor -->
      <rect width="460" height="380" fill="#c9a96e"/>
      <!-- Boundary -->
      <rect x="15" y="8" width="430" height="364" fill="none" stroke="#7a5c1e" stroke-width="3" rx="2"/>
      <!-- Half court line at top -->
      <line x1="15" y1="8" x2="445" y2="8" stroke="#7a5c1e" stroke-width="2"/>
      <circle cx="230" cy="8" r="48" fill="none" stroke="#7a5c1e" stroke-width="2"/>

      <!-- KEY / PAINT -->
      <rect x="179" y="236" width="102" height="136" fill="#b8955a" stroke="#7a5c1e" stroke-width="2"/>
      <line x1="200" y1="236" x2="200" y2="372" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>
      <line x1="260" y1="236" x2="260" y2="372" stroke="#7a5c1e" stroke-width="1.2" stroke-dasharray="5,5"/>

      <!-- FT LINE -->
      <line x1="179" y1="236" x2="281" y2="236" stroke="#7a5c1e" stroke-width="2"/>
      <!-- FT CIRCLE: solid half toward court (upward), dashed half toward basket -->
      <path d="M 178 236 A 52 52 0 0 0 282 236" fill="none" stroke="#7a5c1e" stroke-width="2"/>
      <path d="M 178 236 A 52 52 0 0 1 282 236" fill="none" stroke="#7a5c1e" stroke-width="2" stroke-dasharray="7,6"/>

      <!-- BACKBOARD -->
      <rect x="204" y="357" width="52" height="6" fill="#7a5c1e" rx="1"/>
      <!-- BASKET centre (230,340) -->
      <circle cx="230" cy="340" r="9" fill="none" stroke="#7a5c1e" stroke-width="2.5"/>
      <circle cx="230" cy="340" r="3" fill="#7a5c1e"/>

      <!-- RESTRICTED AREA ARC: r=34, centre (230,340), bows upward toward court -->
      <!-- At y=372: x=230±sqrt(34²-32²)=230±sqrt(1156-1024)=230±11=219,241 -->
      <path d="M 219 372 A 34 34 0 0 0 241 372" fill="none" stroke="#7a5c1e" stroke-width="1.8"/>


      <!-- 3-POINT ARC: r=170, centre=(230,340), endpoints at baseline y=372
           x=230±sqrt(170²-32²)=230±sqrt(28900-1024)=230±167=63,397
           Large arc sweeping CCW (sweep=0, large-arc=1) bows toward half court (upward) -->
      <path d="M 63 372 A 170 170 0 1 0 397 372" fill="none" stroke="#7a5c1e" stroke-width="2.5"/>

      <!-- Shot dots layer -->
      <g id="shot-dots"></g>
      <!-- Touch ring indicator -->
      <circle id="touch-ring" cx="0" cy="0" r="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.3)" stroke-width="2" opacity="0" pointer-events="none"/>
    </svg>

    <!-- Swipe direction overlay (shows on swipe start) -->
    <div id="swipe-overlay">
      <div class="swipe-directions">
        <div class="swipe-dir dir-up" id="dir-up">
          <span class="darrow">↑</span>
          <span class="dlabel">MAKE</span>
        </div>
        <div class="swipe-dir dir-right" id="dir-right">
          <span class="darrow">→</span>
          <span class="dlabel">PB ✓</span>
        </div>
        <div class="swipe-dir dir-left" id="dir-left">
          <span class="darrow">←</span>
          <span class="dlabel">PB ✗</span>
        </div>
        <div class="swipe-dir dir-down" id="dir-down">
          <span class="darrow">↓</span>
          <span class="dlabel">CANCEL</span>
        </div>
        <div class="swipe-circle">SWIPE</div>
      </div>
    </div>

    <div id="gesture-hint">TAP = miss · SWIPE ↑ = make · → putback ✓ · ← putback ✗ · ↓ cancel</div>
    <button id="log-toggle-btn" onclick="toggleLog()">LOG ▾</button>
    <div id="log-panel">
      <div class="log-header">
        <span>EVENT LOG</span>
        <button onclick="toggleLog()">✕</button>
      </div>
      <div id="log-entries"></div>
    </div>
  </div>

  <div class="player-panel away-panel" id="away-panel"></div>
</div>

<div id="stat-bar">
  <div id="sel-display">Tap a player to select</div>
  <div class="stat-grid" id="stat-grid"></div>
</div>

<div id="sub-modal">
  <div class="sub-box">
    <div class="sub-title" id="sub-title">Substitution</div>
    <div class="sub-sub">Select player entering the game</div>
    <div id="sub-list"></div>
    <button class="sub-cancel" onclick="closeSubModal()">Cancel</button>
  </div>
</div>

<div id="flash"></div>

<script>
// ── DATA ──
const GAME = {
  home: { name:'Camden Boys', short:'CAMDEN', score:0, fouls:0, toFull:3, to30:2 },
  away: { name:'Cape Elizabeth Boys', short:'CAP.ELI', score:0, fouls:0, toFull:3, to30:2 },
  period:1, clockSec:480, clockRunning:false, possession:'home'
};

// Player stats tracked in-memory: pts, reb (total), ast
const PLAYERS = {
  home:[
    {id:'h1', first:'H', last:'Stewart',    num:4,  pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'h2', first:'S', last:'Johnson',    num:10, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'h3', first:'K', last:'Melquist',   num:11, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'h4', first:'H', last:'Schwalm',    num:12, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'h5', first:'T', last:'Leadbetter', num:15, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'h6', first:'E', last:'Stearns',    num:22, pts:0,reb:0,ast:0,fouls:0,onFloor:false},
    {id:'h7', first:'M', last:'Webb',       num:3,  pts:0,reb:0,ast:0,fouls:0,onFloor:false},
  ],
  away:[
    {id:'a1', first:'L', last:'Lombardo',      num:10, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'a2', first:'C', last:'Wannemacher',   num:11, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'a3', first:'J', last:'Rosen',         num:14, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'a4', first:'E', last:'Morse',         num:20, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'a5', first:'O', last:'Beaureguard',   num:23, pts:0,reb:0,ast:0,fouls:0,onFloor:true },
    {id:'a6', first:'F', last:'Casey',         num:5,  pts:0,reb:0,ast:0,fouls:0,onFloor:false},
    {id:'a7', first:'D', last:'Park',          num:33, pts:0,reb:0,ast:0,fouls:0,onFloor:false},
  ]
};

const STAT_DEFS = [
  {key:'o_reb',            label:'O-Reb',    icon:'↑',  type:'normal'},
  {key:'d_reb',            label:'D-Reb',    icon:'↓',  type:'normal'},
  {key:'assist',           label:'Assist',   icon:'🤝', type:'normal'},
  {key:'steal',            label:'Steal',    icon:'⚡', type:'normal'},
  {key:'block',            label:'Block',    icon:'✋', type:'normal'},
  {key:'turnover',         label:'T/O',      icon:'↩',  type:'normal'},
  {key:'deflection',       label:'Defl.',    icon:'🖐', type:'normal'},
  {key:'charge_taken',     label:'Charge',   icon:'🛡', type:'normal'},
  {key:'foul_personal',    label:'P.Foul',   icon:'⚠',  type:'foul'},
  {key:'foul_offensive',   label:'O.Foul',   icon:'⚠',  type:'foul'},
  {key:'foul_flagrant',    label:'Flagrant', icon:'🚨', type:'foul'},
  {key:'foul_intentional', label:'Int.Foul', icon:'⚠',  type:'foul'},
  {key:'foul_technical',   label:'Tech',     icon:'📋', type:'foul',      teamStat:true},
  {key:'timeout_full',     label:'TO Full',  icon:'⏸',  type:'team-stat', teamStat:true},
  {key:'timeout_30sec',    label:'TO 30s',   icon:'⏸',  type:'team-stat', teamStat:true},
  {key:'ft_made',          label:'FT Made',  icon:'🟢', type:'scoring'},
  {key:'ft_miss',          label:'FT Miss',  icon:'🔴', type:'miss'},
  {key:'possession_flip',  label:'Arrow',    icon:'⇄',  type:'team-stat', teamStat:true},
];

// ── STATE ──
let selPlayer=null, selTeam=null;
let events=[], shotDots=[];
let clockInterval=null, holdTimer=null, subTarget=null, logOpen=false, flashTimer=null;

// Gesture state
let tStartX=0, tStartY=0;
let tMoving=false, tOverlayShown=false;
const SWIPE_PX=28;  // min px to trigger directional overlay
const COMMIT_PX=55; // min px to commit a direction

// ── CLOCK ──
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
function toggleClock(){
  if(GAME.clockRunning){clearInterval(clockInterval);GAME.clockRunning=false;}
  else{
    clockInterval=setInterval(()=>{
      if(GAME.clockSec>0){GAME.clockSec--;updateClockUI();}
      else{clearInterval(clockInterval);GAME.clockRunning=false;updateClockUI();}
    },1000);
    GAME.clockRunning=true;
  }
  updateClockUI();
}
function updateClockUI(){
  const b=document.getElementById('clock-btn');
  b.textContent=fmt(GAME.clockSec);
  b.classList.toggle('running',GAME.clockRunning);
}
function changePeriod(d){
  GAME.period=Math.max(1,Math.min(4,GAME.period+d));
  GAME.clockSec=480; GAME.clockRunning=false;
  clearInterval(clockInterval); updateClockUI();
  document.getElementById('period-display').textContent=['1ST','2ND','3RD','4TH'][GAME.period-1]||'OT';
}
function setPossession(side){
  GAME.possession=side;
  updatePossUI();
  pushEvent(null,side,'possession_flip',null,null);
}
function flipPossession(){
  GAME.possession=GAME.possession==='home'?'away':'home';
  updatePossUI();
  pushEvent(null,GAME.possession,'possession_flip',null,null);
}
function updatePossUI(){
  document.getElementById('poss-home').classList.toggle('active-poss', GAME.possession==='home');
  document.getElementById('poss-away').classList.toggle('active-poss', GAME.possession==='away');
  // Dim the inactive one
  document.getElementById('poss-home').style.opacity = GAME.possession==='home' ? '1' : '0.3';
  document.getElementById('poss-away').style.opacity = GAME.possession==='away' ? '1' : '0.3';
}

// ── PLAYER PANELS ──
function renderPlayers(){
  ['home','away'].forEach(side=>{
    const panel=document.getElementById(`${side}-panel`);
    panel.innerHTML='';
    // Only show on-floor players in the panel
    PLAYERS[side].filter(p=>p.onFloor).forEach(p=>panel.appendChild(makeCard(p,side)));
  });
}

function makeCard(player,side){
  const div=document.createElement('div');
  div.className='player-card'+(player.onFloor?'':' on-bench')+(selPlayer?.id===player.id?' selected':'');

  const dots=Array.from({length:5},(_,i)=>`<div class="foul-dot${i<player.fouls?' active':''}"></div>`).join('');

  div.innerHTML=`
    <div class="card-num-col">
      <div class="player-number">${player.num}</div>
      <div class="foul-dots">${dots}</div>
    </div>
    <div class="card-info-col">
      <div class="player-name">${player.first}. ${player.last}</div>
      <div class="player-stats-row">
        <div class="pstat"><div class="pstat-val">${player.pts}</div><div class="pstat-lbl">PTS</div></div>
        <div class="pstat"><div class="pstat-val">${player.reb}</div><div class="pstat-lbl">REB</div></div>
        <div class="pstat"><div class="pstat-val">${player.ast}</div><div class="pstat-lbl">AST</div></div>
      </div>
    </div>`;

  // Tap to select / deselect
  div.addEventListener('pointerup', ()=>{
    if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; selectPlayer(player,side); }
  });
  div.addEventListener('pointerdown', ()=>{
    holdTimer=setTimeout(()=>{ holdTimer=null; openSubModal(player,side); },600);
  });
  ['pointerleave','pointercancel'].forEach(ev=>
    div.addEventListener(ev,()=>{ if(holdTimer){clearTimeout(holdTimer);holdTimer=null;} })
  );
  return div;
}

function selectPlayer(p,side){
  if(selPlayer?.id===p.id){ selPlayer=null; selTeam=null; }
  else { selPlayer=p; selTeam=side; }
  renderPlayers(); updateSelDisplay(); updateStatBtns();
}
function updateSelDisplay(){
  const el=document.getElementById('sel-display');
  if(selPlayer){
    const c=selTeam==='home'?'var(--home-light)':'var(--away-light)';
    el.innerHTML=`<span class="sn" style="color:${c}">#${selPlayer.num} ${selPlayer.first}. ${selPlayer.last}</span>`;
  } else { el.textContent='Tap a player to select'; }
}

// ── STAT BUTTONS ──
function renderStatButtons(){
  const grid=document.getElementById('stat-grid');
  grid.innerHTML='';
  STAT_DEFS.forEach(s=>{
    const btn=document.createElement('button');
    btn.className=`stat-btn ${s.type}`;
    btn.dataset.key=s.key;
    btn.innerHTML=`<span class="si">${s.icon}</span>${s.label}`;
    btn.addEventListener('click',()=>handleStat(s));
    grid.appendChild(btn);
  });
  updateStatBtns();
}
function updateStatBtns(){
  document.querySelectorAll('.stat-btn').forEach(btn=>{
    const def=STAT_DEFS.find(s=>s.key===btn.dataset.key);
    if(!def) return;
    btn.classList.toggle('needs-player',!def.teamStat&&!selPlayer);
  });
}

function handleStat(def){
  const isTeam=!!def.teamStat;
  if(!isTeam&&!selPlayer) return;
  const player=isTeam?null:selPlayer;
  const side=isTeam?(selTeam||'home'):selTeam;

  let pts=0;
  if(def.key==='ft_made') pts=1;
  if(pts&&player){
    player.pts+=pts; GAME[side].score+=pts;
    document.getElementById(`${side}-score`).textContent=GAME[side].score;
  }
  if(def.key==='assist'&&player) player.ast++;
  if((def.key==='o_reb'||def.key==='d_reb')&&player) player.reb++;
  if(def.key.startsWith('foul_')&&!isTeam&&player){
    player.fouls++; GAME[side].fouls++;
    document.getElementById(`${side}-fouls`).textContent=GAME[side].fouls;
  }
  if(def.key==='timeout_full'&&GAME[side].toFull>0){
    GAME[side].toFull--;
    document.getElementById(`${side}-to-full`).textContent=GAME[side].toFull;
  }
  if(def.key==='timeout_30sec'&&GAME[side].to30>0){
    GAME[side].to30--;
    document.getElementById(`${side}-to-30`).textContent=GAME[side].to30;
  }
  pushEvent(player,side,def.key,null,null);
  renderPlayers();
  showFlash(def.label+(player?` — #${player.num}`:''), def.type==='scoring'?'made':'');
}

// ── COURT GESTURES ──
const svg=document.getElementById('court-svg');
const touchRing=document.getElementById('touch-ring');
const swipeOverlay=document.getElementById('swipe-overlay');

function svgPt(e){
  const r=svg.getBoundingClientRect(), vb=svg.viewBox.baseVal;
  const s=e.touches?e.touches[0]:e;
  return{x:((s.clientX-r.left)/r.width)*vb.width, y:((s.clientY-r.top)/r.height)*vb.height};
}

// 3pt: basket (230,340), arc r=170
function is3pt(pt){
  const dx=pt.x-230, dy=pt.y-340;
  return Math.sqrt(dx*dx+dy*dy) > 170;
}

function getSwipeDir(dx,dy){
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(ax<SWIPE_PX&&ay<SWIPE_PX) return null;
  if(ay>ax){ return dy<0?'up':'down'; }
  else { return dx>0?'right':'left'; }
}

function highlightDir(dir){
  ['up','down','left','right'].forEach(d=>{
    document.getElementById(`dir-${d}`).classList.toggle('highlighted',d===dir);
  });
}

svg.addEventListener('pointerdown',e=>{
  if(!selPlayer) return;
  e.preventDefault();
  const pt=svgPt(e);
  tStartX=pt.x; tStartY=pt.y;
  tMoving=false; tOverlayShown=false;
  touchRing.setAttribute('cx',pt.x); touchRing.setAttribute('cy',pt.y);
  touchRing.setAttribute('opacity','0.5');
  highlightDir(null);
},{passive:false});

svg.addEventListener('pointermove',e=>{
  if(!selPlayer) return;
  e.preventDefault();
  const pt=svgPt(e);
  const dx=pt.x-tStartX, dy=pt.y-tStartY;
  const dist=Math.sqrt(dx*dx+dy*dy);

  touchRing.setAttribute('cx',pt.x); touchRing.setAttribute('cy',pt.y);

  if(dist>SWIPE_PX){
    tMoving=true;
    if(!tOverlayShown){ swipeOverlay.classList.add('show'); tOverlayShown=true; }
    touchRing.setAttribute('stroke','rgba(255,255,255,0.6)');
    highlightDir(getSwipeDir(dx,dy));
  }
},{passive:false});

svg.addEventListener('pointerup',e=>{
  if(!selPlayer) return;
  e.preventDefault();
  touchRing.setAttribute('opacity','0');
  touchRing.setAttribute('stroke','rgba(255,255,255,0.3)');
  swipeOverlay.classList.remove('show');

  const pt=svgPt(e);
  const dx=pt.x-tStartX, dy=pt.y-tStartY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const startPt={x:tStartX,y:tStartY};

  if(!tMoving || dist<SWIPE_PX){
    // Tap = miss
    recordShot(startPt, false, 'normal');
  } else {
    const dir=getSwipeDir(dx,dy);
    if(dir==='up')    recordShot(startPt, true,  'normal');
    else if(dir==='right') recordShot(startPt, true,  'putback');
    else if(dir==='left')  recordShot(startPt, false, 'putback');
    else if(dir==='down')  showFlash('Cancelled','cancel-fl');
    // else ignore
  }
  tMoving=false; tOverlayShown=false;
},{passive:false});

svg.addEventListener('pointercancel',()=>{
  touchRing.setAttribute('opacity','0');
  swipeOverlay.classList.remove('show');
  tMoving=false; tOverlayShown=false;
});

function recordShot(pt, made, shotType){
  const three = shotType==='normal' && is3pt(pt);
  let key, pts=0, flashMsg, flashType='';

  if(shotType==='putback'){
    key=made?'putback_made':'putback_miss';
    pts=made?2:0;
    flashMsg=(made?'PUTBACK ✓':'PUTBACK ✗')+` — #${selPlayer.num}`;
    flashType=made?'made':'miss-fl';
  } else if(made){
    key=three?'3pt_made':'2pt_made';
    pts=three?3:2;
    flashMsg=`${pts} PTS${three?' (3)':''} — #${selPlayer.num}`;
    flashType='made';
  } else {
    key=three?'3pt_miss':'2pt_miss';
    flashMsg=`Miss${three?' (3)':''} — #${selPlayer.num}`;
    flashType='miss-fl';
  }

  if(pts>0){
    selPlayer.pts+=pts;
    GAME[selTeam].score+=pts;
    document.getElementById(`${selTeam}-score`).textContent=GAME[selTeam].score;
    GAME.possession=selTeam==='home'?'away':'home';
    updatePossUI();
  }
  // Putbacks count as offensive rebounds
  if(shotType==='putback') selPlayer.reb++;

  addDot(pt, made, three, shotType==='putback');
  pushEvent(selPlayer, selTeam, key, pt, three);
  renderPlayers();
  showFlash(flashMsg, flashType);
}

// ── SHOT DOTS ──
function addDot(pt, made, is3, isPutback){
  const g=document.getElementById('shot-dots');
  const id='dot-'+Date.now()+Math.random().toString(36).slice(2,5);
  if(made){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',pt.x); c.setAttribute('cy',pt.y); c.setAttribute('r','7');
    c.setAttribute('fill', isPutback?'#a78bfa' : is3?'#f39c12':'#27ae60');
    c.setAttribute('fill-opacity','0.85');
    c.setAttribute('stroke','rgba(255,255,255,0.65)'); c.setAttribute('stroke-width','1.5');
    c.setAttribute('id',id); g.appendChild(c);
  } else {
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',pt.x); t.setAttribute('y',pt.y+5.5);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','17');
    t.setAttribute('fill', isPutback?'#a78bfa':'#e05c52');
    t.setAttribute('font-weight','bold'); t.setAttribute('id',id);
    t.textContent='×'; g.appendChild(t);
  }
  shotDots.push({id, eventId:null, pending:true});
}

// ── EVENTS ──
function pushEvent(player, side, key, pt, is3){
  const evt={
    id: Date.now()+'_'+Math.random().toString(36).slice(2,5),
    playerId:player?.id, playerNum:player?.num, playerLast:player?.last,
    side, key, period:GAME.period, clockSec:GAME.clockSec,
    pts:getPts(key), is3
  };
  events.unshift(evt);
  const pending=shotDots.find(d=>d.pending);
  if(pending){ pending.eventId=evt.id; delete pending.pending; }
  renderLog();
  return evt;
}

function getPts(k){
  if(k==='2pt_made'||k==='putback_made') return 2;
  if(k==='3pt_made') return 3;
  if(k==='ft_made') return 1;
  return 0;
}
function getLabel(k){
  const d=STAT_DEFS.find(s=>s.key===k); if(d) return d.label;
  const m={'2pt_made':'2 PTS','2pt_miss':'2 Miss','3pt_made':'3 PTS','3pt_miss':'3 Miss',
           'putback_made':'Putback ✓','putback_miss':'Putback ✗'};
  return m[k]||k;
}

function deleteEvent(id){
  const evt=events.find(e=>e.id===id); if(!evt) return;
  // Reverse score
  if(evt.pts>0&&evt.side){
    GAME[evt.side].score=Math.max(0,GAME[evt.side].score-evt.pts);
    document.getElementById(`${evt.side}-score`).textContent=GAME[evt.side].score;
    if(evt.playerId){
      const p=findP(evt.playerId,evt.side);
      if(p) p.pts=Math.max(0,p.pts-evt.pts);
    }
  }
  // Reverse reb/ast
  if(evt.playerId){
    const p=findP(evt.playerId,evt.side);
    if(p){
      if(evt.key==='o_reb'||evt.key==='d_reb') p.reb=Math.max(0,p.reb-1);
      if(evt.key==='assist') p.ast=Math.max(0,p.ast-1);
    }
  }
  // Reverse foul
  if(evt.key.startsWith('foul_')&&evt.playerId){
    const def=STAT_DEFS.find(s=>s.key===evt.key);
    if(!def?.teamStat){
      const p=findP(evt.playerId,evt.side);
      if(p&&p.fouls>0) p.fouls--;
      if(GAME[evt.side].fouls>0) GAME[evt.side].fouls--;
      document.getElementById(`${evt.side}-fouls`).textContent=GAME[evt.side].fouls;
    }
  }
  // Remove dot
  const dot=shotDots.find(d=>d.eventId===id);
  if(dot){ document.getElementById(dot.id)?.remove(); shotDots=shotDots.filter(d=>d.eventId!==id); }
  events=events.filter(e=>e.id!==id);
  renderLog(); renderPlayers();
}

function findP(pid,side){ return PLAYERS[side]?.find(p=>p.id===pid); }

function renderLog(){
  const c=document.getElementById('log-entries'); if(!c) return;
  c.innerHTML='';
  events.slice(0,50).forEach(evt=>{
    const row=document.createElement('div'); row.className='log-entry';
    const dot=document.createElement('div'); dot.className='log-dot';
    dot.style.background=evt.side==='home'?'var(--home-light)':'var(--away-light)';
    const txt=document.createElement('div'); txt.className='log-txt';
    txt.textContent=evt.playerNum?`#${evt.playerNum} ${getLabel(evt.key)}`:getLabel(evt.key);
    const clk=document.createElement('div'); clk.className='log-clk';
    clk.textContent=`Q${evt.period} ${fmt(evt.clockSec)}`;
    const del=document.createElement('button'); del.className='log-del'; del.textContent='✕';
    del.addEventListener('click',()=>deleteEvent(evt.id));
    row.appendChild(dot); row.appendChild(txt); row.appendChild(clk); row.appendChild(del);
    c.appendChild(row);
  });
}

function toggleLog(){
  logOpen=!logOpen;
  document.getElementById('log-panel').classList.toggle('open',logOpen);
  if(logOpen) renderLog();
}

// ── SUB MODAL ──
function openSubModal(player,side){
  const bench=PLAYERS[side].filter(p=>!p.onFloor);
  if(!bench.length){ showFlash('No bench players'); return; }
  subTarget={player,side};
  document.getElementById('sub-title').textContent=`Sub out #${player.num} ${player.first}. ${player.last}`;
  const list=document.getElementById('sub-list'); list.innerHTML='';
  const ac=side==='home'?'var(--home-light)':'var(--away-light)';
  bench.forEach(bp=>{
    const row=document.createElement('div'); row.className='sub-row';
    row.innerHTML=`<div class="sub-num" style="color:${ac}">${bp.num}</div><div><div class="sub-name">${bp.first}. ${bp.last}</div><div class="sub-sm">${bp.pts} pts · ${bp.reb} reb · ${bp.fouls} fouls</div></div>`;
    row.addEventListener('click',()=>completeSub(bp));
    list.appendChild(row);
  });
  document.getElementById('sub-modal').classList.add('show');
}

function completeSub(incoming){
  if(!subTarget) return;
  const{player:out,side}=subTarget;
  out.onFloor=false; incoming.onFloor=true;
  pushEvent(out,side,'sub_out',null,null);
  pushEvent(incoming,side,'sub_in',null,null);
  if(selPlayer?.id===out.id){ selPlayer=incoming; }
  closeSubModal(); renderPlayers(); updateSelDisplay();
  showFlash(`#${incoming.num} IN / #${out.num} OUT`);
}
function closeSubModal(){ document.getElementById('sub-modal').classList.remove('show'); subTarget=null; }

// ── FLASH ──
function showFlash(msg,type){
  const el=document.getElementById('flash');
  el.textContent=msg;
  el.className='show'+(type?' '+type:'');
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>el.className='',850);
}

// ── INIT ──
renderPlayers(); renderStatButtons(); updateClockUI(); updatePossUI();
</script>
</body>
</html>

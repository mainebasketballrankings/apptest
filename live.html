<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBR Live</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d1117; --ink2:#2a2f3d; --ink3:#5a6075;
  --rule:#d8dce8; --rule2:#eceef5;
  --paper:#f4f5f9; --paper2:#ffffff;
  --home:#1a56db; --home-lt:#dbeafe;
  --away:#c0392b; --away-lt:#fee2e2;
  --green:#15803d; --gold:#b45309;
  --live:#dc2626; --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;}

/* HEADER */
#site-header{background:var(--paper2);border-bottom:2px solid var(--ink);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mbr-wordmark{font-family:'Playfair Display',serif;font-weight:900;font-size:17px;color:var(--ink);text-decoration:none;letter-spacing:-.02em;}
.mbr-wordmark span{color:var(--home);}
#live-pill{display:flex;align-items:center;gap:5px;background:var(--live);color:#fff;font-size:10px;font-weight:600;letter-spacing:.12em;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}
#live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
#live-pill.final{background:var(--ink3);}

/* SCOREBOARD */
#scoreboard{background:var(--paper2);border-bottom:1.5px solid var(--rule);padding:10px 16px 8px;flex-shrink:0;}
.sb-inner{max-width:1100px;margin:0 auto;}
.sb-row{display:grid;grid-template-columns:1fr 280px 1fr;align-items:start;gap:0;}

/* Team half — fills its 1fr column, logo + text spread with space-between */
.sb-team{display:flex;align-items:center;gap:0;padding:4px 20px 4px;width:100%;box-sizing:border-box;}
.sb-team.home{flex-direction:row;justify-content:flex-start;gap:18px;}
.sb-team.away{flex-direction:row-reverse;justify-content:flex-start;gap:18px;}
.sb-logo{width:72px;height:72px;min-width:72px;max-width:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:24px;overflow:hidden;flex-shrink:0;border:2px solid var(--rule);background:var(--rule2);color:var(--ink2);}
.sb-logo img{width:100%;height:100%;object-fit:contain;border-radius:50%;}
.sb-team-stack{display:flex;flex-direction:column;gap:0;flex:1;min-width:0;}
.sb-team.home .sb-team-stack{align-items:flex-start;}
.sb-team.away .sb-team-stack{align-items:flex-end;}
.sb-name{font-family:'Playfair Display',serif;font-weight:900;font-size:22px;color:var(--ink);line-height:1.15;white-space:nowrap;}
.sb-pts{font-family:'Playfair Display',serif;font-weight:900;font-size:58px;line-height:1;color:var(--ink);}
.sb-meta{display:flex;gap:10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);margin-top:3px;flex-wrap:wrap;}
.sb-team.away .sb-meta{justify-content:flex-end;}
.sb-foul{padding:1px 6px;border-radius:10px;}
.sb-foul.bonus{background:var(--live);color:#fff;font-weight:600;}

/* Clock centre — fixed 280px column, everything centred inside */
.sb-centre{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 12px 4px;border-left:1px solid var(--rule2);border-right:1px solid var(--rule2);}
.sb-clock{font-family:'DM Mono',monospace;font-weight:500;font-size:20px;background:var(--paper);border:1.5px solid var(--rule);border-radius:6px;padding:3px 14px;letter-spacing:.04em;min-width:80px;text-align:center;}
.sb-clock.running{border-color:var(--green);color:var(--green);background:#f0fdf4;}
.sb-period{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;}
.sb-poss{font-size:9px;font-weight:600;letter-spacing:.05em;padding:1px 8px;border-radius:20px;font-family:'DM Mono',monospace;background:var(--rule2);color:var(--ink2);}
.sb-poss.home::before{content:'◀  ';}
.sb-poss.away::after{content:'  ▶';}

/* Quarter grid — tucked under clock in centre col */
.sb-qtrs{width:100%;margin-top:6px;border-top:1px solid var(--rule2);padding-top:5px;}
/* Tab strip */
.qtr-tabs{display:flex;justify-content:center;gap:2px;margin-bottom:4px;}
.qtab{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.06em;padding:1px 7px;border-radius:10px;border:1px solid var(--rule);background:none;color:var(--ink3);cursor:pointer;transition:all .15s;}
.qtab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
/* Grid */
.qtr-grid{display:grid;grid-template-columns:52px repeat(4,1fr) 3px 1fr;gap:0;font-family:'DM Mono',monospace;font-size:10px;}
.qc{padding:1px 4px;text-align:center;color:var(--ink3);}
.qc.lbl{text-align:left;font-size:9px;letter-spacing:.04em;}
.qc.tn{font-weight:700;font-size:9px;color:var(--ink2);}
.qc.hv{font-weight:600;color:var(--ink2);}
.qc.av{font-weight:600;color:var(--ink2);}
.qc.tot{font-weight:700;color:var(--ink);}
.qc.sep{background:var(--rule);padding:0;}
.qc.aq{background:var(--rule2);border-radius:3px;color:var(--ink)!important;font-weight:700!important;}

/* MAIN 3-COL */
#main{display:grid;grid-template-columns:210px 1fr 210px;gap:0;flex:1;min-height:0;max-width:1100px;margin:0 auto;width:100%;padding:12px 12px 12px;box-sizing:border-box;align-items:start;}

/* STAT PANELS */
.stat-panel{display:flex;flex-direction:column;overflow-y:auto;max-height:calc(100dvh - 280px);border:1.5px solid var(--rule);border-radius:var(--r);background:var(--paper2);overflow:hidden;}
.panel-hdr{font-family:'Playfair Display',serif;font-weight:700;font-size:12px;padding:8px 10px 5px;border-bottom:1.5px solid var(--rule);display:flex;align-items:center;justify-content:space-between;background:var(--paper2);}
.panel-hdr.hh{color:var(--ink);}
.panel-hdr.ah{color:var(--ink);}
.panel-hdr-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);font-weight:400;}
.team-summary{display:flex;padding:5px 6px;background:var(--paper);border-bottom:1px solid var(--rule2);}
.ts-stat{display:flex;flex-direction:column;align-items:center;flex:1;}
.ts-val{font-weight:700;font-size:13px;color:var(--ink);}
.ts-lbl{font-size:8px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.pl-rows{overflow-y:auto;flex:1;}
.pl-row{padding:6px 10px;border-bottom:1px solid var(--rule2);background:var(--paper2);}
.pl-row.bench{opacity:.5;}
.pl-top{display:flex;align-items:baseline;justify-content:space-between;gap:4px;margin-bottom:2px;}
.pl-ident{display:flex;align-items:baseline;gap:3px;min-width:0;overflow:hidden;}
.pl-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);flex-shrink:0;}
.pl-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-pts{font-family:'Playfair Display',serif;font-weight:700;font-size:17px;line-height:1;flex-shrink:0;color:var(--ink);}
.home .pl-pts{color:var(--ink);}
.away .pl-pts{color:var(--ink);}
.pl-stats{display:flex;gap:8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);margin-bottom:3px;}
.pl-stats span{color:var(--ink2);}
.pl-fouls{display:flex;gap:2px;}
.pl-fd{width:6px;height:6px;border-radius:50%;background:var(--rule);}
.pl-fd.on{background:var(--gold);}

/* COURT */
#court-col{display:flex;flex-direction:column;gap:10px;}
#court-wrap{background:var(--paper2);border:1.5px solid var(--rule);border-radius:var(--r);overflow:hidden;}
#court-svg-wrap{width:100%;aspect-ratio:800/440;padding:6px;}
#fsvg{width:100%;height:100%;display:block;}
#court-legend{display:flex;align-items:center;justify-content:center;gap:16px;padding:5px 10px;border-top:1px solid var(--rule2);font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;}
.leg{display:flex;align-items:center;gap:4px;}
.leg-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.12);}

/* FEED */
#feed-wrap{background:var(--paper2);border:1.5px solid var(--rule);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;max-height:190px;}
.feed-hdr{font-family:'Playfair Display',serif;font-weight:700;font-size:12px;padding:7px 12px;border-bottom:1px solid var(--rule2);flex-shrink:0;color:var(--ink);}
#feed-list{overflow-y:auto;flex:1;}
.fr{display:flex;align-items:flex-start;gap:8px;padding:5px 12px;border-bottom:1px solid var(--rule2);transition:background .5s;}
.fr.new{background:#fefce8;}
.fr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.fr-body{flex:1;}
.fr-desc{font-size:11px;color:var(--ink);line-height:1.3;}
.fr-desc b{font-weight:600;}
.fr-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);margin-top:1px;}
.fr-score{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;align-self:center;flex-shrink:0;white-space:nowrap;}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:9px 18px;border-radius:30px;box-shadow:0 4px 18px rgba(0,0,0,.22);z-index:300;transition:transform .3s cubic-bezier(.34,1.35,.64,1),opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.tp{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:1px 8px;margin-left:6px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;}

/* MOBILE STATS STRIP — shown only on mobile instead of shot chart */
#mobile-stats{display:none;background:var(--paper2);border:1.5px solid var(--rule);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.mstat-row{display:grid;grid-template-columns:1fr 80px 1fr;border-bottom:1px solid var(--rule2);}
.mstat-row:last-child{border-bottom:none;}
.mstat-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);text-align:center;padding:4px 0 3px;background:var(--paper);grid-column:2;}
.mstat-h,.mstat-a{font-family:'DM Mono',monospace;font-weight:700;font-size:16px;color:var(--ink);text-align:center;padding:4px 8px;display:flex;align-items:center;justify-content:center;}
.mstat-h{justify-content:flex-end;}
.mstat-a{justify-content:flex-start;}

/* RESPONSIVE */
@media(max-width:900px){
  #main{grid-template-columns:180px 1fr 180px;padding:8px;}
}
@media(max-width:680px){
  /* Scoreboard: stack team blocks, smaller text */
  .sb-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
  .sb-team.home{grid-column:1;grid-row:1;padding:8px 8px 0;}
  .sb-team.away{grid-column:2;grid-row:1;padding:8px 8px 0;justify-content:flex-end;}
  .sb-centre{grid-column:1/-1;grid-row:2;padding:6px 12px 4px;}
  .sb-logo{width:44px;height:44px;min-width:44px;max-width:44px;font-size:16px;}
  .sb-name{font-size:15px;}
  .sb-pts{font-size:42px;}
  .sb-meta{font-size:9px;}

  /* Main: single column, court hidden, mobile strip shown */
  #main{grid-template-columns:1fr;padding:8px;gap:8px;}
  #court-col{display:none;}
  #mobile-stats{display:block;}
  #home-panel{order:1;}
  #away-panel{order:2;}
  .stat-panel{max-height:none;}
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:2px;}
</style>
</head>
<body style="display:flex;flex-direction:column;min-height:100dvh;">

<header id="site-header">
  <a class="mbr-wordmark" href="#">MBR<span>·</span>LIVE</a>
  <div id="live-pill"><div id="live-dot"></div><span id="live-lbl">LIVE</span></div>
</header>

<div id="scoreboard">
  <div class="sb-inner">
    <div class="sb-row">
      <!-- HOME: logo + name/score stack -->
      <div class="sb-team home">
        <div class="sb-logo" id="home-logo">C</div>
        <div class="sb-team-stack">
          <div class="sb-name" id="home-name">Camden Hills</div>
          <div class="sb-pts" id="home-score">0</div>
          <div class="sb-meta">
            <span class="sb-foul" id="home-foul-lbl">0 fouls</span>
            <span id="home-to-lbl">5 TO left</span>
          </div>
        </div>
      </div>

      <!-- CENTRE: clock + period + possession + qtr grid -->
      <div class="sb-centre">
        <div class="sb-clock" id="fan-clock">8:00</div>
        <div class="sb-period" id="fan-period">1st Quarter</div>
        <div class="sb-poss home" id="poss-disp">CAM</div>
        <div class="sb-qtrs">
          <div class="qtr-tabs">
            <button class="qtab active" onclick="setQtab('pts',this)">PTS</button>
            <button class="qtab" onclick="setQtab('reb',this)">REB</button>
            <button class="qtab" onclick="setQtab('to',this)">TO</button>
            <button class="qtab" onclick="setQtab('fg',this)">FG%</button>
            <button class="qtab" onclick="setQtab('3p',this)">3PT%</button>
          </div>
          <div class="qtr-grid">
            <div class="qc lbl"></div>
            <div class="qc">Q1</div><div class="qc">Q2</div><div class="qc">Q3</div><div class="qc">Q4</div>
            <div class="qc sep"></div>
            <div class="qc lbl" style="font-weight:700;color:var(--ink2)">TOT</div>
            <div class="qc tn" id="qhl">CAM</div>
            <div class="qc hv" id="qh1">—</div><div class="qc hv" id="qh2">—</div>
            <div class="qc hv" id="qh3">—</div><div class="qc hv" id="qh4">—</div>
            <div class="qc sep"></div>
            <div class="qc tot hv" id="qh-tot">0</div>
            <div class="qc tn" id="qal">CAP</div>
            <div class="qc av" id="qa1">—</div><div class="qc av" id="qa2">—</div>
            <div class="qc av" id="qa3">—</div><div class="qc av" id="qa4">—</div>
            <div class="qc sep"></div>
            <div class="qc tot av" id="qa-tot">0</div>
          </div>
        </div>
      </div>

      <!-- AWAY: score/name stack + logo -->
      <div class="sb-team away">
        <div class="sb-team-stack">
          <div class="sb-name" id="away-name">Cape Elizabeth</div>
          <div class="sb-pts" id="away-score">0</div>
          <div class="sb-meta">
            <span class="sb-foul" id="away-foul-lbl">0 fouls</span>
            <span id="away-to-lbl">5 TO left</span>
          </div>
        </div>
        <div class="sb-logo" id="away-logo">C</div>
      </div>
    </div>
  </div>
</div>

<div id="main">

  <!-- MOBILE STATS STRIP (shown instead of court on small screens) -->
  <div id="mobile-stats">
    <div class="mstat-row">
      <div class="mstat-h" id="ms-h-pts">0</div>
      <div class="mstat-lbl">PTS</div>
      <div class="mstat-a" id="ms-a-pts">0</div>
    </div>
    <div class="mstat-row">
      <div class="mstat-h" id="ms-h-fg">—</div>
      <div class="mstat-lbl">FG%</div>
      <div class="mstat-a" id="ms-a-fg">—</div>
    </div>
    <div class="mstat-row">
      <div class="mstat-h" id="ms-h-3p">—</div>
      <div class="mstat-lbl">3PT%</div>
      <div class="mstat-a" id="ms-a-3p">—</div>
    </div>
    <div class="mstat-row">
      <div class="mstat-h" id="ms-h-reb">0</div>
      <div class="mstat-lbl">REB</div>
      <div class="mstat-a" id="ms-a-reb">0</div>
    </div>
    <div class="mstat-row">
      <div class="mstat-h" id="ms-h-to">0</div>
      <div class="mstat-lbl">TO</div>
      <div class="mstat-a" id="ms-a-to">0</div>
    </div>
    <div class="mstat-row">
      <div class="mstat-h" id="ms-h-fouls">0</div>
      <div class="mstat-lbl">FOULS</div>
      <div class="mstat-a" id="ms-a-fouls">0</div>
    </div>
  </div>

  <!-- HOME STATS (left) -->
  <div class="stat-panel home" id="home-panel">
    <div class="panel-hdr hh">
      <span id="home-panel-name">Camden Hills</span>
      <span class="panel-hdr-sub" id="home-fg-sub">0/0 FG</span>
    </div>
    <div class="team-summary" id="home-team-sum"></div>
    <div class="pl-rows" id="home-pl-rows"></div>
  </div>

  <!-- COURT + FEED -->
  <div id="court-col">
    <div id="court-wrap">
      <div id="court-svg-wrap">
        <!--
          FULL COURT: 800×440 viewBox
          Court boundary: x=10–790 (780 wide), y=10–430 (420 tall)
          Left half  — HOME attacks LEFT basket (cx=36, cy=220)
          Right half — AWAY attacks RIGHT basket (cx=764, cy=220)
          Centre line: x=400

          All geometry derived from scorer's locked 460×380 space via:
            HOME → LEFT:  fan_x = 10+(sy/380)*390,   fan_y = 10+(sx/460)*420
            AWAY → RIGHT: fan_x = 790-(sy/380)*390,  fan_y = 10+(sx/460)*420
          3pt arcs use the same polyline technique as the scorer (clipped).
        -->
        <svg id="fsvg" viewBox="0 0 800 440" preserveAspectRatio="xMidYMid meet">
          <!-- Floor — lighter, more muted -->
          <rect width="800" height="440" fill="#d4b483"/>
          <!-- Boundary -->
          <rect x="10" y="10" width="780" height="420" fill="none" stroke="#8a6830" stroke-width="3" rx="2"/>
          <!-- Centre line + circle -->
          <line x1="400" y1="10" x2="400" y2="430" stroke="#8a6830" stroke-width="2"/>
          <circle cx="400" cy="220" r="50" fill="none" stroke="#8a6830" stroke-width="2"/>
          <circle cx="400" cy="220" r="3" fill="#8a6830"/>

          <!-- ═══ HOME HALF (left, basket on left wall) ═══ -->
          <!-- Key/Paint: depth=167px (x: 10→177), width=111px (y: 165→276), fill lighter -->
          <rect x="10" y="165" width="167" height="111" fill="#c4a060" stroke="#8a6830" stroke-width="2"/>
          <!-- Lane dashes (horizontal): at y=164.3 and y=275.7 running x=10→177 -->
          <line x1="10" y1="187" x2="177" y2="187" stroke="#8a6830" stroke-width="1.2" stroke-dasharray="5,5"/>
          <line x1="10" y1="253" x2="177" y2="253" stroke="#8a6830" stroke-width="1.2" stroke-dasharray="5,5"/>
          <!-- Backboard: x=10→15, centred at y=220 (±23) -->
          <rect x="10" y="197" width="5" height="46" fill="#8a6830" rx="1"/>
          <!-- Basket ring -->
          <circle cx="36" cy="220" r="10" fill="none" stroke="#8a6830" stroke-width="2.5"/>
          <circle cx="36" cy="220" r="3" fill="#8a6830"/>
          <!-- FT line: x=188, y=165→276 -->
          <line x1="188" y1="165" x2="188" y2="276" stroke="#8a6830" stroke-width="2"/>
          <!-- FT circle: centre (188,220), rx=61 ry=54. Right half solid, left dashed -->
          <path d="M 188 166 A 61 54 0 0 1 188 274" fill="none" stroke="#8a6830" stroke-width="2"/>
          <path d="M 188 166 A 61 54 0 0 0 188 274" fill="none" stroke="#8a6830" stroke-width="2" stroke-dasharray="7,6"/>
          <!-- Restricted area: r=33 from basket (36,220) -->
          <path d="M 36 187 A 33 33 0 0 1 36 253" fill="none" stroke="#8a6830" stroke-width="1.5" stroke-dasharray="4,3"/>
          <!-- 3pt arc polyline (computed from scorer geometry, clipped to left half) -->

// ── COORDINATE TRANSFORM ──────────────────────────────
// Scorer: 460×380, basket at top (y≈25, x=230).
// Fan court: 800×440. Court boundary x=10-790, y=10-430.
// HOME → LEFT:  fan_x = 10+(sy/380)*390,   fan_y = 10+(sx/460)*420
// AWAY → RIGHT: fan_x = 790-(sy/380)*390,  fan_y = 10+(sx/460)*420
function xfm(pt, side) {
  if(!pt) return null;
  return side==='home'
    ? { x: 10+(pt.y/380)*390,      y: 10+(pt.x/460)*420 }
    : { x: 790-(pt.y/380)*390,     y: 10+(pt.x/460)*420 };
}

function addDot(pt, made, three, isPb, side) {
  const tp = xfm(pt, side);
  if(!tp) return;
  const g = document.getElementById(side+'-dots');
  const id = 'd'+Date.now()+Math.random().toString(36).slice(2,4);
  if(made){
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',tp.x); c.setAttribute('cy',tp.y); c.setAttribute('r','7');
    c.setAttribute('fill', isPb?'#a78bfa':three?'#b45309':'#15803d');
    c.setAttribute('fill-opacity','.82');
    c.setAttribute('stroke','rgba(255,255,255,.55)'); c.setAttribute('stroke-width','1.5');
    c.setAttribute('id',id); g.appendChild(c);
  } else {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',tp.x); t.setAttribute('y',tp.y+5.5);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','17');
    t.setAttribute('fill',isPb?'#a78bfa':'#c0392b'); t.setAttribute('font-weight','bold');
    t.setAttribute('id',id); t.textContent='×'; g.appendChild(t);
  }
}

let activeQtab = 'pts';

function setQtab(tab, btn) {
  activeQtab = tab;
  document.querySelectorAll('.qtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderQtrGrid();
}

function renderQtrGrid() {
  const q = GAME.period;
  ['home','away'].forEach(side => {
    const pre = side==='home' ? 'h' : 'a';
    for (let i=1; i<=4; i++) {
      const el = document.getElementById(`q${pre}${i}`);
      const past = i < q, current = i === q;
      if (!past && !current) { el.textContent='—'; el.classList.remove('aq'); continue; }
      el.classList.toggle('aq', current);
      const qi = i-1;
      if (activeQtab==='pts') {
        el.textContent = GAME.qtrs[side][qi];
      } else if (activeQtab==='reb') {
        el.textContent = GAME.qreb[side][qi];
      } else if (activeQtab==='to') {
        el.textContent = GAME.qto[side][qi];
      } else if (activeQtab==='fg') {
        const m=GAME.qfgm[side][qi], a=GAME.qfga[side][qi];
        el.textContent = a ? Math.round(100*m/a)+'%' : '—';
      } else { // 3p%
        const m=GAME.qtpm[side][qi], a=GAME.qtpa[side][qi];
        el.textContent = a ? Math.round(100*m/a)+'%' : '—';
      }
    }
    // Total column
    const totEl = document.getElementById(`q${pre}-tot`);
    const ts = GAME.ts[side];
    if (activeQtab==='pts') {
      totEl.textContent = GAME[side].score;
    } else if (activeQtab==='reb') {
      totEl.textContent = ts.reb;
    } else if (activeQtab==='to') {
      totEl.textContent = ts.to;
    } else if (activeQtab==='fg') {
      totEl.textContent = ts.fga ? Math.round(100*ts.fgm/ts.fga)+'%' : '—';
    } else { // 3p%
      totEl.textContent = ts.tpa ? Math.round(100*ts.tpm/ts.tpa)+'%' : '—';
    }
  });
}

}

  evts.slice(0,50).forEach((e,i)=>{
    const row=document.createElement('div'); row.className='fr'+(i===0?' new':'');
    const dot=document.createElement('div'); dot.className='fr-dot';
    dot.style.background=e.side==='home'?'var(--home)':'var(--away)';
    const body=document.createElement('div'); body.className='fr-body';
    const who=e.pnum?`<b>#${e.pnum} ${e.pfi}.${e.plast}</b>`:`<b>${GAME[e.side]?.name||''}</b>`;
    const action=KLBL[e.key]||e.key;
    const desc=e.key==='possession_flip'?`${GAME[e.side]?.name||''} ball`:`${who} — ${action}`;
    body.innerHTML=`<div class="fr-desc">${desc}</div><div class="fr-meta">Q${e.period} · ${fmt(e.clk)}</div>`;
    const sc=document.createElement('div'); sc.className='fr-score';
    sc.style.color=e.side==='home'?'var(--home)':'var(--away)';
    if(e.scoreSnap) sc.textContent=`${e.scoreSnap.home}–${e.scoreSnap.away}`;
    row.appendChild(dot); row.appendChild(body); row.appendChild(sc);
    list.appendChild(row);
    if(i===0) setTimeout(()=>row.classList.remove('new'),1800);
  });
}

function toast(html){
  const el=document.getElementById('toast');
  el.innerHTML=html; el.className='show';
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>el.className='',3500);
}

// ── MAIN EVENT INTAKE ─────────────────────────────────
function onEvent(e){
  const s=e.side, opp=s==='home'?'away':'home';
  const p=e.pid?findP(e.pid,s):null;
  const ts=GAME.ts[s];
  const qi=e.period-1; // quarter index 0-3
  GAME.clockSec=e.clk; GAME.period=e.period;
  e.scoreSnap={home:GAME.home.score,away:GAME.away.score};

  const shotKeys=['2pt_made','3pt_made','2pt_miss','3pt_miss','putback_made','putback_miss'];

  if(e.key==='2pt_made'||e.key==='putback_made'){
    GAME[s].score+=2; GAME.qtrs[s][qi]+=2;
    GAME.qfgm[s][qi]++; GAME.qfga[s][qi]++;
    if(p){p.pts+=2;p.fgm++;p.fga++;} ts.fgm++;ts.fga++;
    GAME.possession=opp;
    e.scoreSnap={home:GAME.home.score,away:GAME.away.score};
    toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — 2 pts<span class="tp">${e.scoreSnap.home}–${e.scoreSnap.away}</span>`);
  } else if(e.key==='3pt_made'){
    GAME[s].score+=3; GAME.qtrs[s][qi]+=3;
    GAME.qfgm[s][qi]++; GAME.qfga[s][qi]++;
    GAME.qtpm[s][qi]++; GAME.qtpa[s][qi]++;
    if(p){p.pts+=3;p.fgm++;p.fga++;p.tpm++;p.tpa++;} ts.fgm++;ts.fga++;ts.tpm++;ts.tpa++;
    GAME.possession=opp;
    e.scoreSnap={home:GAME.home.score,away:GAME.away.score};
    toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — 3-pointer! 🔥<span class="tp">${e.scoreSnap.home}–${e.scoreSnap.away}</span>`);
  } else if(e.key==='ft_made'){
    GAME[s].score+=1; GAME.qtrs[s][qi]+=1;
    if(p) p.pts++;
    e.scoreSnap={home:GAME.home.score,away:GAME.away.score};
  } else if(e.key==='2pt_miss'||e.key==='putback_miss'){
    GAME.qfga[s][qi]++;
    if(p) p.fga++; ts.fga++;
  } else if(e.key==='3pt_miss'){
    GAME.qfga[s][qi]++;
    GAME.qtpa[s][qi]++;
    if(p){p.fga++;p.tpa++;} ts.fga++;ts.tpa++;
  } else if(e.key==='assist'){
    if(p) p.ast++; ts.ast++;
  } else if(e.key==='o_reb'||e.key==='d_reb'){
    GAME.qreb[s][qi]++;
    if(p) p.reb++; ts.reb++;
    if(e.key==='o_reb') toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — offensive rebound`);
  } else if(e.key==='steal'){
    ts.stl++; toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — steal ⚡`);
  } else if(e.key==='block'){
    ts.blk++; toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — block ✋`);
  } else if(e.key==='turnover'){
    GAME.qto[s][qi]++;
    ts.to++; toast(`<b>#${e.pnum} ${e.pfi}.${e.plast}</b> — turnover`);
  } else if(e.key.startsWith('foul_')){
    if(p) p.fouls++; GAME[s].fouls++;
    if(GAME[s].fouls===7) toast(`${GAME[s].name} in the bonus`);
    else if(GAME[s].fouls===10) toast(`${GAME[s].name} double bonus`);
  } else if(e.key==='timeout_full'){
    GAME[s].tof=Math.max(0,GAME[s].tof-1); toast(`${GAME[s].name} — full timeout`);
  } else if(e.key==='timeout_30sec'){
    GAME[s].to3=Math.max(0,GAME[s].to3-1); toast(`${GAME[s].name} — 30-sec timeout`);
  } else if(e.key==='possession_flip'){
    GAME.possession=s;
  } else if(e.key==='sub_in'){ if(p) p.on=true; }
  else if(e.key==='sub_out'){ if(p) p.on=false; }

  if(shotKeys.includes(e.key)&&e.pt){
    addDot(e.pt,e.key.endsWith('_made'),e.key.startsWith('3pt'),e.key.startsWith('putback'),s);
  }
  evts.unshift(e);
  updScoreboard(); updPanels(); updFeed();
}

let simIdx=0;
function runSim(){
  if(simIdx>=SIM.length){
    document.getElementById('live-pill').classList.add('final');
    document.getElementById('live-lbl').textContent='FINAL';
    GAME.running=false; if(demoClk){clearInterval(demoClk);demoClk=null;}
    return;
  }
  const evt=SIM[simIdx++];
  onEvent(evt);
  if(!demoClk) startClock();
  const big=['2pt_made','3pt_made','putback_made'].includes(evt.key);
  setTimeout(runSim,(big?3000:2000)+Math.random()*900);
}

function initView(home,away){
  ['home','away'].forEach(s=>{
    const t=s==='home'?home:away;
    GAME[s].name=t.name; GAME[s].short=t.short;
    document.getElementById(s+'-name').textContent=t.name;
    document.getElementById(s+'-panel-name').textContent=t.name;
    document.getElementById(s==='home'?'qhl':'qal').textContent=t.short;
    document.getElementById(s+'-logo').textContent=t.name.charAt(0);
    if(t.logoUrl){
      const img=document.createElement('img');
      img.src=t.logoUrl; img.alt=t.name; img.onerror=()=>{};
      const el=document.getElementById(s+'-logo');
      el.textContent=''; el.appendChild(img);
    }
  });
  updScoreboard(); updPanels(); updFeed();
}
